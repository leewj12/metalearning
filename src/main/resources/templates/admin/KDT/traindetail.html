<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메타러닝 훈련일지 조회</title>
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <!-- 헤더 CSS, JS -->
    <link rel="stylesheet" href="/static/css/admindashboard.css">
    <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
    <link rel="stylesheet" href="/static/css/header/adminheader.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
<div class="app-container">
    <!-- Header -->
    <div th:replace="~{fragments/adminheader :: adminheader}"></div>
    <div class="content-container">
        <!-- Sidebar -->
        <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>
        <!-- Main Content -->
        <div class="main-content">
            <h1 class="mb-4"><i class="bi bi-journal-text me-2"></i>훈련일지 조회</h1>
            <h2 th:text="${KDTSessionDTO.kdtSessionTitle}" class="text-primary"></h2>

            <!-- 훈련 제목 -->
            <div class="mb-3">
                <label class="form-label">
                    <i class="bi bi-pencil-square me-2"></i>훈련 제목
                </label>
                <p class="form-control-plaintext border rounded px-3 py-2" th:text="${KDTTrainDTO.kdtTrainTitle}"></p>
            </div>

            <!-- 담당 강사와 훈련 날짜 -->
            <div class="row g-3 mb-3">
                <!-- 담당 강사 -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-person-badge me-2"></i>담당 강사
                    </label>
                    <p class="form-control-plaintext border rounded px-3 py-2" th:text="${instr}"></p>
                    <input type="hidden" id="hiddenKdtStaffId" name="kdtStaffId" th:value="${KDTTrainDTO.kdtStaffId}" readonly>
                </div>

                <!-- 훈련 날짜 -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-calendar-event me-2"></i>훈련 날짜
                    </label>
                    <p class="form-control-plaintext border rounded px-3 py-2" th:text="${KDTTrainDTO.kdtTrainDate}"></p>
                </div>
            </div>

            <!-- 훈련 과목 -->
            <div class="mb-3">
                <label class="form-label">
                    <i class="bi bi-book me-2"></i>훈련 과목
                </label>
                <p class="form-control-plaintext border rounded px-3 py-2" th:text="${KDTTrainDTO.kdtTrainSubject}"></p>
            </div>

            <!-- 훈련 내용 -->
            <div class="mb-3">
                <label class="form-label">
                    <i class="bi bi-card-text me-2"></i>훈련 내용
                </label>
                <div class="form-control-plaintext border rounded px-3 py-2" th:text="${KDTTrainDTO.kdtTrainContent}"></div>
            </div>

            <!-- 버튼 -->
            <div class="d-flex justify-content-center gap-2 mt-4">
                <a th:href="@{/admin/KDT/{sessionId}/train/update/{kdtTrainId}(sessionId=${KDTSessionDTO.kdtSessionId}, kdtTrainId=${KDTTrainDTO.kdtTrainId})}" class="btn btn-primary">
                    <i class="bi bi-pencil-square me-2"></i>수정
                </a>
                <button th:onclick="'deleteTrain('+${KDTSessionDTO.kdtSessionId}+', '+${KDTTrainDTO.kdtTrainId}+')'" class="btn btn-danger">
                    <i class="bi bi-trash me-2"></i>삭제
                </button>
                <a th:href="'/view/admin/KDT/'+${KDTSessionDTO.kdtSessionId}+'/train/list'" class="btn btn-secondary">
                    <i class="bi bi-list-ul me-2"></i>목차
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    function getCsrfToken() {
        return document.querySelector('meta[name="_csrf"]').getAttribute('content');
    }

    function getCsrfHeaderName() {
        return document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
    }

    function deleteTrain(kdtSessionId, kdtTrainId) {
        const url = `/api/admin/KDT/${kdtSessionId}/train/delete/${kdtTrainId}`;
        console.log("Deleting outline with URL:", url);

        const csrfToken = getCsrfToken();
        const csrfHeaderName = getCsrfHeaderName();

        if (!confirm('정말 삭제하시겠습니까?')) {
            return;
        }

        fetch(url, {
            method: 'DELETE',
            headers: {
                'Content-Type': 'application/json',
                [csrfHeaderName]: csrfToken
            }
        })
        .then(response => {
            if (response.ok) {
                alert('삭제되었습니다.');
                window.location.href = '/view/admin/KDT/' + kdtSessionId + '/train/list';
            } else {
                response.text().then(errMsg => {
                    console.error("Error Response:", errMsg);
                    alert('삭제에 실패했습니다.');
                });
            }
        })
        .catch(error => {
            console.error("Error during fetch:", error);
            alert('삭제 중 오류가 발생했습니다.');
        });
    }
</script>
</body>
</html>
