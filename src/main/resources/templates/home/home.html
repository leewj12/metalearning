<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메타러닝</title>
  <link rel="icon" href="/images/logo.png" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/header/header.css">
  <link rel="stylesheet" href="/static/css/footer/footer.css">
  <link rel="stylesheet" href="/static/css/home/home.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main>
  <!-- Banner -->
  <section class="container mt-4">
    <div id="bannerCarousel" class="carousel slide" data-bs-ride="carousel" style="border-radius: 12px; overflow: hidden;">
      <div class="carousel-inner">
        <div class="carousel-item active">
          <div class="d-flex align-items-center justify-content-center position-relative">
            <img src="/static/images/home/mb.jpg" alt="Banner 1">
            <div class="position-absolute text-start w-100 px-4">
              <h1 class="display-4 fw-bold" style="color: #ffffff;">국비 지원으로 새로운 시작을!</h1>
              <p class="lead fw-semibold" style="color: rgba(255, 255, 255, 0.9);">미래를 준비하는 최고의 선택, MetaLearning</p>
            </div>
          </div>
        </div>
        <div class="carousel-item">
          <div class="d-flex align-items-center justify-content-center position-relative">
            <img src="/static/images/home/mb3.jpg" alt="Banner 2">
            <div class="position-absolute text-start w-100 px-4" style="top: 10%; left: 5%;">
              <h1 class="display-4 fw-bold" style="color: #000000;">실무 중심의 교육</h1>
              <p class="lead fw-semibold" style="color: #000000;">현업 전문가와 함께하는 성공적인 커리어 시작</p>
            </div>
          </div>
        </div>
        <div class="carousel-item">
          <div class="d-flex align-items-center justify-content-center position-relative">
            <img src="/static/images/home/mb2.jpg" alt="Banner 3">
            <div class="position-absolute text-start w-100 px-4">
              <h1 class="display-4 fw-bold" style="color: #ffffff;">메타러닝에 오신걸 환영합니다</h1>
              <p class="lead fw-semibold" style="color: rgba(255, 255, 255, 0.9);">취업 지원, 온라인 강의는 메타러닝</p>
            </div>
          </div>
        </div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#bannerCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#bannerCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>
  </section>

  <!-- Features -->
  <section class="features-section">
    <div class="container">
      <h2 class="text-center mb-5 fw-bold" style="color: #003366;">MetaLearning의 특장점</h2>
      <div class="row g-4">
        <div class="col-md-4 text-center">
          <div class="icon-box">
            <i class="bi bi-award-fill display-4"></i>
            <h5 class="mt-3 fw-bold">우수 강사진</h5>
            <p class="text-muted">현업 전문가들이 직접 강의하는 실무 중심 교육.</p>
          </div>
        </div>
        <div class="col-md-4 text-center">
          <div class="icon-box">
            <i class="bi bi-laptop display-4"></i>
            <h5 class="mt-3 fw-bold">최신 커리큘럼</h5>
            <p class="text-muted">최신 기술 트렌드를 반영한 체계적인 강의 내용.</p>
          </div>
        </div>
        <div class="col-md-4 text-center">
          <div class="icon-box">
            <i class="bi bi-globe display-4"></i>
            <h5 class="mt-3 fw-bold">글로벌 인증</h5>
            <p class="text-muted">글로벌 자격증 취득을 위한 전문적인 준비 과정.</p>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
