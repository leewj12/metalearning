<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>메타러닝 강사 계정 등록</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <link rel="stylesheet" href="/static/css/admindashboard.css">
  <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
  <link rel="stylesheet" href="/static/css/header/adminheader.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <style>
    .requiredStar {
        color: red;
    }
    .error-message {
        color: red;
        font-size: 0.875em;
    }
    .valid-feedback {
        color: green;
        font-size: 0.875em;
    }
  </style>
</head>

<script>
  // 주소검색 함수 정의
  function searchAddress(postcodeId, addressId, detailAddressId) {
      new daum.Postcode({
          oncomplete: function (data) {
              let addr = ''; // 도로명/지번 주소
              let extraAddr = ''; // 참고항목

              // 사용자 선택 타입에 따른 주소 결정
              if (data.userSelectedType === 'R') {
                  addr = data.roadAddress; // 도로명 주소
              } else {
                  addr = data.jibunAddress; // 지번 주소
              }

              // 참고항목 설정 (도로명 주소일 경우)
              if (data.userSelectedType === 'R') {
                  if (data.bname && /[동|로|가]$/g.test(data.bname)) {
                      extraAddr += data.bname; // 법정동 추가
                  }
                  if (data.buildingName && data.apartment === 'Y') {
                      extraAddr += (extraAddr ? ', ' + data.buildingName : data.buildingName); // 건물명 추가
                  }
              }

              // 우편번호와 주소 필드 채우기
              document.getElementById(postcodeId).value = data.zonecode; // 우편번호
              document.getElementById(addressId).value = addr; // 도로명 또는 지번 주소

              // 상세주소 입력란에 포커스
              if (detailAddressId) {
                  document.getElementById(detailAddressId).focus();
              }
          }
      }).open(); // 팝업 열기
  }

  // 이메일 중복 체크 함수
  function getCsrfToken() {
      return document.querySelector('meta[name="_csrf"]').getAttribute('content');
  }

  function getCsrfHeader() {
      return document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
  }

  async function checkEmail() {
      const email = document.getElementById('userEmail').value;
      const emailError = document.getElementById('emailError');
      const emailFeedback = document.getElementById('emailFeedback');

      if (email) {
          try {
              // 서버로 POST 요청을 보내 이메일 중복 체크
              const response = await fetch('/main/check-email', {
                  method: 'POST',
                  headers: {
                      'Content-Type': 'application/json',
                      [getCsrfHeader()]: getCsrfToken()
                  },
                  body: JSON.stringify({ userEmail: email }) // 서버에 전송할 데이터
              });

              // 응답을 JSON 형식으로 파싱
              const data = await response.json();

              // 응답이 성공적이라면
              if (response.ok) {
                  // 이메일이 사용 가능
                  emailError.textContent = '';
                  emailFeedback.style.display = 'block';  // 사용 가능 표시
              } else {
                  // 이메일이 이미 사용 중
                  emailError.textContent = data.message; // 서버에서 보낸 "이미 사용 중인 이메일입니다."
                  emailFeedback.style.display = 'none';  // 사용 불가능 표시
              }
          } catch (error) {
              console.error('Error:', error);
          }
      }
  }

  // 폼 유효성 검사
  function validatePassword() {
      const password = document.getElementById('userPw').value;
      const confirmPassword = document.getElementById('userPwConfirm').value;
      const passwordError = document.getElementById('passwordError');

      if (password !== confirmPassword) {
          passwordError.style.display = 'block';
          document.getElementById('userPwConfirm').classList.remove('is-valid');
          document.getElementById('userPwConfirm').classList.add('is-invalid');
          return false;
      }
      passwordError.style.display = 'none';
      document.getElementById('userPwConfirm').classList.remove('is-invalid');
      document.getElementById('userPwConfirm').classList.add('is-valid');
      return true;
  }

  function validateAddressFields() {
      const postcode = document.getElementById('userPostcode');
      const address = document.getElementById('userAddress');
      const detailAddress = document.getElementById('userAddressDetail');

      if (postcode.value.trim() === '') {
          postcode.classList.add('is-invalid');
          postcode.classList.remove('is-valid');
      } else {
          postcode.classList.remove('is-invalid');
          postcode.classList.add('is-valid');
      }

      if (address.value.trim() === '') {
          address.classList.add('is-invalid');
          address.classList.remove('is-valid');
      } else {
          address.classList.remove('is-invalid');
          address.classList.add('is-valid');
      }

      if (detailAddress.value.trim() === '') {
          detailAddress.classList.add('is-invalid');
          detailAddress.classList.remove('is-valid');
      } else {
          detailAddress.classList.remove('is-invalid');
          detailAddress.classList.add('is-valid');
      }
  }

  (function() {
      'use strict';
      window.addEventListener('load', function() {
          var forms = document.getElementsByClassName('needs-validation');
          var validation = Array.prototype.filter.call(forms, function(form) {
              form.addEventListener('submit', function(event) {
                  if (form.checkValidity() === false || !validatePassword()) {
                      event.preventDefault();
                      event.stopPropagation();
                  }

                  validateAddressFields();
                  form.classList.add('was-validated');
              }, false);
          });
      }, false);
  })();
</script>

<body>
<div class="app-container">

  <!-- Header -->
  <div th:replace="~{fragments/adminheader :: adminheader}"></div>

  <div class="content-container">
    <!-- Sidebar -->
    <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>

    <!-- Main Content -->
    <div class="main-content">
      <h1><i class="bi bi-person-plus"></i> 강사 계정 등록하기</h1>

      <!-- 계정 등록 폼 -->
      <form action="/admin/KDT/account/Instructor" method="post" th:action="@{/admin/KDT/account/Instructor}" class="needs-validation" novalidate>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <!-- 이메일 -->
        <div class="mb-3">
          <label for="userEmail" class="form-label"><i class="bi bi-envelope"></i> 이메일 (아이디) <span class="requiredStar">*</span></label>
          <div class="input-group">
            <input type="email" class="form-control" id="userEmail" name="userEmail" placeholder="이메일을 입력하세요" required>
            <button type="button" class="btn btn-outline-info" onclick="checkEmail()">
              <i class="bi bi-envelope-check"></i> 중복 체크
            </button>
          </div>
          <div class="invalid-feedback">이메일을 입력해 주세요.</div>
          <div id="emailError" class="error-message"></div>
          <div id="emailFeedback" class="valid-feedback" style="display:none;">사용 가능한 이메일입니다.</div>
        </div>

        <!-- 비밀번호 -->
        <div class="mb-3">
          <label for="userPw" class="form-label"><i class="bi bi-lock"></i> 비밀번호 <span class="requiredStar">*</span></label>
          <input type="password" class="form-control" id="userPw" name="userPw" required>
          <div class="invalid-feedback">비밀번호를 입력해 주세요.</div>
        </div>

        <!-- 비밀번호 확인 -->
        <div class="mb-3">
          <label for="userPwConfirm" class="form-label"><i class="bi bi-lock-fill"></i> 비밀번호 확인 <span class="requiredStar">*</span></label>
          <input type="password" class="form-control" id="userPwConfirm" name="userPwConfirm" required>
          <div class="invalid-feedback" id="passwordError">비밀번호가 일치하지 않습니다.</div>
        </div>

        <!-- 이름 -->
        <div class="mb-3">
          <label for="name" class="form-label"><i class="bi bi-person"></i> 이름 <span class="requiredStar">*</span></label>
          <input type="text" class="form-control" id="name" name="name" required>
          <div class="invalid-feedback">이름을 입력해 주세요.</div>
        </div>

        <!-- 성별 -->
        <div class="mb-3">
          <label for="userGender" class="form-label"><i class="bi bi-gender-ambiguous"></i> 성별 <span class="requiredStar">*</span></label>
          <select class="form-select" id="userGender" name="userGender" required>
            <option value="" disabled selected>성별을 선택해 주세요</option>
            <option value="M">남자</option>
            <option value="F">여자</option>
          </select>
          <div class="invalid-feedback">성별을 선택해 주세요.</div>
        </div>

        <!-- 생년월일 -->
        <div class="mb-3">
          <label for="userBirth" class="form-label"><i class="bi bi-calendar"></i> 생년월일 <span class="requiredStar">*</span></label>
          <input type="date" class="form-control" id="userBirth" name="userBirth" required>
          <div class="invalid-feedback">생년월일을 입력해 주세요.</div>
        </div>

        <!-- 연락처 -->
        <div class="mb-3">
          <label for="userPhone" class="form-label"><i class="bi bi-telephone"></i> 연락처 <span class="requiredStar">*</span></label>
          <input type="text" class="form-control" id="userPhone" name="userPhone" required>
          <div class="invalid-feedback">연락처를 입력해 주세요.</div>
        </div>

        <!-- 주소 입력 -->
        <div class="mb-3">
          <label for="userPostcode" class="form-label"><i class="bi bi-geo-alt"></i> 우편번호 <span class="requiredStar">*</span></label>
          <div class="input-group">
            <input type="text" id="userPostcode" name="userPostcode" class="form-control" readonly required>
            <button type="button" class="btn btn-outline-primary" onclick="searchAddress('userPostcode', 'userAddress', 'userAddressDetail')">
              <i class="bi bi-search"></i> 주소 찾기
            </button>
            <div class="invalid-feedback">우편번호를 입력해 주세요.</div>
          </div>
        </div>
        <div class="mb-3">
          <label for="userAddress" class="form-label"><i class="bi bi-map"></i> 주소 <span class="requiredStar">*</span></label>
          <input type="text" id="userAddress" name="userAddress" class="form-control" readonly required>
          <div class="invalid-feedback">주소를 입력해 주세요.</div>
        </div>
        <div class="mb-3">
          <label for="userAddressDetail" class="form-label"><i class="bi bi-building"></i> 상세주소 <span class="requiredStar">*</span></label>
          <input type="text" id="userAddressDetail" name="userAddressDetail" class="form-control" required>
          <div class="invalid-feedback">상세주소를 입력해 주세요.</div>
        </div>

        <!-- 학력 -->
        <div class="mb-3">
          <label for="userEduLevel" class="form-label"><i class="bi bi-mortarboard"></i> 최종학력 <span class="requiredStar">*</span></label>
          <select id="userEduLevel" name="userEduLevel" class="form-select" required>
            <option value="">학력을 선택하세요</option>
            <option value="중학교 졸업">중학교 졸업</option>
            <option value="고등학교 졸업">고등학교 졸업</option>
            <option value="대학교 졸업">대학교 졸업</option>
            <option value="석사">석사</option>
            <option value="박사">박사</option>
            <option value="기타">기타</option>
          </select>
          <div class="invalid-feedback">학력을 선택해 주세요.</div>
        </div>

        <!-- 개인정보 동의 -->
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="userPrivacyAgree" name="userPrivacyAgree" required checked>
          <label class="form-check-label" for="userPrivacyAgree">
            <i class="bi bi-shield-lock"></i> 개인정보 수집 및 이용 동의 [필수] <span class="requiredStar">*</span>
          </label>
          <div class="invalid-feedback">개인정보 수집 동의는 필수입니다.</div>
        </div>

        <!-- 마케팅 동의 -->
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="userMarketingAgree" name="userMarketingAgree" checked>
          <label class="form-check-label" for="userMarketingAgree">
            <i class="bi bi-envelope-open"></i> 마케팅 수신 동의 [선택]
          </label>
        </div>

        <!-- 계정 생성 버튼 -->
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle"></i> 강사 계정 등록</button>
        <button class="btn btn-secondary" onclick="history.back()">
          <i class="bi bi-arrow-left-circle"></i>
          뒤로 가기
        </button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
