<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>메타러닝 홍보글 수정 </title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/admindashboard.css">
  <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
  <link rel="stylesheet" href="/static/css/header/adminheader.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<div class="app-container">
  <!-- Header -->
  <div th:replace="~{fragments/adminheader :: adminheader}"></div>
  <div class="content-container">
    <!-- Sidebar -->
    <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>
    <!-- Main Content -->
    <div class="main-content container" style="max-width:800px;">
      <form th:action="@{/admin/course/update/coursedescript/{courseDescriptId}(courseDescriptId=${courseDescriptId})}" method="post" enctype="multipart/form-data" class="p-4 rounded bg-light"
            onsubmit="return validateForm()">

        <h1 class="text-center mb-4">
          <i class="bi bi-pencil-square"></i> 강의 홍보글 수정
        </h1>
        <!-- CSRF Token -->
        <input type="hidden" name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <!-- 강의 상태를 항상 승인으로 설정 -->
        <input type="hidden" name="courseStatus" th:value="${T(com.Meta_learning.course.courseentity.CourseStatus).APPROVED.name()}">


        <fieldset class="border p-4 mb-4">
          <legend class="h4 mb-4"><i class="bi bi-megaphone"></i> 홍보글 입력</legend>
          <!-- 홍보글 상세 -->
          <div class="mb-3">
            <label for="courseDescriptContent" class="form-label">
              <i class="bi bi-pencil"></i> 홍보글 상세 내용<span style="color:red;">*</span>
            </label>
            <textarea id="courseDescriptContent" name="courseDescriptContent" class="form-control" rows="4" th:text="${updateResponse.courseDescriptContent}"></textarea>
          </div>

          <!-- 기존 이미지 목록 -->
          <i class="bi bi-images"></i> 기존 이미지(체크 시 삭제)
          <!-- 수정된 Form -->
          <ul class="sortable-list" id="image-list">
            <li th:each="file : ${updateResponse.courseDescriptFiles}" class="mb-3">
              <div class="d-flex align-items-center">
                <!-- 숨겨진 ID 필드 -->
                <!--<input type="hidden" name="filesToDelete" th:value="${file.courseDescriptFileId}" />-->
                <input type="checkbox" name="filesToDelete" th:value="${file.courseDescriptFileId}" />
                <!-- 이미지 미리보기 -->
                <img th:src="'/static/uploads/course/' + ${file.courseDescriptFiles}"
                     alt="이미지 미리보기"
                     style="max-width: 100px; max-height: 100px; object-fit: cover;"
                     class="me-3 img-thumbnail">

                <!-- 파일 이름 -->
                <span th:text="${file.courseDescriptFiles}" class="me-3"></span>
              </div>
            </li>
          </ul>

          <!-- 새로운 이미지 업로드 -->
          <div class="mb-4">
            <label for="courseDescriptFiles" class="form-label">
              <i class="bi bi-upload"></i> 새로운 이미지 추가:
            </label>
            <input type="file" id="courseDescriptFiles" name="courseDescriptFiles"
                   class="form-control" multiple accept="image/*">
          </div>

        </fieldset>

        <!-- Submit -->
        <div class="d-flex justify-content-between align-items-center">
          <button type="submit" class="btn btn-primary btn-lg" id="submitButton">
            <i class="bi bi-check-circle"></i> 등록
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
