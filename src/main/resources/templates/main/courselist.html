<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>메타러닝 강의 목록</title>
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <link rel="stylesheet" href="/static/css/header/header.css">
    <link rel="stylesheet" href="/static/css/footer/footer.css">
    <script src="/static/js/header/header.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f5f9; }

        h1 { color: #003366; font-weight: 800; }

        .search-bar {
            margin: 2rem auto;
            max-width: 900px;
        }

        .input-group > .form-control { flex: 3 !important; }
        .input-group > .form-select { flex: 1 !important; }

        .form-control, .form-select {
            border: 1.5px solid #e8e8e8;
            border-radius: 8px;
        }
        .form-control:focus, .form-select:focus {
            border-color: #FFA500;
            box-shadow: 0 0 0 3px rgba(255, 165, 0, 0.1);
        }

        .card {
            border: 1px solid #f0f0f0;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 36px rgba(255, 165, 0, 0.1);
            border-color: #FFA500;
        }

        .card img {
            object-fit: cover;
            height: 180px;
        }

        .card-body {
            padding: 16px;
        }

        .card-title {
            color: #003366;
            font-weight: 700;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-text {
            font-size: 0.88rem;
            color: #777;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-container { margin-top: 2rem; }

        .no-thumbnail {
            background: linear-gradient(135deg, #FFF8EE 0%, #FFE0B2 100%);
            color: #E67E00;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.92rem;
            font-weight: 600;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FF8C00, #FFA500);
            border: none;
            font-weight: 600;
            border-radius: 8px;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #e67e00, #FF8C00);
            transform: translateY(-1px);
        }

        .btn-outline-secondary {
            border-color: #ddd;
            color: #666;
            border-radius: 8px;
        }

        .btn-outline-secondary:hover {
            background-color: #FFF3E0;
            border-color: #FFA500;
            color: #FF8C00;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="container">
    <!-- 페이지 헤더 -->
    <div class="text-center py-4">
        <h1><i class="bi bi-play-circle-fill"></i> 온라인 강의</h1>
        <p class="text-muted">다양한 IT 강의를 온라인으로 수강하세요</p>
    </div>

    <div class="search-bar input-group mb-3">
        <!-- 검색창 -->
    </div>

    <!-- 강의 카드 목록 -->
    <div class="card-container row" th:if="${courseList != null and !courseList.isEmpty()}">
        <div th:each="course : ${courseList}" class="col-12 col-sm-6 col-md-4 mb-4">
            <div class="card">
                <img th:if="${course.courseThumbnail != null}" th:src="@{'/static/uploads/course/' + ${course.courseThumbnail}}"
                     class="card-img-top" alt="강의 썸네일">
                <div th:if="${course.courseThumbnail == null}" class="no-thumbnail thumbnail-placeholder" th:text="${course.courseTitle}">
                    썸네일 없음
                </div>

                <div class="card-body">
                    <h5 class="card-title" th:text="${course.courseTitle}">강의 제목</h5>
                    <p class="card-text">
                        카테고리: <span th:text="${course.courseCategory}"></span>
                    </p>
                    <p class="card-text d-flex justify-content-between">
                    <span>
                        난이도:
                        <span th:switch="${course.courseDifficulty.name()}">
                            <span th:case="'ADVANCED'">고급</span>
                            <span th:case="'INTERMEDIATE'">중급</span>
                            <span th:case="'BASIC'">초급</span>
                            <span th:case="'BEGINNER'">입문</span>
                            <span th:case="*">알 수 없음</span>
                        </span>
                    </span>
                    <span>
                        ₩<span class="course-price" th:text="${course.coursePrice}">0</span>
                    </span>
                    </p>
                    <div class="d-flex justify-content-between">
                        <a th:href="@{/main/course/{id}(id=${course.courseId})}" class="btn btn-primary">상세 보기</a>
                 <!--       <button class="btn btn-outline-secondary add-to-cart-button"
                                th:data-course-id="${course.courseId}">
                            <i class="bi bi-cart-plus"></i> 장바구니
                        </button>-->
                        <!-- 로그인 상태에 따라 버튼 표시 -->
                        <button class="btn btn-outline-secondary add-to-cart-button"
                                th:data-course-id="${course.courseId}"
                                th:if="${isAuthenticated and !purchasedCourseIds.contains(course.courseId) and userRole != 'ADMIN'}">
                        <i class="bi bi-cart-plus"></i> 장바구니
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 강의가 없을 때 -->
    <div th:if="${courseList == null or courseList.isEmpty()}" class="text-center py-5" style="min-height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <i class="bi bi-inbox" style="font-size: 3rem; color: #ddd;"></i>
        <p class="text-muted mt-3 mb-0">등록된 강의가 없습니다.</p>
    </div>
</main>


<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const priceElements = document.querySelectorAll(".course-price");
        priceElements.forEach(function (priceElement) {
            const price = parseFloat(priceElement.textContent);
            if (!isNaN(price)) {
                priceElement.textContent = price.toLocaleString('en-US'); // 쉼표로 3자리 단위 포맷팅
            }
        });

      // CSRF 토큰을 메타 태그에서 가져옴
      const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
      const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
      const addToCartButtons = document.querySelectorAll(".add-to-cart-button");

      addToCartButtons.forEach(button => {
          button.addEventListener("click", async function () {
              const courseId = button.dataset.courseId; // 강의 ID 가져오기

               // 버튼에서 부모 요소를 탐색하여 관련된 제목 및 가격 요소를 찾음
                const cardBody = button.closest(".card-body");
                const courseTitleElement = cardBody.querySelector(".card-title"); // 강의 제목
                const courseTitle = courseTitleElement.textContent.trim(); // 강의 제목 가져오기

                // 버튼에서 부모 요소를 탐색하여 관련된 가격 요소를 찾음
               const coursePriceElement = button.closest(".card-body").querySelector(".course-price");

              try {
                     // 세션 확인
                    const sessionResponse = await fetch("/api/user/session", {
                        method: "GET",
                        headers: {
                            "Content-Type": "application/json",
                            [csrfHeader]: csrfToken // CSRF 토큰을 헤더에 추가
                        },
                         redirect: "manual" // 리디렉션 수동 처리
                    });


                    if (sessionResponse.status === 401) {
                        // 비로그인 상태 처리
                        alert("로그인이 필요합니다. 로그인 페이지로 이동합니다.");
                        window.location.href = "/login";
                        return;
                    } else if (sessionResponse.status >= 300 && sessionResponse.status < 400) {
                        // 리디렉션 처리
                        const redirectUrl = sessionResponse.headers.get("Location");
                        if (redirectUrl) {
                            window.location.href = redirectUrl;
                            return;
                        }
                    } else if (!sessionResponse.ok) {
                        throw new Error("세션 확인 중 예상치 못한 오류 발생");
                    }


                    const sessionData = await sessionResponse.json();
                    if (!sessionData.isAuthenticated) {
                        alert("로그인이 필요합니다. 로그인 페이지로 이동합니다.");
                        window.location.href = "/login";
                        return;
                    }

                 // 장바구니 추가 요청
                  const response = await fetch(`/api/user/cart/add/${courseId}`, {
                      method: "POST",
                      headers: {
                          "Content-Type": "application/json",
                          [csrfHeader]: csrfToken // CSRF 토큰을 헤더에 추가
                      }
                  });

                 if (response.ok) {
                      // 장바구니에 추가 성공
                      const rawPrice = parseFloat(coursePriceElement.textContent.replace(/,/g, '')); // 쉼표 제거 후 숫자 변환
                      const formattedPrice = rawPrice.toLocaleString('en-US'); // 3자리 쉼표 포맷팅
                      //coursePriceElement.textContent = formattedPrice; // 포맷팅된 가격 표시

                      alert(`${courseTitle} 강의가 장바구니에 추가되었습니다.`);
                  } else {
                      const errorMessage = await response.text();
                      alert(`${errorMessage}`);
                  }
              } catch (error) {
                  console.error("장바구니 추가 중 오류 발생:", error);
                  alert("장바구니 추가에 실패했습니다.");
              }
          });
      });
  });
</script>
</body>
</html>
