<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메타러닝 비밀번호 변경</title>
    <link rel="stylesheet" href="/static/css/admindashboard.css">
    <link rel="stylesheet" href="/static/css/header/studentsidebar.css">
    <link rel="stylesheet" href="/static/css/header/studentheader.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        .content-inner {
            max-width: 900px; /* 최대 폭 설정 */
            margin: 0 auto; /* 가운데 정렬 */
        }

        .form-container {
            background-color: #f8f9fa; /* 밝은 배경색 */
            border: 1px solid #dee2e6; /* 약간의 테두리 */
            padding: 20px;
            border-radius: 10px; /* 둥근 모서리 */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* 그림자 추가 */
        }

        .text-danger {
            font-size: 0.9rem;
            margin-top: 5px;
            color: red;
        }

        .text-success {
            font-size: 0.9rem;
            margin-top: 5px;
            color: green;
        }
    </style>

    <script>
        function validatePassword() {
            const newPassword = document.getElementById("new-password").value;
            const confirmPassword = document.getElementById("confirm-password").value;
            const errorMessage = document.getElementById("error-message");

            // 비밀번호 조건 정규식 (8자 이상, 영문, 숫자, 특수문자 포함)
            const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;

            // 초기화
            errorMessage.innerText = "";

            // 유효성 검사
            if (!passwordRegex.test(newPassword)) {
                errorMessage.className = "text-danger";
                errorMessage.innerText = "비밀번호는 최소 8자 이상이며, 영문, 숫자, 특수문자를 포함해야 합니다.";
                return false;
            }

            if (newPassword !== confirmPassword) {
                errorMessage.className = "text-danger";
                errorMessage.innerText = "새 비밀번호와 확인 비밀번호가 일치하지 않습니다.";
                return false;
            }

            // 조건 만족 시
            errorMessage.className = "text-success";
            errorMessage.innerText = "비밀번호가 일치합니다.";
            return true;
        }

        function onInputChange() {
            // 입력값 변경 시 실시간으로 유효성 검사
            validatePassword();
        }

        function clearCurrentPasswordError() {
            // 현재 비밀번호 입력 시 경고 메시지 제거
            const currentPasswordError = document.getElementById("current-password-error");
            currentPasswordError.innerText = "";
        }
    </script>
</head>
<body>
<!-- Header -->
<div th:replace="~{fragments/studentheader :: studentheader}"></div>

<!-- Content Container -->
<div class="content-container">
    <!-- Sidebar -->
    <div th:replace="~{fragments/studentsidebar :: studentsidebar}"></div>

    <!-- Main Content Wrapper -->
    <div class="main-content">
        <div class="content-inner p-4">
            <!-- Form Container -->
            <div class="form-container bg-light p-4 rounded shadow-sm">
                <h2 class="mb-4 text-center"><i class="bi bi-lock-fill"></i> 비밀번호 변경</h2>
                <form action="/student/pw/change" method="POST" onsubmit="return validatePassword()">
                    <!-- CSRF Token -->
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <!-- 현재 비밀번호 -->
                    <div class="form-group mb-3">
                        <label for="password" class="form-label"><i class="bi bi-shield-lock-fill"></i> 현재 비밀번호</label>
                        <input type="password" id="password" name="userPw" class="form-control" placeholder="현재 비밀번호를 입력하세요" required oninput="clearCurrentPasswordError()">
                        <!-- 현재 비밀번호 경고 메시지 -->
                        <div id="current-password-error" class="text-danger">
                            <p th:if="${msg}" th:text="${msg}"></p>
                        </div>
                    </div>

                    <!-- 새 비밀번호 -->
                    <div class="form-group mb-3">
                        <label for="new-password" class="form-label"><i class="bi bi-key-fill"></i> 새 비밀번호</label>
                        <input type="password" id="new-password" name="newPw" class="form-control" placeholder="새 비밀번호를 입력하세요" required oninput="onInputChange()">
                    </div>

                    <!-- 새 비밀번호 확인 -->
                    <div class="form-group mb-4">
                        <label for="confirm-password" class="form-label"><i class="bi bi-key"></i> 새 비밀번호 확인</label>
                        <input type="password" id="confirm-password" name="confirmPw" class="form-control" placeholder="새 비밀번호를 다시 입력하세요" required oninput="onInputChange()">
                        <!-- 경고 및 성공 메시지 출력 -->
                        <div id="error-message" class="text-danger"></div>
                    </div>

                    <!-- 제출 버튼 -->
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-save-fill"></i> 비밀번호 변경하기
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
