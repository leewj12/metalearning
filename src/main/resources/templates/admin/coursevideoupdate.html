<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>메타러닝 강의 영상 수정</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/admindashboard.css">
  <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
  <link rel="stylesheet" href="/static/css/header/adminheader.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<div class="app-container">
  <!-- Header -->
  <div th:replace="~{fragments/adminheader :: adminheader}"></div>
  <div class="content-container">
    <!-- Sidebar -->
    <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>
    <!-- Main Content -->
    <div class="main-content container" style="max-width:800px;">
      <form th:action="@{/admin/course/update/coursevideo/{courseVideoId}(courseVideoId=${courseVideoId})}" method="post" enctype="multipart/form-data" class="p-4 rounded bg-light"
            onsubmit="return validateForm()">
        <h1 class="text-center mb-4">
          <i class="bi bi-pencil-square"></i> 강의 영상 수정
        </h1>
        <!-- CSRF Token -->
        <input type="hidden" name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <!-- 강의 상태를 항상 승인으로 설정 -->
        <input type="hidden" name="courseStatus" th:value="${T(com.Meta_learning.course.courseentity.CourseStatus).APPROVED.name()}">

        <div class="mt-4 mb-4 border p-3 rounded detail-item" id="detail">
          <div class="d-flex justify-content-between align-items-center">
            <h5 name="detailNum">강의 영상 수정</h5>
          </div>
          <div class="mb-3">
            <label for="courseDetailTitle" class="form-label">강의 영상 제목<span style="color:red;">*</span> </label>
            <input type="text" id="courseDetailTitle" name="courseDetailTitle" class="form-control" th:value="${updateResponse.courseDetailTitle}" required>
          </div>

          <!-- 업로드 방식 선택 -->
          <div class="mb-3">
            <label class="form-label">업로드 방식 선택</label>
            <div>
              <input type="radio" id="nonEdit" name="uploadType" value="none" checked>
              <label for="nonEdit">파일 수정없음</label>

              <input type="radio" id="uploadFile" name="uploadType" value="file">
              <label for="uploadFile">파일 업로드</label>

              <input type="radio" id="embedVideo" name="uploadType" value="embed">
              <label for="embedVideo">동영상 임베드</label>
            </div>
          </div>

          <!-- 파일 업로드 영역 -->
          <div class="mb-3 upload-section" id="fileUploadDiv">
            <label for="courseDetailFile" class="form-label">
              <i class="bi bi-upload"></i> 파일 업로드 <span style="color:red;">*</span><br>
              (동영상 : .mp4, .avi, .mov, .mkv, .flv, .wmv / 최대 용량: <span th:text="${maxFileSize}"></span>MB 지원)
            </label>
            <input type="file" id="courseDetailFile"
                   name="courseDetailFile" class="form-control"
                   accept="video/*">
          </div>

          <!-- 동영상 URL 입력 영역 (기본 숨김) -->
          <div class="mb-3 upload-section" id="videoEmbedDiv">
            <label for="courseVideoUrl" class="form-label">
              <i class="bi bi-youtube"></i> 유튜브 동영상 URL 입력 <span style="color:red;">*</span>
            </label>
            <input type="text" id="courseVideoUrl"
                   name="courseVideoUrl" class="form-control"
                   placeholder="youtube embed url 주소를 입력바랍니다.">
          </div>
        </div>

        <!-- 강의 세부 정보 -->
        <div id="detailsContainer" class="mt-4">

        </div>

        <!-- Submit -->
        <div class="d-flex justify-content-between align-items-center">
          <button type="submit" class="btn btn-primary btn-lg" id="submitButton">
            <i class="bi bi-check-circle"></i> 등록
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
<script>
  document.addEventListener("DOMContentLoaded", function () {
      const form = document.querySelector("form");
      const uploadFileRadio = document.getElementById("uploadFile");
      const embedVideoRadio = document.getElementById("embedVideo");
      const nonEditRadio = document.getElementById("nonEdit");

      const fileUploadDiv = document.getElementById("fileUploadDiv");
      const videoEmbedDiv = document.getElementById("videoEmbedDiv");

      function toggleUploadType() {
          if(nonEditRadio.checked){
              fileUploadDiv.style.display = "none";
              videoEmbedDiv.style.display = "none";
              form.setAttribute("enctype", "none");  // 수정 없음
          } else if (uploadFileRadio.checked) {
              fileUploadDiv.style.display = "block";
              videoEmbedDiv.style.display = "none";
              form.setAttribute("enctype", "multipart/form-data");  // 파일 업로드 설정
          } else if (embedVideoRadio.checked){
              fileUploadDiv.style.display = "none";
              videoEmbedDiv.style.display = "block";
              form.setAttribute("enctype", "application/x-www-form-urlencoded");  // URL 전송 설정
          }
      }

      // 초기 상태 설정
      toggleUploadType();

      // 라디오 버튼 변경 시 이벤트 바인딩
      nonEditRadio.addEventListener("change", toggleUploadType);
      uploadFileRadio.addEventListener("change", toggleUploadType);
      embedVideoRadio.addEventListener("change", toggleUploadType);
  });


  // 유효성 검사 함수
  function validateForm() {

      const maxFileSize = [[${maxFileSize}]] * 1024 * 1024; // MB -> Bytes로 변환
      const maxRequestSize = [[${maxRequestSize}]] * 1024 * 1024; // MB -> Bytes로 변환

      let sumFileSize=0;
      const detailTitle = document.getElementById("courseDetailTitle");
      const uploadTypeFile = document.getElementById("uploadFile");
      const uploadTypeEmbed = document.getElementById("embedVideo");
      const detailFile = document.getElementById("courseDetailFile");
      const videoUrl = document.getElementById("courseVideoUrl");

      if (!detailTitle || detailTitle.value.trim() === "") {
          alert(`강의 영상 업로드 ${i+1}의 제목을 입력해주세요.`);
          detailTitle.focus();
          return false;
      }

      if (uploadTypeFile && uploadTypeFile.checked && (!detailFile || detailFile.value.trim() === "")) {
          alert(`강의 영상 업로드 ${i+1}의 파일을 업로드해주세요.`);
          detailFile.focus();
          return false;
      }

      // 파일 크기 확인
      if (uploadTypeFile && uploadTypeFile.checked && detailFile.files && detailFile.files[0]) {
          let fileSize = detailFile.files[0].size
          sumFileSize+= fileSize;
          if (fileSize > maxFileSize) {
              alert(`파일 크기는 ${maxFileSize / 1024 / 1024}MB를 초과할 수 없습니다.`);
              detailFile.focus();
              return false;
          }
          if (sumFileSize > maxRequestSize) {
              alert(`총 파일 크기는 ${maxRequestSize / 1024 / 1024}MB를 초과할 수 없습니다.`);
              detailFile.focus();
              return false;
          }
      }

      if (uploadTypeEmbed && uploadTypeEmbed.checked && (!videoUrl || videoUrl.value.trim() === "")) {
          alert(`강의 영상 업로드 ${i+1}의 유튜브 동영상 URL을 입력해주세요.`);
          videoUrl.focus();
          return false;
      }

      const submitButton = document.getElementById('submitButton');
      submitButton.disabled = true;  // 제출 버튼 비활성화

      return true; // 모든 검사를 통과하면 폼 제출
  }
</script>
</html>
