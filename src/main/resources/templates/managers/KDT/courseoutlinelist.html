<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>메타러닝 강의 폴더 목록</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/admindashboard.css">
  <link rel="stylesheet" href="/static/css/header/managersidebar.css">
  <link rel="stylesheet" href="/static/css/header/managerheader.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

  <style>
    .btn-register {
      display: block;
      margin: 30px auto;
      text-align: center;
      padding: 10px 20px;
      font-size: 16px;
      font-weight: bold;
      background-color: #0d6efd;
      color: white;
      border: none;
      border-radius: 5px;
      text-decoration: none;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: background-color 0.2s ease-in-out;
    }

    .btn-register:hover {
      background-color: #0056b3;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="app-container">
  <!-- Header -->
  <div th:replace="~{fragments/managerheader :: managerheader}"></div>
  <div class="content-container">
    <!-- Sidebar -->
    <div th:replace="~{fragments/managersidebar :: managersidebar}"></div>
    <!-- Main Content -->
    <div class="main-content">
      <div class="p-4" style="background-color: #f8f9fa; border-radius: 10px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);">

        <h1 th:text="${outlines[0].kdtSessionEntity.kdtSessionTitle + '(' + outlines[0].kdtSessionEntity.kdtSessionNum + '회차)'}"></h1>

        <h1 class="text-left"><i class="bi bi-list-ul"></i> 강의 폴더 목록</h1>

        <!-- Table -->
        <table class="table table-bordered table-striped mt-4">
          <thead class="table-dark">
          <tr>
            <th class="text-center" style="width: 10%;"> 번호</th>
            <th class="text-center" style="width: 40%; "><i class="bi bi-folder"></i> 강의 폴더</th>
            <th class="text-center" style="width: 15%;"><i class="bi bi-pencil-square"></i> 수정</th>
            <th class="text-center" style="width: 15%;"><i class="bi bi-trash"></i> 삭제</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="outline, iterStat : ${outlines}">
            <td class="text-center" th:text="${iterStat.index + 1}"></td>
            <td class="text-center">
              <a th:href="@{/managers/KDT/{kdtSessionId}/courseoutline/{kdtCourseOutlineId}/coursevideo/list(kdtSessionId=${outline.kdtSessionEntity.kdtSessionId}, kdtCourseOutlineId=${outline.kdtCourseOutlineId})}">
                <i class="bi bi-file-text"></i> <span th:text="${outline.kdtCourseOutline}"></span>
              </a>
            </td>
            <td class="text-center">
              <a th:href="@{/managers/KDT/{sessionId}/courseoutline/update/{outlineId}(sessionId=${outline.kdtSessionEntity.kdtSessionId}, outlineId=${outline.kdtCourseOutlineId})}">
                <button class="btn btn-warning btn-sm"><i class="bi bi-pencil"></i> 수정</button>
              </a>
            </td>
            <td class="text-center">
              <button class="btn btn-danger btn-sm" th:onclick="'deleteOutline(' + ${outline.kdtCourseOutlineId} + ', ' + ${outline.kdtSessionEntity.kdtSessionId} + ')'">
                <i class="bi bi-trash"></i> 삭제
              </button>
            </td>
          </tr>
          </tbody>
        </table>

        <!-- Register Button -->
        <div class="d-flex justify-content-center mt-4 gap-3">
          <a th:href="@{/managers/KDT/{sessionId}/courseoutline(sessionId=${kdtSessionId})}" class="btn btn-primary btn-lg">
            <i class="bi bi-plus-circle"></i> 폴더 생성
          </a>
          <a th:href="@{'/view/manager/KDT/session/' + ${kdtSessionId}}" class="btn btn-secondary btn-lg">
            <i class="bi bi-list"></i> 돌아가기
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // CSRF 토큰을 헤더에 추가하기 위한 함수
function getCsrfToken() {
  return document.querySelector('meta[name="_csrf"]').getAttribute('content');
}

function getCsrfHeaderName() {
  return document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
}

function deleteOutline(outlineId, sessionId) {
  const url = `/api/manager/KDT/${sessionId}/courseoutline/delete/${outlineId}`;
  console.log("Deleting outline with URL:", url); // 확인용 로그

  const csrfToken = getCsrfToken();
  const csrfHeaderName = getCsrfHeaderName();

  if (!confirm('정말 삭제하시겠습니까?')) {
      return;
  }

  fetch(url, {
      method: 'DELETE',
      headers: {
          'Content-Type': 'application/json',
          [csrfHeaderName]: csrfToken  // CSRF 토큰을 헤더에 포함
      }
  })
  .then(response => {
      if (response.ok) {
          alert('삭제되었습니다.');
          location.reload();
      } else {
          response.text().then(errMsg => {
              // 서버에서 보내온 에러 메시지를 확인하고 동영상이 있을 경우 알림
              if (errMsg === "강의 폴더 안에 파일이 있다면, 폴더를 삭제할 수 없습니다.") {
                  alert(errMsg); // 동영상이 있어서 삭제할 수 없을 때
              } else {
                  alert("삭제 중 오류가 발생했습니다.");
              }
          });
      }
  })
  .catch(error => {
      console.error("Error during fetch:", error);
      alert('삭제 중 오류가 발생했습니다.');
  });
}

</script>

</body>
</html>
