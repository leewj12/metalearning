<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메타러닝 학생 회차정보</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/admindashboard.css">
  <link rel="stylesheet" href="/static/css/header/studentsidebar.css">
  <link rel="stylesheet" href="/static/css/header/studentheader.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<!-- Header -->
<div th:replace="~{fragments/studentheader :: studentheader}"></div>

<div class="content-container">
  <!-- Sidebar -->
  <div th:replace="~{fragments/studentsidebar :: studentsidebar}" class="sidebar"></div>

  <!-- Main Content -->
  <div class="main-content">
    <!-- 홍보글 -->
<!--    <div class="promo-section text-center p-4 bg-light rounded">-->
<!--      <h2><i class="bi bi-lightbulb"></i> 메타러닝과 함께라면 성공적인 학습이 가능합니다!</h2>-->
<!--      <p>메타러닝은 혁신적인 학습 플랫폼으로, 학생들이 더 효과적으로 학습할 수 있도록 도와줍니다. 언제 어디서나 원하는 시간에 학습을 이어가세요. 여러분의 성공을 지원하는 메타러닝!</p>-->
<!--      <a href="#" class="btn btn-primary mt-3"><i class="bi bi-arrow-right-circle"></i> 지금 시작하기</a>-->
<!--    </div>-->

    <!-- 내 세션 목록 -->
    <h2 class="text-center"><i class="bi bi-list-check"></i> 참여 과정 정보</h2>
    <div class="session-list">
      <div th:if="${sessions != null}" class="session-card p-3 mb-4 border rounded">
        <!-- 세션 정보 -->
        <h4 class="text-primary"><i class="bi bi-journal-text"></i> <span th:text="${sessions[0].kdtSessionTitle}"></span></h4>
        <p><strong>상태:</strong> <i class="bi bi-circle"></i> <span th:text="${sessions[0].kdtSessionStatus}"></span></p>
        <p><strong>시작일:</strong> <i class="bi bi-calendar"></i> <span th:text="${sessions[0].kdtSessionStartDate}"></span></p>
        <p><strong>종료일:</strong> <i class="bi bi-calendar-x"></i> <span th:text="${sessions[0].kdtSessionEndDate}"></span></p>
        <p><strong>카테고리:</strong> <i class="bi bi-tags"></i> <span th:text="${sessions[0].kdtSessionCategory}"></span></p>
        <p><strong>교육 일수:</strong> <i class="bi bi-clock"></i> <span th:text="${sessions[0].kdtSessionTotalDay}"></span>일</p>
        <p><strong>하루 교육 시간:</strong> <i class="bi bi-hourglass-split"></i> <span th:text="${sessions[0].kdtSessionOnedayTime}"></span>시간</p>
        <p><strong>총 교육 시간:</strong> <i class="bi bi-alarm"></i> <span th:text="${sessions[0].kdtSessionTotalTime}"></span>시간</p>
        <p><strong>온라인 여부:</strong> <i class="bi bi-laptop"></i> <span th:text="${sessions[0].kdtSessionOnline} ? '온라인' : '오프라인'"></span></p>
        <p><strong>최대 수용 인원:</strong> <i class="bi bi-people"></i> <span th:text="${sessions[0].kdtSessionMaxCapacity}"></span>명</p>
        <p><strong>세션 설명:</strong> <i class="bi bi-chat-square-text"></i> <span th:text="${sessions[0].kdtSessionDescript}"></span></p>
        <p><strong>주소:</strong> <i class="bi bi-geo-alt"></i> <span th:text="${sessions[0].kdtSessionAddress} + ' ' + ${sessions[0].kdtSessionAddressDetail}"></span></p>
      </div>
    </div>

    <div>
      <a th:href="@{/student/KDT/{session}/detail/detail(session=${sessions[0].kdtSessionId})}" class="btn btn-info">
        <i class="bi bi-list"></i> 상세 정보
      </a>
    </div>

    <!-- 나의 학습 현황 -->
    <div class="student-info-section">
      <h3 class="text-center my-5"><i class="bi bi-bar-chart"></i> 나의 학습 현황</h3>
      <div class="row text-center">
        <div class="col-md-6">
          <div class="info-card p-3 bg-light rounded">
            <h4><i class="bi bi-folder"></i> 강의 자료실</h4>
            <p>필요한 강의 자료를 확인하고 학습하세요!</p>
            <a th:href="@{/student/KDT/{sessionId}/board/materiallist(sessionId=${sessions[0].kdtSessionId})}"
               class="btn btn-primary">
              <i class="bi bi-folder"></i> 강의 자료실 보기
            </a>
          </div>
        </div>
        <div class="col-md-6">
          <div class="info-card p-3 bg-light rounded">
            <h4><i class="bi bi-clipboard-check"></i> 나의 출석부</h4>
            <p>출석 현황을 확인하고, 학습 진행 상황을 점검해 보세요.</p>
            <a th:href="@{/view/student/KDT/{sessionId}/att/detail(sessionId=${sessions[0].kdtSessionId})}"
               class="btn btn-success">
              <i class="bi bi-clipboard-check"></i> 출석부 보기
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- 세션이 없을 때 -->
    <div th:if="${!hasSessions}" class="no-sessions text-center mt-5">
      <p><i class="bi bi-info-circle"></i> 현재 등록된 세션이 없습니다.</p>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
