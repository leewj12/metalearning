<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메타러닝 국비 과정 등록</title>
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/static/css/admindashboard.css">
    <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
    <link rel="stylesheet" href="/static/css/header/adminheader.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        .main-content {
            width: 80%;
        }
    </style>
</head>
<body>
<!-- Header -->
<div th:replace="~{fragments/adminheader :: adminheader}"></div>

<div class="content-container">
    <!-- Sidebar -->
    <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>

    <!-- Main Content -->
    <div class="main-content container mt-4">
        <h1 class="mb-4 text-center"><i class="bi bi-file-earmark-plus"></i> 국비 과정 등록</h1>

        <!-- 국비 과정 등록 폼 -->
        <form action="/admin/KDT/course" method="post" class="mx-auto" id="courseForm">
            <!-- CSRF Token -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <!-- 과정명 입력 -->
            <div class="form-group mb-3">
                <label for="kdtCourseTitle" class="form-label">
                    <i class="bi bi-journal-text"></i> 국비 과정명<span style="color:red;">*</span>
                </label>
                <input type="text" id="kdtCourseTitle" name="kdtCourseTitle" required class="form-control" placeholder="과정명을 입력하세요">
            </div>

            <!-- 수강 상태 -->
            <div class="form-group mb-3">
                <label for="kdtCourseStatus" class="form-label">
                    <i class="bi bi-toggle-on"></i> 수강 상태<span style="color:red;">*</span>
                </label>
                <select id="kdtCourseStatus" name="kdtCourseStatus" required class="form-select">
                    <option value="true">활성화</option>
                    <option value="false">비활성화</option>
                </select>
            </div>

            <!-- 국비 과정 종류 -->
            <div class="form-group mb-4">
                <label for="kdtCourseType" class="form-label">
                    <i class="bi bi-list-ul"></i> 국비 과정 종류<span style="color:red;">*</span>
                </label>
                <select id="kdtCourseType" name="kdtCourseType" required class="form-select" onchange="updateCourseTypeValue()">
                    <option value="">국비과정명을 선택해주세요</option>
                    <option value="K-디지털 트레이닝">K-디지털 트레이닝</option>
                    <option value="국가기간 전략산업 직종훈련">국가기간 전략산업 직종훈련</option>
                    <option value="산업구조 변화대응 특화훈련">산업구조 변화대응 특화훈련</option>
                    <option value="청년층 취업훈련">청년층 취업훈련</option>
                    <option value="기타">기타(직접입력)</option>
                </select>
            </div>

            <!-- 등록 버튼 -->
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-check-circle"></i> 등록
            </button>
        </form>
    </div>
</div>

<script>
    function updateCourseTypeValue() {
        var courseTypeSelect = document.getElementById("kdtCourseType");

        // '기타'가 선택되면 입력 필드를 동적으로 생성
        if (courseTypeSelect.value === "기타") {
            if (!document.getElementById("otherInput")) {
                var otherInputDiv = document.createElement("div");
                otherInputDiv.id = "otherInput";
                otherInputDiv.style.marginTop = "10px";

                var label = document.createElement("label");
                label.setAttribute("for", "otherCourse");
                label.className = "form-label";
                label.textContent = "기타 과정 입력";

                var input = document.createElement("input");
                input.type = "text";
                input.id = "otherCourse";
                input.name = "kdtCourseType";
                input.className = "form-control";
                input.placeholder = "과정명을 입력해주세요";
                input.required = true;

                otherInputDiv.appendChild(label);
                otherInputDiv.appendChild(input);
                document.querySelector(".form-group.mb-4").appendChild(otherInputDiv);
            }
        } else {
            // '기타' 외의 값이 선택되면 입력 필드를 제거
            var otherInputDiv = document.getElementById("otherInput");
            if (otherInputDiv) {
                otherInputDiv.remove();
            }
        }
    }

    // 폼 제출 시 유효성 검사
    document.getElementById('courseForm').onsubmit = function(event) {
        var courseTypeSelect = document.getElementById("kdtCourseType");
        var otherCourseInput = document.getElementById("otherCourse");
        var courseTitle = document.getElementById("kdtCourseTitle");

        // 과정명 입력 여부 확인
        if (courseTitle.value.trim() === "") {
            alert("과정명을 입력해주세요.");
            courseTitle.focus();
            event.preventDefault(); // 폼 제출 막기
            return false;
        }

        // 국비 과정명이 선택되지 않았을 경우
        if (courseTypeSelect.value === "") {
            alert("국비 과정명을 선택해주세요.");
            courseTypeSelect.focus();
            event.preventDefault(); // 폼 제출 막기
            return false;
        }

        // '기타'가 선택되었을 때 입력값을 `kdtCourseType`의 값으로 설정
        if (courseTypeSelect.value === "기타") {
            if (otherCourseInput && otherCourseInput.value.trim() !== "") {
                // 입력한 값을 `kdtCourseType`의 값으로 설정
                courseTypeSelect.value = otherCourseInput.value;
            } else {
                alert("기타 과정명을 입력해주세요.");
                event.preventDefault(); // 폼 제출 막기
                return false; // 폼 제출 취소
            }
        } else {
            // "기타" 외의 옵션이 선택된 경우, `otherCourse` 값을 폼에 제출하지 않도록 처리
            otherCourseInput.value = ""; // 기타 값을 선택하지 않으면 `otherCourse` 값 초기화
        }
    }

    // 처음 페이지가 로드될 때 선택된 값에 따라 동작하도록 추가
    window.onload = function() {
        updateCourseTypeValue();
    }
</script>

</body>
</html>
