<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메타러닝 관리자 KDT 게시글 작성</title>
    <link rel="stylesheet" href="/static/css/admindashboard.css">
    <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
    <link rel="stylesheet" href="/static/css/header/adminheader.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="app-container">
    <!-- Header -->
    <div th:replace="~{fragments/adminheader :: adminheader}"></div>
    <div class="content-container">
        <!-- Sidebar -->
        <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>
        <!-- Main Content -->
        <div class="main-content d-flex justify-content-center align-items-start">
            <div style="max-width: 900px;">
            <!-- 회차 정보 표시 -->
            <h3><i class="bi bi-info-circle"></i> 회차 정보</h3>
            <div class="container">
                <!-- 시작일, 종료일, 교육 시간, 총 교육일 -->
                <div class="row">
                    <!-- 시작일 -->
                    <div class="col-md-6">
                        <p><strong><i class="bi bi-calendar-event"></i> 시작일:</strong> <span th:text="${sessionsDetail.kdtSessionStartDate}"></span></p>
                    </div>
                    <!-- 종료일 -->
                    <div class="col-md-6">
                        <p><strong><i class="bi bi-calendar-event-fill"></i> 종료일:</strong> <span th:text="${sessionsDetail.kdtSessionEndDate}"></span></p>
                    </div>
                </div>

                <!-- 나머지 정보 -->
                <p><strong><i class="bi bi-clipboard"></i> 회차 제목:</strong> <span th:text="${sessionsDetail.kdtSessionTitle}"></span></p>
                <p><strong><i class="bi bi-textarea"></i> 회차 설명:</strong> <span th:text="${sessionsDetail.kdtSessionDescript}"></span></p>
            </div>

            <h2><i class="bi bi-pencil"></i> 게시글 작성</h2>

            <!-- 게시글 작성 폼 -->
            <form th:action="@{/admin/KDT/{sessionId}/board(sessionId=${sessionsDetail.kdtSessionId})}" method="post" enctype="multipart/form-data">
                <!-- CSRF 토큰 -->
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">

                <!-- 게시글 제목 -->
                <div class="form-group mt-3">
                    <label for="kdtBoardTitle"><i class="bi bi-type"></i> 게시글 제목<span style="color:red;">*</span></label>
                    <input type="text" class="form-control" id="kdtBoardTitle" name="kdtBoardTitle" placeholder="제목을 입력하세요" required>
                </div>

                <!-- 게시글 카테고리 선택 -->
                <div class="form-group mt-3">
                    <label for="kdtBoardCategory"><i class="bi bi-list-task"></i> 카테고리<span style="color:red;">*</span> </label>
                    <select id="kdtBoardCategory" name="kdtBoardCategory" class="form-control">
                        <option value="">카테고리를 선택하세요</option>
                        <th:block th:each="category : ${categories}">
                            <option th:value="${category}" th:text="${category.description}"></option>
                        </th:block>
                    </select>
                </div>

                <!-- 게시글 내용 -->
                <div class="form-group mt-3">
                    <label for="kdtBoardContent"><i class="bi bi-card-text"></i> 게시글 내용<span style="color:red;">*</span> </label>
                    <textarea class="form-control" id="kdtBoardContent" name="kdtBoardContent" rows="5" placeholder="내용을 입력하세요" required></textarea>
                </div>

                <!-- 여러 파일 첨부 -->
                <div class="form-group mt-3">
                    <label for="file"><i class="bi bi-paperclip"></i> 파일 첨부</label>
                    <input type="file" class="form-control" id="file" name="file" accept="image/*,application/pdf" multiple>
                    <small class="form-text text-muted">여러 개의 파일을 선택할 수 있습니다.</small>
                </div>

                <!-- 제출 및 다시 작성 버튼 -->
                <div class="d-flex justify-content-center mt-4 gap-3">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-cloud-arrow-up"></i> 게시글 작성
                    </button>
                    <button type="reset" class="btn btn-danger">
                        <i class="bi bi-arrow-counterclockwise"></i> 다시 작성
                    </button>
                    <!-- History Back Button -->
                    <button class="btn btn-secondary" onclick="history.back()">
                        <i class="bi bi-arrow-left-circle"></i>
                        뒤로 가기
                    </button>
                </div>
            </form>
        </div>
        </div>
    </div>
</div>
</body>
</html>
