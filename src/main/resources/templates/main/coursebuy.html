<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메타러닝 강의 상세</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/header/header.css">
  <link rel="stylesheet" href="/static/css/footer/footer.css">
  <script src="/static/js/header/header.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    .thumbnail {
        max-width: 200px;
        max-height: 200px;
        object-fit: cover;
    }
    .card-header {
        background-color: #007bff;
        color: white;
    }
    .card-body h5, .card-body p {
        margin-bottom: 10px;
    }
    /* 테이블 스타일 */
    table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
    }
    th, td {
        padding: 12px;
        text-align: left;
        border: 1px solid #ddd;
    }
    th {
        background-color: #f4f4f4;
    }
    tr:hover {
        background-color: #f1f1f1;
    }
    .btn-link {
        text-decoration: none;
    }


  .no-thumbnail .thumbnail-placeholder {
    background-color: #add8e6;
    color: #004085;
    padding: 20px;
    border-radius: 8px;
    text-align: center;
    word-wrap: break-word;  /* 긴 텍스트가 넘칠 경우 줄 바꿈 */
    width: 220px;  /* 고정된 가로 크기 */
    height: 180px; /* 고정된 세로 크기 */
    box-sizing: border-box; /* padding을 포함하여 크기 계산 */
    display: flex;
    justify-content: center; /* 가로 중앙 정렬 */
    align-items: center;     /* 세로 중앙 정렬 */
    overflow: hidden;  /* 넘치는 텍스트가 있을 경우 잘라냄 */
  }
  </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4" style="max-width:1000px;">
  <h1 class="text-center mb-4"><i class="bi bi-info-circle"></i> 온라인 강의 상세 정보</h1>
  <div class="card mb-4">
    <div class="card-header">
      <h4>강의 기본 정보</h4>
    </div>
    <div class="card-body">
      <div style="display: flex; gap: 20px; align-items: center;">
        <div>
          <img th:if="${updateResponse.courseThumbnail != null}"
               th:src="'/static/uploads/course/' + ${updateResponse.courseThumbnail}"
               alt="강의 썸네일"
               class="thumbnail img-thumbnail">
          <div th:if="${updateResponse.courseThumbnail == null}" class="no-thumbnail">
            <div class="thumbnail-placeholder" th:text="${updateResponse.courseTitle}">
              썸네일 없음
            </div>
          </div>
        </div>
        <div>
          <!-- 강의 정보 내용 영역-->
          <p><strong>강의 제목:</strong> <span th:text="${updateResponse.courseTitle}"></span></p>
          <p th:if="${updateResponse.courseDescript !=null and updateResponse.courseDescript != ''}"><strong>강의 설명:</strong> <span th:text="${updateResponse.courseDescript}"></span></p>
          <p><strong>가격:</strong> <span class="course-price" th:text="${updateResponse.coursePrice}"></span></p>
          <p th:if="${updateResponse.courseCategory !=null and updateResponse.courseCategory != ''}"><strong>카테고리:</strong> <span th:text="${updateResponse.courseCategory}"></span></p>
          <p><strong>난이도:</strong>
            <span th:switch="${updateResponse.courseDifficulty.name()}">
            <span th:case="'ADVANCED'">고급</span>
            <span th:case="'INTERMEDIATE'">중급</span>
            <span th:case="'BASIC'">초급</span>
            <span th:case="'BEGINNER'">입문</span>
            <span th:case="*">알 수 없음</span>
          </span></p>
        </div>
      </div>
    </div>
  </div>
  <!-- 세부 정보 -->
  <div class="card mb-4">
    <div class="card-header bg-success text-white">
      <h4>강의 세부 정보</h4>

    </div>
    <div class="card-body">
      <div th:each="detail : ${updateResponse.courseDetails}" class="mb-3">
        <div th:if="${detail.courseDetailFileUUID != null}" style="border: 1px solid #ddd; padding: 10px;">
          <p><strong>강의 자료</strong></p>
          <p>
            파일명:
            <span th:text="${detail.courseDetailTitle}"></span></p>
            <a th:href="'/static/uploads/course_files/' + ${detail.courseDetailFileUUID}" th:download="${detail.courseDetailFileUUID}" target="_blank" class="btn btn-success btn-sm">자료 다운로드</a>
          </p>
        </div>
      </div>


      <table>
        <thead>
        <tr>
          <th>번호</th>
          <th>강의영상제목</th>
        </tr>
        </thead>
        <tbody>
        <!-- 번호가 1씩 증가하도록 추가된 부분 -->
        <tr th:each="detail, iterStat : ${updateResponse.courseDetails}" th:if="${detail.courseDetailFileUUID == null}">
          <td>
            <!-- 번호 출력: iterStat.index는 0부터 시작하므로 1을 더해줍니다 -->
            <span th:text="${iterStat.index}"></span>
          </td>
          <td>
            <!-- 세부 제목에 링크 추가, courseId도 URL 경로에 포함 -->
            <a th:href="@{/main/course/detail/{courseId}/{courseDetailId}(courseId=${updateResponse.courseId}, courseDetailId=${detail.courseDetailId})}"
               th:text="${detail.courseDetailTitle}" class="btn-link"></a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="d-flex justify-content-center mb-4 gap-3">
    <a class="btn btn-secondary btn-back" href="/main/course">
      <i class="bi bi-arrow-left-circle"></i> 강의 목록으로 돌아가기
    </a>
  </div>



</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const priceElements = document.querySelectorAll(".course-price");
    priceElements.forEach(function (priceElement) {
      let price = parseFloat(priceElement.textContent.replace(/[^0-9.-]+/g, ""));  // 쉼표 제거하고 숫자만 가져오기
      if (!isNaN(price)) {
        priceElement.textContent = price.toLocaleString('ko-KR'); // 쉼표로 3자리 단위 포맷팅
      }
    });
  });
</script>
</body>
</html>
