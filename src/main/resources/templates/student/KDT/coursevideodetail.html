<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메타러닝 동영상 상세</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/admindashboard.css">
  <link rel="stylesheet" href="/static/css/header/studentsidebar.css">
  <link rel="stylesheet" href="/static/css/header/studentheader.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

  <link rel="stylesheet" href="/static/css/admin/KDT/coursevideodetail.css">
</head>
<body>
<div class="app-container">
  <!-- Header -->
  <div th:replace="~{fragments/studentheader :: studentheader}"></div>
  <div class="content-container">
    <!-- Sidebar -->
    <div th:replace="~{fragments/studentsidebar :: studentsidebar}"></div>
    <!-- Main Content -->
    <div class="main-content container">
      <!-- Video Title -->
      <h1 th:text="${video.kdtCourseVideoTitle}">동영상 제목</h1>

      <!-- Video Details -->
      <p>
        <i class="bi bi-tag"></i> 카테고리:
        <span th:text="${video.kdtCourseVideoCategory}"></span>
      </p>
      <p>
        <i class="bi bi-clock"></i> 업로드 시간:
        <span th:text="${#temporals.format(video.kdtCourseVideoCreatedAt, 'yyyy-MM-dd HH:mm')}"></span>
      </p>


      <!-- 동영상 재생 -->
      <div class="card mb-4">
        <div class="card-header bg-success text-white">
          <h4>강의 영상</h4>
        </div>
        <div class="card-body text-center">

          <!-- 유튜브 영상이면 iframe으로 표시 -->
          <div th:if="${video.kdtCourseVideoUUID.contains('youtube.com') or video.kdtCourseVideoUUID.contains('youtu.be')}">
            <iframe width="800" height="450"
                    th:src="${video.kdtCourseVideoUUID}"
                    frameborder="0"
                    allowfullscreen>
            </iframe>
          </div>

          <!-- 유튜브가 아닐 경우 (S3 등) HTML5 video 태그로 재생 -->
          <div th:if="!(${video.kdtCourseVideoUUID.contains('youtube.com')} or ${video.kdtCourseVideoUUID.contains('youtu.be')})">
            <video controls width="800" height="450">
              <source th:src="${video.kdtCourseVideoUUID}" type="video/mp4" />
              동영상 재생을 지원하지 않는 브라우저입니다.
            </video>
          </div>
        </div>
      </div>
      <!-- Video Player -->
      <!--      <div class="video-container">-->
      <!--        <video controls width="800" height="450">-->
      <!--          <source th:src="'/stream/video?videoUrl=' + ${video.kdtCourseVideoUUID}" type="video/mp4" />-->
      <!--          동영상 재생을 지원하지 않는 브라우저입니다.-->
      <!--        </video>-->
      <!--      </div>-->

      <!-- Back Button -->
      <div class="btn-back-container">
        <a class="btn-back" th:href="@{/student/KDT/{kdtSessionId}/courseoutline/{kdtCourseOutlineId}/coursevideo/list(kdtSessionId=${kdtSessionId}, kdtCourseOutlineId=${kdtCourseOutlineId})}">
          <i class="bi bi-arrow-left-circle"></i> 목차로 돌아가기
        </a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
