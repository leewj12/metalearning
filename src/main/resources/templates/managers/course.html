<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>메타러닝 강의 등록</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/admindashboard.css">
  <link rel="stylesheet" href="/static/css/header/managersidebar.css">
  <link rel="stylesheet" href="/static/css/header/managerheader.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<div class="app-container">
  <!-- Header -->
  <div th:replace="~{fragments/managerheader :: managerheader}"></div>
  <div class="content-container">
    <!-- Sidebar -->
    <div th:replace="~{fragments/managersidebar :: managersidebar}"></div>
    <!-- Main Content -->
    <div class="main-content container" style="max-width:800px;">
      <form th:action="@{/manager/course}" method="post" enctype="multipart/form-data" class="p-4 rounded bg-light">
      <h1 class="text-center mb-4">
        <i class="bi bi-pencil-square"></i> 강의 등록
      </h1>
        <!-- CSRF Token -->
        <input type="hidden" name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <!-- 강의 상태를 항상 대기로 설정 -->
        <input type="hidden" name="courseStatus" th:value="${T(com.Meta_learning.course.courseentity.CourseStatus).PENDING.name()}">

        <!-- 강의 기본 정보 -->
        <div class="mb-3">
          <label for="courseThumbnail" class="form-label">
            <i class="bi bi-image"></i> 강의 썸네일<span style="color:red;">*</span>
          </label>
          <input type="file" id="courseThumbnail" name="courseThumbnail" class="form-control" accept="image/*" required>
        </div>

        <div class="mb-3">
          <label for="courseTitle" class="form-label">
            <i class="bi bi-card-text"></i> 강의 제목<span style="color:red;">*</span>
          </label>
          <input type="text" id="courseTitle" name="courseTitle" class="form-control" placeholder="강의 제목을 입력하세요" required>
        </div>

        <div class="mb-3">
          <label for="courseDescript" class="form-label">
            <i class="bi bi-card-text"></i> 강의 설명<span style="color:red;">*</span>
          </label>
          <textarea id="courseDescript" name="courseDescript" class="form-control" rows="5" placeholder="강의 설명을 입력하세요" required></textarea>
        </div>

        <div class="mb-3">
          <label for="coursePrice" class="form-label">
            <i class="bi bi-cash"></i> 강의 가격<span style="color:red;">*</span>
          </label>
          <input type="number" id="coursePrice" name="coursePrice" class="form-control" placeholder="가격을 입력하세요" required>
        </div>

        <div class="mb-3">
          <label for="courseCategory" class="form-label">
            <i class="bi bi-tag"></i> 강의 카테고리<span style="color:red;">*</span>
          </label>
          <input type="text" id="courseCategory" name="courseCategory" class="form-control" placeholder="카테고리를 입력하세요" required>
        </div>

        <div class="mb-3">
          <label for="courseDifficulty" class="form-label">
            <i class="bi bi-bar-chart"></i> 강의 난이도<span style="color:red;">*</span>
          </label>
          <select id="courseDifficulty" name="courseDifficulty" class="form-select" required>
            <option th:each="difficulty : ${courseDifficulties}"
                    th:value="${difficulty.name()}"
                    th:text="${difficulty.text}"></option>
          </select>
        </div>

        <!-- 홍보글 상세 -->
        <div class="mb-3">
          <label for="courseDescriptContent" class="form-label">
            <i class="bi bi-pencil"></i> 홍보글 상세 내용<span style="color:red;">*</span>
          </label>
          <textarea id="courseDescriptContent" name="courseDescriptContent" class="form-control" rows="4" required></textarea>
        </div>

        <div class="mb-3">
          <label for="courseDescriptFiles" class="form-label">
            <i class="bi bi-upload"></i> 이미지 업로드<span style="color:red;">*</span>
          </label>
          <input type="file" id="courseDescriptFiles" name="courseDescriptFiles" class="form-control" multiple accept="image/*" required>
        </div>

        <!-- 강의 세부 정보 -->
        <div id="detailsContainer" class="mt-4">
          <h3><i class="bi bi-list"></i> 강의 세부 정보</h3>
          <button type="button" id="addDetailButton" class="btn btn-success">
            <i class="bi bi-plus-circle"></i> 세부 정보 추가
          </button>
        </div>

        <!-- Submit -->
        <div class="text-center mt-4">
          <button type="submit" id="registerButton" class="btn btn-primary btn-lg">
            <i class="bi bi-check-circle"></i> 등록
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  $(document).ready(function () {
      let detailCount = 0;

      // 세부 정보 추가 버튼 이벤트
      $('#addDetailButton').click(function () {
          const detailHtml = `
              <div class="mb-4 border p-3 rounded detail-item" id="detail-${detailCount}">
                  <h5 name="detailNum">세부 정보 ${detailCount + 1}</h5>
                  <button type="button" class="btn btn-danger btn-sm mb-3 removeDetailButton" data-detail-id="${detailCount}">
                      <i class="bi bi-trash"></i> 삭제
                  </button>
                  <div class="mb-3">
                      <label for="courseDetails[${detailCount}].courseDetailOutline" class="form-label">상세 목차<span style="color:red;">*</span></label>
                      <input type="text" id="courseDetails[${detailCount}].courseDetailOutline" name="courseDetails[${detailCount}].courseDetailOutline" class="form-control" placeholder="상세 목차를 입력하세요" required>
                  </div>
                  <div class="mb-3">
                      <label for="courseDetails[${detailCount}].courseDetailTitle" class="form-label">세부 제목<span style="color:red;">*</span></label>
                      <input type="text" id="courseDetails[${detailCount}].courseDetailTitle" name="courseDetails[${detailCount}].courseDetailTitle" class="form-control" required>
                  </div>
                  <div class="mb-3">
                      <label for="courseDetails[${detailCount}].courseDetailContent" class="form-label">세부 내용<span style="color:red;">*</span></label>
                      <textarea id="courseDetails[${detailCount}].courseDetailContent" name="courseDetails[${detailCount}].courseDetailContent" class="form-control" rows="3"></textarea>
                  </div>
                  <div class="mb-3">
                      <label for="courseDetails[${detailCount}].courseDetailFile" class="form-label">
                          <i class="bi bi-upload"></i> 파일 업로드<span style="color:red;">*</span> (동영상, PDF, ZIP 등)
                      </label>
                      <input type="file" id="courseDetails[${detailCount}].courseDetailFile"
                      name="courseDetails[${detailCount}].courseDetailFile" class="form-control" accept="video/*,.pdf,.zip" required>
                  </div>
              </div>`;
          $('#detailsContainer').append(detailHtml);
          detailCount++;
          adjustQuestionNumbers();
      });

      // 세부 정보 삭제 버튼 이벤트
      $('#detailsContainer').on('click', '.removeDetailButton', function () {
          const detailId = $(this).data('detail-id');
          $(`#detail-${detailId}`).remove();
          resetIndices();
          adjustQuestionNumbers();
      });

      // 등록 버튼 클릭 이벤트 (등록 버튼만 처리)
      $('#registerButton').on('click', function (e) {
          if (detailCount === 0) {
              e.preventDefault(); // 등록 버튼 동작 중단
              alert('세부 정보를 작성하셔야 합니다.');
          }
      });

      function adjustQuestionNumbers() {
          const detailItems = document.querySelectorAll('#detailsContainer .detail-item');
          detailItems.forEach((item, index) => {
              const header = item.querySelector('h5[name="detailNum"]');
              if (header) {
                  header.textContent = `세부 정보 ${index + 1}`;
              }
          });
      }

      function resetIndices() {
          detailCount = 0;
          $('#detailsContainer .detail-item').each(function () {
              const newId = `detail-${detailCount}`;
              $(this).attr('id', newId);

              $(this).find('input, textarea, select').each(function () {
                  const name = $(this).attr('name');
                  const id = $(this).attr('id');
                  if (name) {
                      const newName = name.replace(/\[\d+\]/, `[${detailCount}]`);
                      $(this).attr('name', newName);
                  }
                  if (id) {
                      const newId = id.replace(/\[\d+\]/, `[${detailCount}]`);
                      $(this).attr('id', newId);
                  }
              });

              $(this).find('.removeDetailButton').data('detail-id', detailCount);
              detailCount++;
          });
      }
  });
</script>
</body>
</html>
