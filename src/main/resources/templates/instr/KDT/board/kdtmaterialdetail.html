<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>메타러닝 자료실 상세</title>
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <link rel="stylesheet" href="/static/css/admindashboard.css">
    <link rel="stylesheet" href="/static/css/header/instrsidebar.css">
    <link rel="stylesheet" href="/static/css/header/instrheader.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="app-container">
    <!-- Header -->
    <div th:replace="~{fragments/instrheader :: instrheader}"></div>
    <div class="content-container">
        <!-- Sidebar -->
        <div th:replace="~{fragments/instrsidebar :: instrsidebar}"></div>
        <!-- Main Content -->
        <div class="main-content">
            <div>
                <h1 class="text-center"><i class="bi bi-archive"></i> 자료실 상세</h1>

                <span th:text="${sessionsDetail.kdtSessionId}" style="display: none;"></span>

                <!-- 회차 정보 -->
                <div class="card mb-4 shadow">
                    <div class="card-body">
                        <div class="row mb-3">
                            <!-- 회차 번호 -->
                            <div class="col-md-4">
                                <p><strong><i class="bi bi-list-ol"></i> 회차 번호:</strong> <span th:text="${sessionsDetail.kdtSessionNum}"></span></p>
                            </div>
                            <!-- 시작일 -->
                            <div class="col-md-4">
                                <p><strong><i class="bi bi-calendar-event"></i> 시작일:</strong> <span th:text="${sessionsDetail.kdtSessionStartDate}"></span></p>
                            </div>
                            <!-- 종료일 -->
                            <div class="col-md-4">
                                <p><strong><i class="bi bi-calendar-event-fill"></i> 종료일:</strong> <span th:text="${sessionsDetail.kdtSessionEndDate}"></span></p>
                            </div>
                        </div>
                        <!-- 회차 제목 -->
                        <p><strong><i class="bi bi-clipboard"></i> 회차 제목:</strong> <span th:text="${sessionsDetail.kdtSessionTitle}"></span></p>
                    </div>
                </div>

                <div class="list-group">
                    <!-- 단일 게시글 정보 -->
                    <div class="list-group-item" id="post">
                        <!-- 제목, 작성자, 첨부파일 버튼 -->
                        <div class="d-flex justify-content-between align-items-center">
                            <!-- 제목과 작성자 -->
                            <h5 class="mb-0">
                                <i class="bi bi-file-text"></i> <span th:text="${boardDetails.kdtBoardTitle}">게시글 제목</span>
                                (<span th:text="${boardDetails.kdtBoardId}">게시글 번호</span>)
                                - <span class="text-muted" th:text="${boardDetails.name}">작성자</span>
                            </h5>
                            <!-- 첨부파일 버튼 -->
                            <div th:if="${not #lists.isEmpty(boardDetails.kdtFileNams)}">
                                <button class="btn btn-sm btn-outline-primary" data-bs-toggle="collapse" data-bs-target="#fileList"
                                        aria-expanded="false" aria-controls="fileList">
                                    <i class="bi bi-paperclip"></i> 첨부파일
                                </button>
                            </div>
                        </div>

                        <!-- 첨부 파일 목록 (Collapse 적용) -->
                        <div th:if="${not #lists.isEmpty(boardDetails.kdtFileNams)}" class="collapse mt-3" id="fileList">
                            <div class="card">
                                <div class="card-body">
                                    <ul class="list-group">
                                        <li th:each="fileName, iterStat : ${boardDetails.kdtFileNams}" class="list-group-item d-flex justify-content-between align-items-center">
                                            <!-- 파일 이름과 다운로드 아이콘 -->
                                            <span th:text="${fileName}">
                                <i class="bi bi-file-earmark"></i> 파일 이름
                            </span>
                                            <a th:href="@{'/KDT/course/' + ${boardDetails.kdtfileUUIDs[iterStat.index]} + '_' + ${fileName}}"
                                               class="btn btn-sm btn-outline-primary"
                                               target="_blank"
                                               th:download="${fileName}">
                                                <i class="bi bi-download"></i> 다운로드
                                            </a>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>

                        <p class="mt-3">
                            <i class="bi bi-chat-text"></i> <span th:text="${boardDetails.kdtBoardContent}">게시글 내용</span>
                        </p>

                        <div class="d-flex justify-content-center mt-4 gap-3">
                            <button class="btn btn-outline-secondary" onclick="history.back()">
                                <i class="bi bi-arrow-left-circle"></i>
                                뒤로 가기
                            </button>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Optional: Add Bootstrap JS for functionality -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
