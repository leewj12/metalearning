<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메타러닝 회차별 수강생 등록</title>
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <link rel="stylesheet" href="/static/css/admindashboard.css">
    <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
    <link rel="stylesheet" href="/static/css/header/adminheader.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<!-- Header -->
<div th:replace="~{fragments/adminheader :: adminheader}"></div>

<div class="content-container">
    <!-- Sidebar -->
    <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>

    <!-- Main Content -->
    <div class="main-content container">

        <div class="container mt-4">
            <!-- 상단 헤더 -->
            <div class="row mb-4 align-items-center">
                <div class="col-md-8">
                    <h1 class="mb-0"><i class="bi bi-file-earmark-person-fill"></i> 회차별 수강생 등록</h1>
                </div>
                <div class="col-md-4 text-end">
                    <a th:href="@{/admin/KDT/{sessionId}/part/list(sessionId=${sessionsDetail.kdtSessionId})}" class="btn btn-secondary">CSV 파일로 한 번에 업로드하기</a>
                </div>
            </div>


            <!-- 국비회차 정보 카드 -->
            <div class="card mb-4">
                <div class="card-header bg-primary text-white d-flex align-items-center">
                    <i class="bi bi-info-circle-fill me-2"></i>
                    <h4 class="mb-0">국비회차 정보</h4>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <p><strong><i class="bi bi-pencil"></i> 국비 회차 제목:</strong> <span th:text="${sessionsDetail.kdtSessionTitle}"></span></p>
                        </div>
                        <div class="col-md-6 mb-3">
                            <p><strong><i class="bi bi-pencil"></i> 회차:</strong> <span th:text="${sessionsDetail.kdtSessionNum}"></span></p>
                        </div>
                        <div class="col-md-6 mb-3">
                            <p><strong><i class="bi bi-calendar-date"></i> 기간:</strong>
                                <span th:text="'시작일: ' + ${sessionsDetail.kdtSessionStartDate} + ' ~ 종료일: ' + ${sessionsDetail.kdtSessionEndDate}"></span>
                            </p>
                        </div>
                        <div class="col-md-6 mb-3">
                            <p><strong><i class="bi bi-clock"></i> 시간:</strong>
                                <span th:text="'시작시간: ' + ${sessionsDetail.kdtSessionStartTime} + ' ~ 종료시간: ' + ${sessionsDetail.kdtSessionEndTime}"></span>
                            </p>
                        </div>
                        <div class="col-md-6 mb-3">
                            <p><strong><i class="bi bi-person-plus"></i> 참여 가능한 인원:</strong>
                                <span th:text="${sessionsDetail.kdtSessionMaxCapacity} + ' 명'"></span>
                            </p>
                        </div>
                        <div class="col-md-6 mb-3">
                            <p><strong><i class="bi bi-person-fill"></i> 현재 등록된 인원 수:</strong>
                                <span th:text="${studentCount.studentCount} + ' 명'"></span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <!--            검색 폼 -->
            <div class="row mb-3 align-items-center">
                <div class="col-md-8">
                    <form th:action="@{/admin/KDT/{sessionId}/part(sessionId=${sessionId})}" method="get" class="d-flex align-items-center">
                        <input type="text" name="searchName" class="form-control me-2" placeholder="학생 이름으로 검색" th:value="${searchName}" style="width: 60%;">
                        <button type="submit" class="btn btn-primary" style="width: 90px; white-space: nowrap;">검색</button>
                    </form>
                </div>
                <div class="col-md-3 text-end">
                    <p class="mb-0"><strong>전체 학생:</strong> <span th:text="${totalElements}"></span> 명</p>
                </div>
            </div>

            <form th:action="@{/admin/KDT/{sessionId}/part(sessionId=${sessionId})}" method="post" class="mb-4" id="studentForm">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="kdtSessionId" th:value="${sessionsDetail.kdtSessionId}" />

                <!-- 학생 목록 테이블 -->
                <table class="table table-bordered table-striped">
                    <thead>
                    <tr>
                        <th><input type="checkbox" id="selectAll"> 전체</th>
                        <th>번호</th>
                        <th>이름</th>
                        <th>등급</th>
                        <th>이메일</th>
                        <th>전화번호</th>
                        <th>성별</th>
                        <th>주소</th>
                        <th>학력</th>
                    </tr>
                    </thead>
                    <tbody>
                    <th:block th:each="student : ${studentAll}">
                        <tr>
                            <td>
                                <input type="checkbox" name="userIds" th:value="${student.userId}" class="studentCheckbox">
                            </td>
                            <td th:text="${student.userId}"></td>
                            <td th:text="${student.name}"></td>
                            <td th:text="
                                ${student.userRole == 'STUDENT' ? '학생' :
                                 (student.userRole == 'ADMIN' ? '관리자' :
                                 (student.userRole == 'MANAGER' ? '매니저' :
                                 (student.userRole == 'INSTR' ? '강사' : student.userRole)))}">
                            </td>
                            <td th:text="${student.userEmail}"></td>
                            <td th:text="${student.userPhone}"></td>
                            <td th:text="${student.userGender == 'M' ? '남자' : '여자'}"></td>
                            <td th:text="${student.userAddress}"></td>
                            <td th:text="${student.userEduLevel}"></td>
                        </tr>
                    </th:block>
                    </tbody>
                </table>

                <!-- 검색 결과 없음 메시지 -->
                <div th:if="${noResults}" class="alert alert-danger">
                    등록된 학생이 없습니다.
                </div>

                <!-- 페이지 네비게이션 -->
                <nav th:if="${!noResults}" aria-label="Page navigation" class="d-flex justify-content-center mt-3">
                    <ul class="pagination">
                        <!-- 처음 페이지 -->
                        <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                            <a class="page-link" th:href="${currentPage == 1} ? 'javascript:void(0)' : @{|/admin/KDT/${sessionId}/part?page=1&searchName=${searchName}|}"> 처음 </a>
                        </li>

                        <!-- 이전 페이지 -->
                        <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled' : ''">
                            <a class="page-link" th:href="${currentPage == 1} ? 'javascript:void(0)' : @{|/admin/KDT/${sessionId}/part?page=${blockStart - 1}&searchName=${searchName}|}"> << </a>
                        </li>

                        <th:block th:each="pageNum : ${#numbers.sequence(blockStart, blockEnd)}">
                            <li class="page-item" th:classappend="${pageNum == currentPage} ? 'active'">
                                <a class="page-link" th:href="@{|/admin/KDT/${sessionId}/part?page=${pageNum}&searchName=${searchName}|}" th:text="${pageNum}"></a>
                            </li>
                        </th:block>

                        <!-- 다음 페이지 -->
                        <li class="page-item" th:classappend="${!hasNext} ? 'disabled' : ''">
                            <a class="page-link" th:href="${currentPage == totalPages} ? 'javascript:void(0)' : @{|/admin/KDT/${sessionId}/part?page=${blockEnd + 1}&searchName=${searchName}|}"> >> </a>
                        </li>

                        <!-- 끝 페이지 -->
                        <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                            <a class="page-link" th:href="${currentPage == totalPages} ? 'javascript:void(0)' : @{|/admin/KDT/${sessionId}/part?page=${totalPages}&searchName=${searchName}|}"> 끝 </a>
                        </li>
                    </ul>
                </nav>

                <!-- 등록 버튼 -->
                <div class="d-flex justify-content-center mt-4 gap-3">
                    <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">수강생 등록</button>
                    <a th:href="@{/view/admin/KDT/session/{sessionId}(sessionId=${sessionId})}" class="btn btn-secondary btn-lg">
                        <i class="bi bi-list"></i> 목차
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>


<!-- Bootstrap JS (필수) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        console.log("Script loaded");

        // 전체 선택 체크박스
        document.getElementById('selectAll').addEventListener('click', function() {
            const isChecked = this.checked;
            const checkboxes = document.querySelectorAll('.studentCheckbox');

            checkboxes.forEach(function(checkbox) {
                checkbox.checked = isChecked;  // 전체 선택/해제
            });

            // After updating checkboxes, check the capacity condition
            checkCapacity();
        });

        // 제출 버튼 클릭 시 체크박스 유효성 검사
        document.getElementById('submitBtn').addEventListener('click', function(event) {
            const selectedStudents = document.querySelectorAll('input[name="userIds"]:checked');
            const maxCapacity = parseInt('${sessionsDetail.kdtSessionMaxCapacity}');
            const registeredCount = parseInt('${studentCount.studentCount}');
            const availableSeats = maxCapacity - registeredCount;

            // 학생이 선택되지 않았으면 오류 메시지 표시
            if (selectedStudents.length === 0) {
                event.preventDefault(); // 폼 제출 막기
                alert('학생을 선택해주세요.');
            } else if (selectedStudents.length > availableSeats) {
                // 선택된 학생 수가 남은 자리를 초과하면 오류 메시지 표시
                event.preventDefault(); // 폼 제출 막기
                alert('최대 수용 인원을 초과할 수 없습니다. 남은 인원: ' + availableSeats);
            }
        });

        // 페이지 로드 시 초기 상태 확인
        checkCapacity();

        // 선택된 학생 수와 최대 수용 인원 비교하여 버튼 활성화/비활성화 처리
        function checkCapacity() {
            const selectedStudents = document.querySelectorAll('input[name="userIds"]:checked');
            const maxCapacity = parseInt('${sessionsDetail.kdtSessionMaxCapacity}');
            const registeredCount = parseInt('${studentCount.studentCount}');
            const availableSeats = maxCapacity - registeredCount;

            if (selectedStudents.length > availableSeats) {
                document.getElementById('submitBtn').disabled = true;
                alert('선택한 학생 수가 남은 자리보다 많습니다.');
            } else {
                if (registeredCount >= maxCapacity) {
                    document.getElementById('submitBtn').disabled = true;
                } else {
                    document.getElementById('submitBtn').disabled = false;
                }
            }
        }
    });
</script>

</body>
</html>
