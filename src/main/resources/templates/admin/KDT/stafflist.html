<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>메타러닝 회차/담당자 정보</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/admindashboard.css">
  <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
  <link rel="stylesheet" href="/static/css/header/adminheader.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    .table th, .table td {
      vertical-align: middle;
    }
    .actions {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }
    .gender-icon {
      margin-right: 5px;
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- Header -->
  <div th:replace="~{fragments/adminheader :: adminheader}"></div>
  <div class="content-container">
    <!-- Sidebar -->
    <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>
    <!-- Main Content -->
    <div class="main-content">
      <!-- 회차 정보 출력 -->
      <h2><i class="bi bi-calendar-event"></i> 회차 정보</h2>
      <div class="mb-4">
        <p><strong>회차 제목:</strong> <span th:text="${sessionsDetail.kdtSessionTitle}"></span></p>
        <p><strong>회차 시작일:</strong> <span th:text="${sessionsDetail.kdtSessionStartDate}"></span></p>
        <p><strong>회차 종료일:</strong> <span th:text="${sessionsDetail.kdtSessionEndDate}"></span></p>
        <p><strong>회차 상태:</strong> <span th:text="${sessionsDetail.kdtSessionStatus}"></span></p>
      </div>

      <!-- 담당 강사 리스트 -->
      <h2><i class="bi bi-person-badge"></i> 담당 강사</h2>
      <table class="table table-striped table-hover">
        <thead>
        <tr>
          <th scope="col"><i class="bi bi-person"></i> 이름</th>
          <th scope="col"><i class="bi bi-gender-ambiguous"></i> 성별</th>
          <th scope="col"><i class="bi bi-envelope"></i> 이메일</th>
          <th scope="col"><i class="bi bi-telephone"></i> 연락처</th>
          <th scope="col"><i class="bi bi-award"></i> 등급</th>
          <th scope="col"><i class="bi bi-mortarboard"></i> 학력</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="instructor : ${registeredInstructors}">
          <td th:text="${instructor.name}"></td>
          <td>
            <i class="bi gender-icon" th:classappend="${instructor.userGender == 'M' ? 'bi-gender-male text-primary' : instructor.userGender == 'F' ? 'bi-gender-female text-danger' : ''}"></i>
            <span th:text="${instructor.userGender == 'M' ? '남자' : instructor.userGender == 'F' ? '여자' : instructor.userGender}"></span>
          </td>
          <td th:text="${instructor.userEmail}"></td>
          <td th:text="${instructor.userPhone}"></td>
          <td>
            <span th:text="${instructor.userRole == 'ADMIN' ? '관리자' : instructor.userRole == 'INSTRUCTOR' ? '강사' : instructor.userRole == 'MANAGER' ? '매니저' : instructor.userRole}"></span>
          </td>
          <td th:text="${instructor.userEduLevel}"></td>
        </tr>
        </tbody>
      </table>

      <!-- 담당 매니저 리스트 -->
      <h2><i class="bi bi-briefcase"></i> 담당 매니저</h2>
      <table class="table table-striped table-hover">
        <thead>
        <tr>
          <th scope="col"><i class="bi bi-person"></i> 이름</th>
          <th scope="col"><i class="bi bi-gender-ambiguous"></i> 성별</th>
          <th scope="col"><i class="bi bi-envelope"></i> 이메일</th>
          <th scope="col"><i class="bi bi-telephone"></i> 연락처</th>
          <th scope="col"><i class="bi bi-award"></i> 등급</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="manager : ${registeredManagers}">
          <td th:text="${manager.name}"></td>
          <td>
            <i class="bi gender-icon" th:classappend="${manager.userGender == 'M' ? 'bi-gender-male text-primary' : manager.userGender == 'F' ? 'bi-gender-female text-danger' : ''}"></i>
            <span th:text="${manager.userGender == 'M' ? '남자' : manager.userGender == 'F' ? '여자' : manager.userGender}"></span>
          </td>
          <td th:text="${manager.userEmail}"></td>
          <td th:text="${manager.userPhone}"></td>
          <td>
            <span th:text="${manager.userRole == 'ADMIN' ? '관리자' : manager.userRole == 'INSTRUCTOR' ? '강사' : manager.userRole == 'MANAGER' ? '매니저' : manager.userRole}"></span>
          </td>
        </tr>
        </tbody>
      </table>

      <!-- 링크로 강사 및 매니저 등록 페이지로 이동 -->
      <div class="actions">
        <a th:href="@{/admin/KDT/{sid}/staff/manager(sid=${sessionsDetail.kdtSessionId})}" class="btn btn-warning">
          <i class="bi bi-person-plus"></i> 매니저 등록
        </a>
        <a th:href="@{/admin/KDT/{sid}/staff/instr(sid=${sessionsDetail.kdtSessionId})}" class="btn btn-success">
          <i class="bi bi-person-plus"></i> 강사 등록
        </a>
        <button class="btn btn-secondary" onclick="history.back()">
          <i class="bi bi-arrow-left-circle"></i>
          뒤로 가기
        </button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
