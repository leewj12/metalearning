<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메타러닝 시험 답안 수정</title>
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <!-- 헤더 CSS, JS(head에 적당히) -->
    <link rel="stylesheet" href="/static/css/admindashboard.css">
    <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
    <link rel="stylesheet" href="/static/css/header/adminheader.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
<div class="app-container">
    <!-- Header -->
    <div th:replace="~{fragments/adminheader :: adminheader}"></div>
    <div class="content-container">
        <!-- Sidebar -->
        <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>
        <!-- Main Content -->
        <div class="main-content">

            <div class="d-flex flex-column justify-content-center align-items-center">

            <h1>시험 답안 수정</h1>
            <h2 th:text="${KDTSessionDTO.kdtSessionTitle}"></h2>
            <form method="POST" id="testForm">
                <!-- CSRF 토큰 추가 -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="kdtSessionId" th:value="${KDTSessionDTO.kdtSessionId}" />
                <input type="hidden" name="kdtTestId" th:value="${KDTTestDTO.kdtTestId}" />

                <label for="kdtTestStartDate">시작 날짜/시간:</label>
                <input type="datetime-local" id="kdtTestStartDate" name="kdtTestStartDate" th:value="${KDTTestDTO.kdtTestStartDate}" readonly /> <br>

                <label for="kdtTestEndDate">종료 날짜/시간:</label>
                <input type="datetime-local" id="kdtTestEndDate" name="kdtTestEndDate" th:value="${KDTTestDTO.kdtTestEndDate}" readonly /> <br>

                <label for="kdtTestTitle">시험 제목:</label>
                <input type="text" id="kdtTestTitle" name="kdtTestTitle" th:value="${KDTTestDTO.kdtTestTitle}" readonly /> <br>

                <table id="testItem">
                    <tr th:each="item, iterStat : ${KDTTestItemDTOs}">
                        <td>
                            <br>
                            <hr>
                            <br>
                            <span th:text="${(iterStat.index + 1) + '번 문제: ' + item.kdtTestItemCategory + ' (' + item.kdtTestItemScore + '점)'}"></span><br>

                            <input type="hidden" name="kdtTestSubmitId" th:value="${KDTTestSubmitDTOs[iterStat.index].kdtTestSubmitId}">
                            <input type="hidden" name="kdtTestItemId" th:value="${item.kdtTestItemId}">

                            <textarea name="kdtTestItemQuest" th:text="${item.kdtTestItemQuest}" readonly></textarea><br><br>

                            <label> 선택한 답 :</label>
                            <input type="text" name="kdtTestSubmitAnswer" th:value="${KDTTestSubmitDTOs[iterStat.index].kdtTestSubmitAnswer}" readonly/><br>

                            <!-- 라디오 버튼들, 문제마다 다른 name을 동적으로 할당 -->
                            <!-- 문제의 제출된 답안과 비교하여 선택된 라벨에 스타일을 적용 -->

                            <label th:class="${KDTTestSubmitDTOs[iterStat.index].kdtTestSubmitAnswer == 1 ? 'selected-answer' : ''}" onclick="setAnswer(this,1)">
                                <input type="radio" th:name="'answer_' + ${iterStat.index}" value="1" style="display:none;" />
                                ①: <span th:text="${item.kdtTestItemAnsw1}"></span>
                            </label><br>

                            <label th:class="${KDTTestSubmitDTOs[iterStat.index].kdtTestSubmitAnswer == 2 ? 'selected-answer' : ''}" onclick="setAnswer(this,2)">
                                <input type="radio" th:name="'answer_' + ${iterStat.index}" value="2" style="display:none;" />
                                ②: <span th:text="${item.kdtTestItemAnsw2}"></span>
                            </label><br>

                            <label th:class="${KDTTestSubmitDTOs[iterStat.index].kdtTestSubmitAnswer == 3 ? 'selected-answer' : ''}" onclick="setAnswer(this,3)">
                                <input type="radio" th:name="'answer_' + ${iterStat.index}" value="3" style="display:none;" />
                                ③: <span th:text="${item.kdtTestItemAnsw3}"></span>
                            </label><br>

                            <label th:class="${KDTTestSubmitDTOs[iterStat.index].kdtTestSubmitAnswer == 4 ? 'selected-answer' : ''}" onclick="setAnswer(this,4)">
                                <input type="radio" th:name="'answer_' + ${iterStat.index}" value="4" style="display:none;" />
                                ④: <span th:text="${item.kdtTestItemAnsw4}"></span>
                            </label><br>

                        </td>
                    </tr>
                </table>
                <br><hr><br>

                <div class="text-center d-flex justify-content-center gap-3">
                    <button type="button" th:onclick="'updateSubmit('+${KDTSessionDTO.kdtSessionId}+','+${KDTTestDTO.kdtTestId}+','+${KDTTestSubmitDTOs[0].kdtPartId}+')'"> 수정하기 </button>

                    <a th:href="@{/view/admin/KDT/{sessionId}/test/submit/{kdtTestId}/list(sessionId=${KDTSessionDTO.kdtSessionId}, kdtTestId=${KDTTestDTO.kdtTestId})}"
                       class="btn btn-secondary">
                        목차
                    </a>
                </div>

            </form>
        </div>
        </div>
    </div>
</div>
<script>
    function getCsrfToken() {
        return document.querySelector('meta[name="_csrf"]').getAttribute('content');
    }

    function getCsrfHeaderName() {
        return document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
    }

    function setAnswer(element, answerValue) {
        // 해당 문제의 kdtTestSubmitAnswer input 요소를 찾아서 값 설정
        const testSubmitAnswer = element.closest('tr').querySelector('input[name="kdtTestSubmitAnswer"]');
        testSubmitAnswer.value = answerValue;

        // 모든 라벨의 글씨 굵기를 원래대로 돌려놓고
        const labels = element.closest('tr').querySelectorAll('label');
        labels.forEach(label => {
            label.classList.remove('selected-answer'); // selected-answer 클래스를 제거
        });

        // 클릭된 라벨에 selected-answer 클래스를 추가
        const label = element.closest('label');
        label.classList.add('selected-answer'); // 선택된 라벨에만 클래스를 추가
    }


    const updateSubmit = async (sessionId, testId, partId) => {
        const form = document.getElementById('testForm'); // 폼 요소를 가져옵니다.

        // hidden 필드(kdtTestSubmitAnswer)가 비어 있는지 확인
        const hiddenFields = form.querySelectorAll('input[name="kdtTestSubmitAnswer"]'); // 여러 개일 수 있기 때문에 querySelectorAll 사용
        let isInvalid = false; // 답을 선택하지 않은 문제 발견 여부 추적
        let firstInvalidField = null; // 첫 번째 유효하지 않은 필드를 추적

        hiddenFields.forEach((hiddenField) => {
            if (!hiddenField.value) {
                // 답을 선택하지 않은 문제를 찾음
                const textarea = hiddenField.closest('tr').querySelector('textarea'); // 문제 관련 textarea를 찾음
                isInvalid = true;

                // 첫 번째 선택되지 않은 문제를 찾으면 포커스를 이동하고 반복문을 종료
                if (!firstInvalidField) {
                    firstInvalidField = textarea; // 첫 번째 유효하지 않은 필드를 추적
                    textarea.focus(); // 해당 textarea로 포커스 이동
                }
            }
        });

        if (isInvalid) {
            alert("답을 선택하지 않은 문제가 있습니다.");
            return; // 답을 선택하지 않은 문제 있으면 함수 종료
        }

        // 폼의 유효성 검사
        if (!form.checkValidity()) {
            // 유효하지 않으면 경고 메시지
            alert("모든 항목을 작성해주세요.");
            // 유효성 검사를 실패한 첫 번째 필드로 포커스 이동
            const firstInvalidField = form.querySelector(':invalid');
            if (firstInvalidField) {
                firstInvalidField.focus(); // 첫 번째 잘못된 필드로 포커스를 이동
            }
            return; // 전송을 막습니다.
        }

        // CSRF 토큰과 헤더 이름을 가져옵니다.
        const csrfToken = getCsrfToken();
        const csrfHeaderName = getCsrfHeaderName();

        // 폼 데이터를 JSON으로 변환
        const formData = new FormData(form);

        // KDTTestDetailsDTO 구조로 데이터 객체를 만듭니다.
        const jsonData = {
            kdtTestSubmitList: [],
            kdtPartId: partId
        };
        const testItems = document.querySelectorAll('#testItem tr');
        testItems.forEach((item, index) => {
            const inputs = item.querySelectorAll('input');
            const testSubmitAnswerInput = item.querySelector('input[name="kdtTestSubmitAnswer"]');  // name="kdtTestSubmitAnswer"인 input 가져오기
            const dto = {
                kdtTestSubmitId: inputs[0].value,
                kdtTestItemId: inputs[1].value,  // 문제 ID
                kdtPartId: partId,
                kdtTestSubmitAnswer: testSubmitAnswerInput ? testSubmitAnswerInput.value : 0,  // 선택된 답변 (name="kdtTestSubmitAnswer" 값)
            };
            console.log("dto", dto);
            // kdtTestSubmitList 배열에 추가
            jsonData.kdtTestSubmitList.push(dto);
        });

        // 예시: 서버로 JSON 데이터 전송
        try {
            const response = await fetch('/api/admin/KDT/'+sessionId+'/test/submit/update/'+testId+'/'+partId, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json', // JSON 형식으로 요청 보냄
                    [csrfHeaderName]: csrfToken
                },
                body: JSON.stringify(jsonData) // JSON.stringify()로 데이터를 변환하여 전송
            });

            if (response.ok) {
                alert("시험 정보가 성공적으로 수정되었습니다.");
                window.location.href = '/admin/KDT/' + sessionId + '/test/submit/detail/' + testId + '/' + partId;
            } else if (response.status === 404) {
                // 404 Not Found 응답 처리 (리소스를 찾을 수 없을 때)
                alert("현재 수정할 수 있는 답안이 없습니다. 이미 제출된 답안이 없거나 삭제된 상태입니다.");
                window.location.href = '/view/admin/KDT/' + sessionId + '/test/submit/' + testId + '/list';
            } else {
                alert("등록에 실패했습니다. 다시 시도해주세요.");
            }
        } catch (error) {
            console.error('Error:', error);
            alert("서버와의 통신에 실패했습니다.");
        }
    }

        function addClassToInputs() {
document.querySelectorAll('input').forEach(input => {
    input.classList.add('form-control');
});

document.querySelectorAll('form').forEach(form => {
form.style.width = '40%';      // 폼의 너비를 부모 요소의 40%로 설정
form.style.maxWidth = '500px'; // 폼의 최대 너비를 500px로 제한
});

document.querySelectorAll('textarea').forEach(textarea=> {
    textarea.classList.add('form-control');
    textarea.style.overflow = 'hidden'; // 스크롤바 숨김
    textarea.style.resize = 'none'; // 사용자가 크기 조정 불가

    // 초기 높이를 설정
    textarea.style.height = textarea.scrollHeight + 'px';

    // 입력 이벤트에 따라 높이 조정
    textarea.addEventListener('input', () => {
    textarea.style.height = 'auto'; // 높이를 초기화
    textarea.style.height = textarea.scrollHeight + 'px'; // 텍스트에 맞는 높이 설정
    });
});

document.querySelectorAll('table').forEach(table=> {
    table.style.width = '100%';
});

document.querySelectorAll('button').forEach(button => {
    if (button.textContent.trim() === '삭제') {
        // Bootstrap 삭제 버튼 클래스 추가
        button.classList.add('btn', 'btn-danger');
    }

    if (button.textContent.trim() === '목차') {
        // Bootstrap 삭제 버튼 클래스 추가
        button.classList.add('btn', 'btn-primary');
    }

    if (button.textContent.trim() === '수정하기') {
        // Bootstrap 삭제 버튼 클래스 추가
        button.classList.add('btn', 'btn-success');
    }
});
}

window.onload = function() {
addClassToInputs(); // 페이지 로드 후 실행
};
</script>
<!-- 스타일 추가 -->
<style>
    .selected-answer {
        font-weight: bold;
        background-color: #f0f0f0;
    }
</style>

</body>
</html>
