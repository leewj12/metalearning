<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메타러닝 회원가입</title>
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 주소검색 함수 정의
        function searchAddress(postcodeId, addressId, detailAddressId) {
            new daum.Postcode({
                oncomplete: function (data) {
                    let addr = ''; // 도로명/지번 주소
                    let extraAddr = ''; // 참고항목

                    // 사용자 선택 타입에 따른 주소 결정
                    if (data.userSelectedType === 'R') {
                        addr = data.roadAddress; // 도로명 주소
                    } else {
                        addr = data.jibunAddress; // 지번 주소
                    }

                    // 참고항목 설정 (도로명 주소일 경우)
                    if (data.userSelectedType === 'R') {
                        if (data.bname && /[동|로|가]$/g.test(data.bname)) {
                            extraAddr += data.bname; // 법정동 추가
                        }
                        if (data.buildingName && data.apartment === 'Y') {
                            extraAddr += (extraAddr ? ', ' + data.buildingName : data.buildingName); // 건물명 추가
                        }
                    }

                    // 우편번호와 주소 필드 채우기
                    document.getElementById(postcodeId).value = data.zonecode; // 우편번호
                    document.getElementById(addressId).value = addr; // 도로명 또는 지번 주소

                    // 상세주소 입력란에 포커스
                    if (detailAddressId) {
                        document.getElementById(detailAddressId).focus();
                    }
                }
            }).open(); // 팝업 열기
        }

        // DOM이 준비된 후 이벤트 설정
        document.addEventListener('DOMContentLoaded', () => {
            const postcodeButton = document.getElementById('searchPostcodeBtn');
            if (postcodeButton) {
                postcodeButton.addEventListener('click', () => {
                    searchAddress('userPostcode', 'userAddress', 'userAddressDetail');
                });
            } else {
                console.error('우편번호 찾기 버튼을 찾을 수 없습니다.');
            }
        });
    </script>

    <style>
        body {
            background: linear-gradient(to bottom, #FF9933, #FFFF66);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 20px;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 600px;
            background-color: #fff;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
        }

        .btn-primary:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }

        .message {
            font-size: 14px;
            margin-top: 5px;
            text-align: left;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }

        .error-message {
            color: red;
            font-size: 0.875rem;
            margin-top: 5px;
        }

        .requiredStar{
            color:red;
        }
    </style>

</head>
<body>
<div class="container">
    <h2 class="text-center mb-4">메타러닝 회원가입</h2>
    <form action="/signup" method="POST">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <!-- 이메일 입력 -->
        <div class="mb-3">
            <label for="userEmail" class="form-label">이메일<span class="requiredStar"> *</span></label>
            <div class="input-group">
                <input type="email" id="userEmail" name="userEmail" class="form-control" required placeholder="이메일을 입력하세요">
                <button type="button" class="btn btn-primary" id="checkEmailBtn" onclick="checkEmailDuplicate()">중복 체크</button>
            </div>
            <div id="emailError" class="error-message"></div>
            <div id="emailMessage" class="message"></div>
        </div>

        <!-- 인증 이메일 발송 버튼 -->
        <div id="verifyButtonDiv" style="display:none;" class="mb-3">
            <button type="button" class="btn btn-primary" onclick="sendVerificationEmail()">인증 이메일 발송</button>
        </div>

        <!-- 인증 코드 입력 폼 -->
        <div id="verificationDiv" style="display:none;" class="mb-3">
            <label for="verificationCode" class="form-label">인증 코드<span class="requiredStar"> *</span></label>
            <div class="input-group">
                <input type="password" id="verificationCode" class="form-control" placeholder="인증 코드를 입력하세요" required>
                <button type="button" class="btn btn-primary" onclick="verifyEmailCode()">인증 코드 확인</button>
            </div>
        </div>

        <!-- 비밀번호 입력 -->
        <div class="mb-3">
            <label for="userPw" class="form-label">비밀번호<span class="requiredStar"> *</span></label>
            <input type="password" id="userPw" name="userPw" class="form-control" required placeholder="비밀번호를 입력하세요">
            <div id="passwordError" class="error-message"></div>
        </div>


        <!-- 비밀번호 확인 -->
        <div class="mb-3">
            <label for="confirmPw" class="form-label">비밀번호 확인<span class="requiredStar"> *</span></label>
            <input type="password" id="confirmPw" name="confirmPw" class="form-control" placeholder="비밀번호를 다시 입력하세요" required>
            <div id="confirmPwError" class="error-message"></div>
        </div>

        <!-- 이름 입력 -->
        <div class="mb-3">
            <label for="name" class="form-label">이름<span class="requiredStar"> *</span></label>
            <input type="text" id="name" name="name" class="form-control" required placeholder="이름을 입력하세요">
            <div id="nameError" class="error-message"></div>
        </div>

        <!-- 성별 입력 -->
        <div class="mb-3">
            <label for="userGender" class="form-label">성별<span class="requiredStar"> *</span></label>
            <select id="userGender" name="userGender" class="form-select" required>
                <option value="">성별을 선택하세요</option>
                <option value="M">남자</option>
                <option value="F">여자</option>
            </select>
            <div id="genderError" class="error-message"></div>
        </div>

        <!-- 생일 입력 -->
        <div class="mb-3">
            <label for="userBirth" class="form-label">생일<span class="requiredStar"> *</span></label>
            <input type="date" id="userBirth" name="userBirth" class="form-control" required>
            <div id="birthError" class="error-message"></div>
        </div>

        <!-- 전화번호 입력 -->
        <div class="mb-3">
            <label for="userPhone" class="form-label">전화번호<span class="requiredStar"> *</span></label>
            <input type="tel" id="userPhone" name="userPhone" class="form-control" required placeholder="전화번호를 입력하세요">
            <div id="phoneError" class="error-message"></div>
        </div>

        <!-- 최종학력 선택 -->
        <div class="mb-3">
            <label for="userEduLevel" class="form-label">최종학력<span class="requiredStar"> *</span></label>
            <select id="userEduLevel" name="userEduLevel" class="form-select" required>
                <option value="">학력을 선택하세요</option>
                <option value="중학교 졸업">중학교 졸업</option>
                <option value="고등학교 졸업">고등학교 졸업</option>
                <option value="대학교 졸업">대학교 졸업</option>
                <option value="석사">석사</option>
                <option value="박사">박사</option>
                <option value="기타">기타</option>
            </select>
            <div id="eduError" class="error-message"></div>
        </div>

        <!-- 주소 입력 -->
        <div class="mb-3">
            <label for="userPostcode" class="form-label">우편번호<span class="requiredStar"> *</span></label>
            <div class="input-group">
                <input type="text" id="userPostcode" name="userPostcode" class="form-control" readonly>
                <button type="button" class="btn btn-primary" id="searchPostcodeBtn">우편번호 찾기</button>
            </div>
            <div id="postcodeError" class="error-message"></div>
        </div>
        <div class="mb-3">
            <label for="userAddress" class="form-label">주소<span class="requiredStar"> *</span></label>
            <input type="text" id="userAddress" name="userAddress" class="form-control" readonly>
            <div id="addressError" class="error-message"></div>
        </div>
        <div class="mb-3">
            <label for="userAddressDetail" class="form-label">상세주소<span class="requiredStar"> *</span></label>
            <input type="text" id="userAddressDetail" name="userAddressDetail" class="form-control" required placeholder="상세 주소를 입력하세요">
            <div id="addressDetailError" class="error-message"></div>
        </div>

        <!-- 동의 체크박스 -->
        <div class="form-check mb-3">
            <input type="checkbox" id="userMarketingAgree" name="userMarketingAgree" class="form-check-input">
            <label for="userMarketingAgree" class="form-check-label">마케팅 정보 수신 동의 [선택]</label>
        </div>
        <div class="form-check mb-3">
            <input type="checkbox" id="userPrivacyAgree" name="userPrivacyAgree" class="form-check-input" required>
            <label for="userPrivacyAgree" class="form-check-label">개인정보 처리방침 동의 [필수]<span class="requiredStar"> *</span></label>
        </div>

        <!-- 제출 버튼 -->
        <div id="submitDiv" style="display:none;">
            <button type="submit" class="btn btn-primary w-100" id="submitButton" disabled>회원가입</button>
        </div>
    </form>
    <div class="d-flex justify-content-between align-items-center mt-4" style="padding: 10px;">
        <a href="/" class="text-decoration-none">
            <i class="bi bi-house-door-fill"></i> 홈
        </a>
        <a href="/login" class="text-decoration-none">
            <i class="bi bi-box-arrow-in-right"></i> 로그인
        </a>
    </div>
</div>


<script>
    // CSRF 토큰 관련 함수 유지
    function getCsrfToken() {
        return document.querySelector('meta[name="_csrf"]').getAttribute('content');
    }

    function getCsrfHeader() {
        return document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
    }

    // 이메일 중복 체크 함수
    async function checkEmailDuplicate() {
        const email = document.getElementById("userEmail").value.trim();
        const emailError = document.getElementById("emailError");
        const emailMessage = document.getElementById("emailMessage");
        const emailInput = document.getElementById("userEmail");

        // 이메일 유효성 확인
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email) {
            emailError.textContent = "이메일을 입력해주세요.";
            emailInput.classList.add("is-invalid");
            emailInput.classList.remove("is-valid");
            return;
        } else if (!emailRegex.test(email)) {
            emailError.textContent = "유효한 이메일 주소를 입력하세요.";
            emailInput.classList.add("is-invalid");
            emailInput.classList.remove("is-valid");
            return;
        } else {
            emailError.textContent = "";
            emailInput.classList.add("is-valid");
            emailInput.classList.remove("is-invalid");
        }

        try {
            const response = await fetch("/main/check-email", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    [getCsrfHeader()]: getCsrfToken()
                },
                body: JSON.stringify({ userEmail: email })
            });

            const data = await response.json();

            if (data.status === "success") {
                emailMessage.innerHTML = "<span class='success'>사용 가능한 이메일입니다. 인증을 진행하세요.</span>";
                emailInput.classList.add("is-valid");
                emailInput.classList.remove("is-invalid");
                document.getElementById("verifyButtonDiv").style.display = "block";
            } else {
                emailMessage.innerHTML = "<span class='error'>이미 사용 중인 이메일입니다.</span>";
                emailInput.classList.add("is-invalid");
                emailInput.classList.remove("is-valid");
                document.getElementById("verifyButtonDiv").style.display = "none";
            }
        } catch (error) {
            emailMessage.innerHTML = "<span class='error'>중복 체크 중 오류가 발생했습니다.</span>";
        }
    }

    // 인증 이메일 발송 함수
    async function sendVerificationEmail() {
        const email = document.getElementById("userEmail").value.trim();
        if (!email) {
            alert("이메일을 입력해주세요.");
            return;
        }

        try {
            const response = await fetch("/main/send-verification-email", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    [getCsrfHeader()]: getCsrfToken()
                },
                body: JSON.stringify({ userEmail: email })
            });

            const data = await response.json();
            const emailMessage = document.getElementById("emailMessage");

            if (data.status === "success") {
                emailMessage.innerHTML = "<span class='success'>인증 이메일이 전송되었습니다. 인증을 진행하세요.</span>";
                document.getElementById("verificationDiv").style.display = "block";
            } else {
                emailMessage.innerHTML = `<span class='error'>${data.message}</span>`;
            }
        } catch (error) {
            const emailMessage = document.getElementById("emailMessage");
            emailMessage.innerHTML = "<span class='error'>인증 이메일 발송 중 오류가 발생했습니다.</span>";
        }
    }

    // 인증 코드 확인 함수
    async function verifyEmailCode() {
        const email = document.getElementById("userEmail").value.trim();
        const verificationCode = document.getElementById("verificationCode").value.trim();
        const emailInput = document.getElementById("userEmail");
        const emailMessage = document.getElementById("emailMessage");

        if (!email || !verificationCode) {
            alert("이메일과 인증 코드를 모두 입력해주세요.");
            return;
        }

        try {
            const response = await fetch("/main/verify-email", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    [getCsrfHeader()]: getCsrfToken()
                },
                body: JSON.stringify({ userEmail: email, verificationCode: verificationCode })
            });

            const data = await response.json();

            if (data.status === "success") {
                emailMessage.innerHTML = "<span class='success'>이메일 인증이 완료되었습니다.</span>";
                emailInput.classList.add("is-valid");
                emailInput.classList.remove("is-invalid");
                document.getElementById("submitButton").disabled = false;
                document.getElementById("submitDiv").style.display = "block";
            } else {
                emailMessage.innerHTML = "<span class='error'>인증 코드가 올바르지 않습니다.</span>";
                emailInput.classList.add("is-invalid");
                emailInput.classList.remove("is-valid");
            }
        } catch (error) {
            emailMessage.innerHTML = "<span class='error'>인증 코드 확인 중 오류가 발생했습니다.</span>";
            emailInput.classList.add("is-invalid");
            emailInput.classList.remove("is-valid");
        }
    }

    // 주소 검색 함수
    function searchAddress(postcodeId, addressId, detailAddressId) {
        new daum.Postcode({
            oncomplete: function (data) {
                let addr = '';
                if (data.userSelectedType === 'R') {
                    addr = data.roadAddress;
                } else {
                    addr = data.jibunAddress;
                }

                document.getElementById(postcodeId).value = data.zonecode;
                document.getElementById(addressId).value = addr;

                // 검증 상태 업데이트
                document.getElementById(postcodeId).classList.add("is-valid");
                document.getElementById(postcodeId).classList.remove("is-invalid");
                document.getElementById(addressId).classList.add("is-valid");
                document.getElementById(addressId).classList.remove("is-invalid");

                if (detailAddressId) {
                    document.getElementById(detailAddressId).focus();
                }
            }
        }).open();
    }

    // 폼 검증 로직 유지
    document.addEventListener("DOMContentLoaded", () => {
        const fields = {
            email: { input: "userEmail", error: "emailError", regex: /^[^\s@]+@[^\s@]+\.[^\s@]+$/, message: "유효한 이메일 주소를 입력하세요." },
            password: { input: "userPw", error: "passwordError", regex: /^(?=.*[a-zA-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/, message: "비밀번호는 영문, 숫자, 특수문자를 포함하여 8자 이상이어야 합니다." },
            confirmPassword: { input: "confirmPw", error: "confirmPwError", validate: validateConfirmPassword, message: "비밀번호가 일치하지 않습니다." },
            name: { input: "name", error: "nameError", required: true, message: "이름을 입력하세요." },
            gender: { input: "userGender", error: "genderError", required: true, message: "성별을 선택하세요." },
            birth: { input: "userBirth", error: "birthError", required: true, message: "생일을 입력하세요." },
            phone: { input: "userPhone", error: "phoneError", regex: /^\d{10,11}$/, message: "10 ~ 11 자리 숫자만 입력하세요." },
            edu: { input: "userEduLevel", error: "eduError", required: true, message: "학력을 선택하세요." },
            postcode: { input: "userPostcode", error: "postcodeError", required: true, message: "우편번호를 입력하세요." },
            address: { input: "userAddress", error: "addressError", required: true, message: "주소를 입력하세요." },
            addressDetail: { input: "userAddressDetail", error: "addressDetailError", required: true, message: "상세 주소를 입력하세요." },
        };

        Object.keys(fields).forEach((key) => {
            const field = fields[key];
            const input = document.getElementById(field.input);
            const error = document.getElementById(field.error);

            if (field.regex) {
                input.addEventListener("input", () => validateField(input, field.regex, error, field.message));
            } else if (field.validate) {
                input.addEventListener("input", () => field.validate(input, error));
            } else if (field.required) {
                input.addEventListener("input", () => validateRequiredField(input, error, field.message));
            }
        });

        function validateField(input, regex, errorElement, errorMessage) {
            if (!regex.test(input.value.trim())) {
                input.classList.add("is-invalid");
                input.classList.remove("is-valid");
                errorElement.textContent = errorMessage;
            } else {
                input.classList.add("is-valid");
                input.classList.remove("is-invalid");
                errorElement.textContent = "";
            }
        }

        function validateRequiredField(input, errorElement, errorMessage) {
            if (input.value.trim() === "") {
                input.classList.add("is-invalid");
                input.classList.remove("is-valid");
                errorElement.textContent = errorMessage;
            } else {
                input.classList.add("is-valid");
                input.classList.remove("is-invalid");
                errorElement.textContent = "";
            }
        }

                function validateConfirmPassword(input, errorElement) {
            const passwordInput = document.getElementById("userPw");
            const confirmPassword = input.value.trim();
            const password = passwordInput.value.trim();

            if (confirmPassword !== password) {
                input.classList.add("is-invalid");
                input.classList.remove("is-valid");
                errorElement.textContent = "비밀번호가 일치하지 않습니다.";
            } else {
                input.classList.add("is-valid");
                input.classList.remove("is-invalid");
                errorElement.textContent = "";
            }
        }
    });
</script>

</body>
</html>
