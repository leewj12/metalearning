<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메타러닝 회차별 수강생 등록</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/admindashboard.css">
  <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
  <link rel="stylesheet" href="/static/css/header/adminheader.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    /* IP 주소 입력 필드 크기 조정 */
    #ipAddress {
      width: 250px;  /* 필드 크기 조정 */
      height: 35px;  /* 높이 조정 */
    }

    /* 스핀박스 버튼 숨기기 */
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }

    input[type="number"] {
        -moz-appearance: textfield; /* Firefox에서 스핀박스 숨기기 */
    }
  </style>
</head>
<body>
<!-- Header -->
<div th:replace="~{fragments/adminheader :: adminheader}"></div>

<div class="content-container">
  <!-- Sidebar -->
  <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>

  <!-- Main Content -->
  <div class="main-content container">
    <h2>IP 등록</h2>
    <form th:action="@{/admin/ipCreate/{sessionId}(sessionId=${sessionId})}" method="POST" onsubmit="return validateIP()">
      <!-- CSRF Token 추가 -->
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

      <!-- seeId 값은 hidden으로 전달 -->
      <input type="hidden" th:value="${sessionId}" name="kdtSessionId"/>

      <!-- IP 주소 입력 필드 -->
      <div class="mb-3">
        <label for="ipAddress" class="form-label">IP 주소</label>
        <input type="text" class="form-control" id="ipAddress" name="kdtipAddress" placeholder="예: xxx.xxx.xxx.xxx" required oninput="formatIP()" maxlength="15"/>
        <div id="ipError" style="color: red; display: none;">유효한 IP 주소를 입력해주세요.</div>
      </div>

      <!-- IP 등록 버튼 -->
      <button type="submit" class="btn btn-primary">IP 등록</button>
    </form>
  </div>
</div>

<!-- Bootstrap JS (필수) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>

<script>
  // IP 주소 형식 유효성 검사
  function validateIP() {
    const ipAddress = document.getElementById("ipAddress").value;
    const ipError = document.getElementById("ipError");

    // IP 주소가 .으로 구분되어 있는지 확인
    if (!ipAddress.includes(".")) {
      ipError.style.display = "block";  // 에러 메시지 표시
      ipError.innerHTML = "점(.)을 포함한 IP 주소 형식이 아닙니다.";
      return false;
    }

    // IP 주소 유효성 검사 정규식 (0~255 사이의 숫자)
    const ipPattern = /^(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;

    // IP 주소 형식에 맞는지 확인
    if (!ipPattern.test(ipAddress)) {
      ipError.style.display = "block";  // 에러 메시지 표시
      ipError.innerHTML = "유효한 IP 주소를 입력해주세요.";
      return false;  // 제출 방지
    } else {
      ipError.style.display = "none";  // 유효한 IP일 경우 에러 메시지 숨기기
      return true;  // 제출 허용
    }
  }

  // IP 주소 자동 포맷팅 ('.' 기준으로 구분)
  function formatIP() {
    let ipAddress = document.getElementById("ipAddress").value;

    // 숫자와 '.'만 남기기
    ipAddress = ipAddress.replace(/[^0-9.]/g, '');

    // '.'가 3개로 분리될 때까지만 입력 가능
    let parts = ipAddress.split('.');

    // 각 부분이 1자리 또는 2자리 또는 3자리 숫자만 받기
    for (let i = 0; i < parts.length; i++) {
      if (parts[i].length > 3) {
        parts[i] = parts[i].slice(0, 3);  // 3자리 이상은 잘라냄
      }
    }

    // 각 부분이 숫자로만 이루어져 있고 255를 넘지 않는지 확인
    for (let i = 0; i < parts.length; i++) {
      if (parseInt(parts[i]) > 255) {
        parts[i] = '255'; // 255 이상은 255로 설정
      }
    }

    // 4개를 넘지 않도록 제한
    if (parts.length > 4) {
      parts = parts.slice(0, 4);  // 4개를 넘으면 잘라냄
    }

    // 다시 '.'을 붙여서 IP 형식으로 만듦
    document.getElementById("ipAddress").value = parts.join('.');
  }
</script>
</body>
</html>
