<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메타러닝 회차별 수강생 등록</title>
    <!-- CSRF Token meta tags -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <!-- Styling links -->
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <link rel="stylesheet" href="/static/css/admindashboard.css">
    <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
    <link rel="stylesheet" href="/static/css/header/adminheader.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<!-- Header -->
<div th:replace="~{fragments/adminheader :: adminheader}"></div>

<div class="content-container">
    <!-- Sidebar -->
    <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>

    <!-- Main Content -->
    <div class="main-content container">
        <h2>회차별 수강생 IP 관리</h2>

        <!-- IP 목록 테이블 -->
        <table class="table table-striped">
            <thead>
            <tr>
                <th>번호</th>
                <th>IP 주소</th>
                <th>생성일</th>
                <th>수정일</th>
                <th>수정</th>
                <th>삭제</th>
            </tr>
            </thead>
            <tbody>
            <!-- IP 목록을 테이블에 출력 -->
            <tr th:each="ip : ${kdtIpViewDTOS}" class="ip-row">
                <td th:text="${ip.kdtIpId}"></td>
                <td th:text="${ip.kdtipAddress}"></td>
                <td th:text="${ip.kdtIpCreatedAt}"></td>
                <td th:text="${ip.kdtIpUpdatedAt}"></td>
                <td>
                    <!-- 수정 버튼 -->
                    <a th:href="@{/admin/ipUpdate/{id}(id=${ip.kdtIpId})}" class="btn btn-warning btn-sm">수정</a>
                </td>
                <td>
                    <!-- 삭제 버튼 with data-kdtIpId -->
                    <button th:data-kdtIpId="${ip.kdtIpId}" class="btn btn-danger btn-sm delete-ip-btn">삭제</button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // CSRF 토큰을 가져오는 함수
    function getCsrfToken() {
        const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
        console.log("CSRF Token:", csrfToken);  // 로그 추가
        return csrfToken;
    }

    function getCsrfHeaderName() {
        const csrfHeaderName = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
        console.log("CSRF Header Name:", csrfHeaderName);  // 로그 추가
        return csrfHeaderName;
    }

    // 삭제 버튼 클릭 시
    document.querySelectorAll('.delete-ip-btn').forEach(button => {
        button.addEventListener('click', async function() {
            const kdtIpId = this.dataset.kdtipid;  // data-kdtIpId 값 가져오기
            console.log("Selected IP ID:", kdtIpId);  // 로그 추가

            if (confirm("정말로 이 IP를 삭제하시겠습니까?")) {
                const csrfToken = getCsrfToken();  // CSRF 토큰 가져오기
                const csrfHeaderName = getCsrfHeaderName();  // CSRF 헤더 이름 가져오기

                console.log("URL for deletion:", `/api/admin/ipDelete/${kdtIpId}`);  // 로그 추가

                const url = `/api/admin/ipDelete/${kdtIpId}`;  // IP 삭제 API 호출 URL

                try {
                    const response = await fetch(url, {
                        method: 'DELETE',  // DELETE 요청
                        headers: {
                            'Content-Type': 'application/json',  // JSON 형식 요청
                            [csrfHeaderName]: csrfToken  // CSRF 토큰 포함
                        },
                    });

                    console.log("Response Status:", response.status);  // 응답 상태 로그

                    if (response.ok) {
                        // 삭제 성공 시 해당 테이블 행 제거
                        const row = this.closest('tr');  // 버튼을 포함한 <tr> 요소를 찾음
                        if (row) {
                            row.remove();  // 해당 행을 제거
                        }
                        alert('IP가 삭제되었습니다.');
                    } else {
                        console.error("Failed to delete IP, status:", response.status); // 삭제 실패 로그
                        alert('IP 삭제에 실패했습니다.');
                    }
                } catch (error) {
                    console.error("Error during IP deletion:", error); // 예외 처리 로그
                    alert('IP 삭제 중 오류가 발생했습니다.');
                }
            }
        });
    });
</script>

</body>
</html>
