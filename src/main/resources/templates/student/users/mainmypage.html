<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메타러닝 학생 메인페이지</title>
    <link rel="stylesheet" href="/static/css/admindashboard.css">
    <link rel="stylesheet" href="/static/css/header/studentsidebar.css">
    <link rel="stylesheet" href="/static/css/header/studentheader.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        /* Hero Section Customization */
        .hero-section {
            background: linear-gradient(145deg, #1e3c72, #2a5298);
            color: white;
            padding: 60px 20px;
            border-radius: 10px;
            text-align: center;
        }

        .hero-section h1 {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .hero-section p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .hero-section .btn {
            background-color: #f8c300;
            color: #1e3c72;
            font-weight: bold;
        }

        /* Card Section */
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.2);
        }

        /* About Section */
        .about-section {
            padding: 30px;
            border-radius: 10px;
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .about-section h2 {
            margin-bottom: 20px;
        }

        .about-section p {
            margin-bottom: 15px;
        }

        /* Testimonials Section */
        .testimonials-section {
            padding: 30px;
            background: #f7f9fc;
            border-radius: 10px;
        }

        .testimonials-section h2 {
            margin-bottom: 30px;
        }

        .blockquote-footer {
            font-size: 0.9rem;
            color: #6c757d;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-section h1 {
                font-size: 1.8rem;
            }

            .hero-section p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Header -->
    <div th:replace="~{fragments/studentheader :: studentheader}"></div>

    <div class="content-container">
        <!-- Sidebar -->
        <div th:replace="~{fragments/studentsidebar :: studentsidebar}" class="bg-light p-3"></div>

        <!-- Main Content -->
        <div class="main-content container mt-4">
            <!-- Hero Section -->
            <div class="hero-section">
                <h1><i class="bi bi-mortarboard"></i> 메타러닝에 오신 것을 환영합니다</h1>
                <p>여러분의 성공을 위한 플랫폼, 지금 바로 시작하세요!</p>
                <a href="#" class="btn btn-lg"><i class="bi bi-arrow-right-circle"></i> 시작하기</a>
            </div>

            <!-- Statistics Section -->

<!--                </div>-->
<!--            </div>-->

            <!-- About Section -->
            <div class="about-section mt-5">
                <h2>메타러닝이란?</h2>
                <p>다양한 학습 자료를 통해 원하는 시간과 장소에서 효율적인 학습을 제공합니다.</p>
                <a href="#" class="btn btn-outline-primary">더 알아보기</a>
            </div>

            <!-- Testimonials Section -->
            <div class="testimonials-section mt-5">
                <h2>학생들의 의견</h2>
                <div class="row">
                    <div class="col-md-4">
                        <div class="card p-3">
                            <p>"메타러닝 덕분에 크게 성장했습니다."</p>
                            <footer class="blockquote-footer">학생 A</footer>
                        </div>
                    </div>

                            <footer class="blockquote-footer">학생 C</footer>
                        </div>

        </div>
    </div>
