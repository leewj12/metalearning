<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>메타러닝 회차 수정</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/admindashboard.css">
  <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
  <link rel="stylesheet" href="/static/css/header/adminheader.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <script type="text/javascript">
    // 주소검색 함수 정의
    function searchAddress(postcodeId, addressId, detailAddressId) {
        new daum.Postcode({
            oncomplete: function (data) {
                let addr = ''; // 도로명/지번 주소
                let extraAddr = ''; // 참고항목

                // 사용자 선택 타입에 따른 주소 결정
                if (data.userSelectedType === 'R') {
                    addr = data.roadAddress; // 도로명 주소
                } else {
                    addr = data.jibunAddress; // 지번 주소
                }

                // 참고항목 설정 (도로명 주소일 경우)
                if (data.userSelectedType === 'R') {
                    if (data.bname && /[동|로|가]$/g.test(data.bname)) {
                        extraAddr += data.bname; // 법정동 추가
                    }
                    if (data.buildingName && data.apartment === 'Y') {
                        extraAddr += (extraAddr ? ', ' + data.buildingName : data.buildingName); // 건물명 추가
                    }
                }

                // 우편번호와 주소 필드 채우기
                document.getElementById(postcodeId).value = data.zonecode; // 우편번호
                document.getElementById(addressId).value = addr; // 도로명 또는 지번 주소

                // 상세주소 입력란에 포커스
                if (detailAddressId) {
                    document.getElementById(detailAddressId).focus();
                }
            }
        }).open(); // 팝업 열기
    }

    // DOM이 준비된 후 이벤트 설정
    document.addEventListener('DOMContentLoaded', () => {
        const postcodeButton = document.getElementById('searchPostcodeBtn');
        if (postcodeButton) {
            postcodeButton.addEventListener('click', () => {
                searchAddress('sessionPostcode', 'sessionAddress', 'sessionAddressDetail');
            });
        } else {
            console.error('우편번호 찾기 버튼을 찾을 수 없습니다.');
        }

        // 입력값이 변경될 때마다 총 교육시간 계산
        const sessionTotalDayInput = document.getElementById('sessionTotalDay');
        const sessionOnedayTimeInput = document.getElementById('sessionOnedayTime');
        const sessionTotalTimeInput = document.getElementById('sessionTotalTime');

        function calculateTotalTime() {
            const totalDays = parseInt(sessionTotalDayInput.value) || 0; // 입력값이 없으면 0으로 처리
            const oneDayTime = parseInt(sessionOnedayTimeInput.value) || 0; // 입력값이 없으면 0으로 처리
            const totalTime = totalDays * oneDayTime;

            // 총 교육시간을 입력 필드에 표시
            sessionTotalTimeInput.value = totalTime;
        }

        // 총 교육일수나 하루 교육시간이 변경될 때마다 계산
        sessionTotalDayInput.addEventListener('input', calculateTotalTime);
        sessionOnedayTimeInput.addEventListener('input', calculateTotalTime);
    });
  </script>
</head>
<body>
<div class="app-container">

  <div th:replace="~{fragments/adminheader :: adminheader}"></div>
  <div class="content-container">
    <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>
    <div class="main-content">
      <div class="container">
        <h2><i class="bi bi-pencil-square"></i> 회차 수정</h2>
        <form th:action="@{/admin/KDT/session/update/{id}(id=${sessionDTO.kdtSessionId})}" method="post" enctype="multipart/form-data">
          <input type="hidden" th:value="${sessionDTO.kdtSessionId}" name="kdtSessionId" />
          <input type="hidden" th:value="${sessionDTO.kdtSessionNum}" name="kdtSessionNum" />

          <!-- 세션 제목 -->
          <div class="form-group">
            <label for="kdtSessionTitle"><i class="bi bi-type"></i> 회차 제목<span style="color:red;">*</span></label>
            <input type="text" th:value="${sessionDTO.kdtSessionTitle}" name="kdtSessionTitle" class="form-control" required />
          </div>

          <!-- 세션 설명 -->
          <div class="form-group">
            <label for="kdtSessionDescript"><i class="bi bi-card-text"></i> 회차 설명<span style="color:red;">*</span></label>
            <textarea th:text="${sessionDTO.kdtSessionDescript}" name="kdtSessionDescript" class="form-control" rows="3"></textarea>
          </div>

          <!-- 시작일 -->
          <div class="form-group">
            <label for="kdtSessionStartDate"><i class="bi bi-calendar-event"></i> 시작일<span style="color:red;">*</span></label>
            <input type="date" th:value="${sessionDTO.kdtSessionStartDate}" name="kdtSessionStartDate" class="form-control" required />
          </div>

          <!-- 종료일 -->
          <div class="form-group">
            <label for="kdtSessionEndDate"><i class="bi bi-calendar-x"></i> 종료일<span style="color:red;">*</span></label>
            <input type="date" th:value="${sessionDTO.kdtSessionEndDate}" name="kdtSessionEndDate" class="form-control" required />
          </div>

          <!-- 시작 시간 -->
          <div class="form-group">
            <label for="kdtSessionStartTime"><i class="bi bi-clock"></i> 시작 시간<span style="color:red;">*</span></label>
            <input type="time" th:value="${sessionDTO.kdtSessionStartTime}" name="kdtSessionStartTime" class="form-control" required />
          </div>

          <!-- 종료 시간 -->
          <div class="form-group">
            <label for="kdtSessionEndTime"><i class="bi bi-clock-fill"></i> 종료 시간<span style="color:red;">*</span></label>
            <input type="time" th:value="${sessionDTO.kdtSessionEndTime}" name="kdtSessionEndTime" class="form-control" required />
          </div>

          <!-- 세션 카테고리 -->
          <div class="form-group">
            <label for="sessionCategory" class="form-label">
              <i class="bi bi-tags"></i> 카테고리<span style="color:red;">*</span>
            </label>
            <select id="sessionCategory" name="kdtSessionCategory" class="form-select" required>
              <option value="" th:selected="${sessionDTO.kdtSessionCategory == ''}">선택하세요.</option>
              <option value="IT" th:selected="${sessionDTO.kdtSessionCategory == 'IT'}">IT</option>
              <option value="클라우드" th:selected="${sessionDTO.kdtSessionCategory == '클라우드'}">클라우드</option>
              <option value="데이터 분석" th:selected="${sessionDTO.kdtSessionCategory == '데이터 분석'}">데이터 분석</option>
              <option value="디자인" th:selected="${sessionDTO.kdtSessionCategory == '디자인'}">디자인</option>
              <option value="마케팅" th:selected="${sessionDTO.kdtSessionCategory == '마케팅'}">마케팅</option>
            </select>
          </div>

          <!-- 최대 인원 -->
          <div class="form-group">
            <label for="kdtSessionMaxCapacity"><i class="bi bi-people-fill"></i> 최대 인원<span style="color:red;">*</span></label>
            <input type="number" th:value="${sessionDTO.kdtSessionMaxCapacity}" name="kdtSessionMaxCapacity" class="form-control" required />
          </div>

          <!-- 썸네일 -->
          <div class="form-group">
            <label for="kdtSessionThumbnail"><i class="bi bi-image"></i> 썸네일<span style="color:red;">*</span></label>
            <div class="d-flex align-items-center">
              <!-- 썸네일 이미지 -->
              <div class="thumbnail-preview me-3">
                <img id="thumbnailPreview"
                     th:src="${sessionDTO.kdtSessionThumbnail != null ? '/static/images/course/' + sessionDTO.kdtSessionThumbnail : '/static/images/null.png'}"
                     alt="썸네일 이미지"
                     style="max-width: 100px; max-height: 100px;"
                     onerror="this.src='/static/images/null.png'; this.alt='이미지 없음';" />
              </div>
              <!-- 파일 업로드 -->
              <div>
                <input type="file" name="file" class="form-control" id="fileInput" accept="image/*" />
              </div>
            </div>
            <!-- 기존 썸네일 정보 -->
            <input type="hidden" th:value="${sessionDTO.kdtSessionThumbnail}" name="existingThumbnail" />
          </div>

          <!-- 우편번호 -->
          <div class="form-group">
            <label for="kdtSessionPostcode"><i class="bi bi-geo-alt"></i> 우편번호<span style="color:red;">*</span></label>
            <div class="input-group">
              <input type="text" th:value="${sessionDTO.kdtSessionPostcode}" name="kdtSessionPostcode" id="sessionPostcode" class="form-control" />
              <button type="button" id="searchPostcodeBtn" class="btn btn-outline-primary">
                <i class="bi bi-search"></i> 찾기
              </button>
            </div>
          </div>

          <!-- 주소 -->
          <div class="form-group">
            <label for="kdtSessionAddress"><i class="bi bi-house-door"></i> 주소<span style="color:red;">*</span></label>
            <input type="text" th:value="${sessionDTO.kdtSessionAddress}" name="kdtSessionAddress" id="sessionAddress" class="form-control" />
          </div>

          <!-- 상세 주소 -->
          <div class="form-group">
            <label for="kdtSessionAddressDetail"><i class="bi bi-list"></i> 상세 주소<span style="color:red;">*</span></label>
            <input type="text" th:value="${sessionDTO.kdtSessionAddressDetail}" name="kdtSessionAddressDetail" id="sessionAddressDetail" class="form-control" />
          </div>

          <!-- 온라인 여부 -->
          <div class="form-group">
            <label for="kdtSessionOnline"><i class="bi bi-laptop"></i> 온라인 여부<span style="color:red;">*</span></label>
            <select th:value="${sessionDTO.kdtSessionOnline}" name="kdtSessionOnline" class="form-select">
              <option value="true">온라인</option>
              <option value="false">오프라인</option>
            </select>
          </div>

          <!-- 총 교육일 -->
          <div class="form-group">
            <label for="kdtSessionTotalDay"><i class="bi bi-calendar4-week"></i> 총 교육일<span style="color:red;">*</span></label>
            <input type="number" th:value="${sessionDTO.kdtSessionTotalDay}" name="kdtSessionTotalDay" id="sessionTotalDay" class="form-control" />
          </div>

          <!-- 하루 교육 시간 -->
          <div class="form-group">
            <label for="kdtSessionOnedayTime"><i class="bi bi-hourglass-split"></i> 하루 교육 시간<span style="color:red;">*</span></label>
            <input type="number" th:value="${sessionDTO.kdtSessionOnedayTime}" name="kdtSessionOnedayTime" id="sessionOnedayTime" class="form-control" />
          </div>

          <!-- 총 교육 시간 -->
          <div class="form-group">
            <label for="kdtSessionTotalTime"><i class="bi bi-clock-history"></i> 총 교육 시간<span style="color:red;">*</span></label>
            <input type="number" th:value="${sessionDTO.kdtSessionTotalTime}" name="kdtSessionTotalTime" id="sessionTotalTime" class="form-control" readonly />
          </div>

          <!-- 상태 -->
          <div class="form-group">
            <label for="kdtSessionStatus"><i class="bi bi-info-circle"></i> 상태<span style="color:red;">*</span></label>

            <select name="kdtSessionStatus" class="form-select">
              <option value="WAITING" th:selected="${sessionDTO.kdtSessionStatus == '대기'}">대기</option>
              <option value="ONGOING" th:selected="${sessionDTO.kdtSessionStatus == '진행중'}">진행중</option>
              <option value="FINISHED" th:selected="${sessionDTO.kdtSessionStatus == '종료'}">종료</option>
            </select>
          </div>

          <!-- 저장 버튼 -->
          <div class="d-flex justify-content-center mt-4 gap-3">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-save"></i> 저장
            </button>
            <a th:href="@{'/view/admin/KDT/course/' + ${sessionDTO.kdtSessionId}}" class="btn btn-secondary">
              <i class="bi bi-list"></i> 목차
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  // 파일 입력 필드와 미리보기 이미지 연결
  document.getElementById('fileInput').addEventListener('change', function(event) {
    const file = event.target.files[0]; // 선택한 파일 가져오기
    const preview = document.getElementById('thumbnailPreview'); // 미리보기 이미지 요소

    if (file) {
      const reader = new FileReader(); // FileReader 객체 생성
      reader.onload = function(e) {
        preview.src = e.target.result; // 파일 내용을 미리보기 이미지로 설정
        preview.alt = "선택한 이미지"; // alt 속성 업데이트
      };
      reader.readAsDataURL(file); // 파일 읽기 시작
    } else {
      // 파일이 선택되지 않으면 기본 이미지로 복원
      preview.src = '/static/images/null.png';
      preview.alt = "이미지 없음";
    }
  });
</script>

</body>
</html>
