<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메타러닝 시험 답안 등록</title>
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <!-- 헤더 CSS, JS(head에 적당히) -->
    <link rel="stylesheet" href="/static/css/admindashboard.css">
    <link rel="stylesheet" href="/static/css/header/studentsidebar.css">
    <link rel="stylesheet" href="/static/css/header/studentheader.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
<div class="app-container">
    <!-- Header -->
    <div th:replace="~{fragments/studentheader :: studentheader}"></div>
    <div class="content-container">
        <!-- Sidebar -->
        <div th:replace="~{fragments/studentsidebar :: studentsidebar}"></div>
        <!-- Main Content -->
        <div class="main-content">
            <h1>시험 목록</h1>
            <h2 th:text="${KDTSessionDTO.kdtSessionTitle}"></h2>

            <table class="table table-striped">
                <thead>
                <tr>
                    <th>시험 제목</th>
                    <th>출제자 이름</th>
                    <th>시험 시작일</th>
                    <th>시험 종료일</th>
                    <th>최종 제출일</th>
                    <th>점수</th>
                    <th>백분위</th>
                    <th>상세</th>
                </tr>
                </thead>
                <tbody>
                <!-- kdtTestStudentListDTOs 리스트를 반복하여 테이블에 출력 -->
                <tr th:each="test : ${kdtTestStudentListDTOs}">
                    <td th:text="${test.kdtTestTitle}"></td>
                    <td th:text="${test.authorName}"></td>
                    <td th:text="${test.kdtTestStartDate}"></td>
                    <td th:text="${test.kdtTestEndDate}"></td>
                    <td th:text="${test.kdtTestSubmitLastDate}"></td>
                    <td th:text="${test.status == false ? '미공개' : (test.actualScore != null and test.maxScore != null ? test.actualScore + ' / ' + test.maxScore : '')}"></td>
                    <td th:text="${test.status == false ? '미공개' : (test.percentile != null ? test.percentile : '')}"></td>
                    <td>
                        <a th:if="${test.available == true and test.kdtTestSubmitLastDate == '미응시'}"
                           th:href="@{/student/KDT/{kdtSessionId}/test/submit/{kdtTestId}(kdtSessionId=${KDTSessionDTO.kdtSessionId}, kdtTestId=${test.kdtTestId})}">시험 응시</a>

                        <a th:if="${test.kdtTestSubmitLastDate != '미응시'}"
                           th:href="@{/student/KDT/{kdtSessionId}/test/submit/detail/{kdtTestId}(kdtSessionId=${KDTSessionDTO.kdtSessionId}, kdtTestId=${test.kdtTestId})}">상세 보기</a>
                    </td>
                </tr>
                </tbody>
            </table>


        </div>
    </div>
</div>

</body>
</html>
