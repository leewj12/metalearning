<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>메타러닝 국비 과정 수정</title>
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/static/css/admindashboard.css">
    <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
    <link rel="stylesheet" href="/static/css/header/adminheader.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        .main-content {
            width: 80%;
        }
    </style>
</head>
<body>

<!-- Header -->
<div th:replace="~{fragments/adminheader :: adminheader}"></div>

<div class="content-container">
    <!-- Sidebar -->
    <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>

    <!-- Main Content -->
    <div class="main-content container mt-4">
        <h1 class="text-center mb-4">
            <i class="bi bi-pencil-square"></i> 국비 과정 수정
        </h1>

        <form th:action="@{/admin/KDT/course/update/{courseId}(courseId=${kdtcourse.kdtCourseId})}" method="POST" class="needs-validation" novalidate id="courseForm">

            <!-- CSRF Token -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <!-- 과정 ID 필드를 숨김 처리 -->
            <input type="hidden" id="kdtCourseId" name="kdtCourseId" th:value="${kdtcourse.kdtCourseId}" />

            <!-- 과정명 입력 -->
            <div class="mb-3">
                <label for="kdtCourseTitle" class="form-label">
                    <i class="bi bi-bookmark"></i> 국비 과정명:<span style="color:red;">*</span>
                </label>
                <input type="text" id="kdtCourseTitle" name="kdtCourseTitle" class="form-control" th:value="${kdtcourse.kdtCourseTitle}" required />
                <div class="invalid-feedback">과정명을 입력해주세요.</div>
            </div>

            <!-- 수강 상태 선택 -->
            <div class="mb-3">
                <label for="kdtCourseStatus" class="form-label">
                    <i class="bi bi-toggle-on"></i> 상태:<span style="color:red;">*</span>
                </label>
                <select id="kdtCourseStatus" name="kdtCourseStatus" class="form-select" required>
                    <option th:value="true" th:text="'활성'" th:selected="${kdtcourse.kdtCourseStatus == true}"></option>
                    <option th:value="false" th:text="'비활성'" th:selected="${kdtcourse.kdtCourseStatus == false}"></option>
                </select>
                <div class="invalid-feedback">상태를 선택해주세요.</div>
            </div>

            <!-- 과정 종류 선택 -->
            <div class="mb-3">
                <label for="kdtCourseType" class="form-label">
                    <i class="bi bi-list-ul"></i> 국비 과정 종류:<span style="color:red;">*</span>
                </label>
                <select id="kdtCourseTypeSelect" name="kdtCourseType" required class="form-select" onchange="updateCourseTypeValue()"
                        th:data-course-type="${kdtcourse.kdtCourseType}">
                    <option value="K-디지털 트레이닝" th:selected="${kdtcourse.kdtCourseType == 'K-디지털 트레이닝'}">K-디지털 트레이닝</option>
                    <option value="국가기간 전략산업 직종훈련" th:selected="${kdtcourse.kdtCourseType == '국가기간 전략산업 직종훈련'}">국가기간 전략산업 직종훈련</option>
                    <option value="산업구조 변화대응 특화훈련" th:selected="${kdtcourse.kdtCourseType == '산업구조 변화대응 특화훈련'}">산업구조 변화대응 특화훈련</option>
                    <option value="청년층 취업훈련" th:selected="${kdtcourse.kdtCourseType == '청년층 취업훈련'}">청년층 취업훈련</option>
                    <option value="기타" th:selected="${kdtcourse.kdtCourseType != null && kdtcourse.kdtCourseType != '' && kdtcourse.kdtCourseType != '청년층 취업훈련' && kdtcourse.kdtCourseType != '산업구조 변화대응 특화훈련' && kdtcourse.kdtCourseType != 'K-디지털 트레이닝' && kdtcourse.kdtCourseType != '국가기간 전략산업 직종훈련'}">기타(직접입력)</option>
                </select>
            </div>

            <!-- 기타 과정 입력 필드 (동적으로 생성됨) -->
            <div class="mb-3" id="otherInputContainer"></div>

            <div class="d-flex justify-content-center mt-4 gap-3">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> 수정 완료
                </button>
                <a th:href="@{'/view/admin/KDT/list'}" class="btn btn-secondary">
                    <i class="bi bi-list"></i> 목록
                </a>
            </div>
        </form>

    </div>
</div>

<script>
    function updateCourseTypeValue() {
        let courseTypeSelect = document.getElementById("kdtCourseTypeSelect");
        let otherInputContainer = document.getElementById("otherInputContainer");

        // '기타'가 선택되면 입력 필드를 동적으로 생성
        if (courseTypeSelect.value === "기타") {
            // 이미 입력 필드가 있으면 다시 생성하지 않음
            if (!document.querySelector(".other-course-div")) {
                let otherInputDiv = document.createElement("div");
                otherInputDiv.className = "other-course-div";  // 클래스명으로 구분

                let label = document.createElement("label");
                label.setAttribute("for", "otherCourse");
                label.className = "form-label";
                label.textContent = "기타 과정명:"; // 설명 추가

                let input = document.createElement("input");
                input.type = "text";
                input.id = "otherCourseInput";
                input.name = "kdtCourseType";  // Ensure it sends this value as `kdtCourseType`
                input.className = "form-control";
                // Thymeleaf에서 전달된 값 미리 삽입
                let selectedCourseType = courseTypeSelect.getAttribute('data-course-type');
                if (["K-디지털 트레이닝", "국가기간 전략산업 직종훈련", "산업구조 변화대응 특화훈련", "청년층 취업훈련"].includes(selectedCourseType)) {
                    input.value = ""; // 특정 값이면 빈 값으로 설정
                } else {
                    input.value = selectedCourseType || ""; // 그 외에는 기본 값으로 설정
                }

                input.required = true;

                otherInputDiv.appendChild(label);
                otherInputDiv.appendChild(input);
                otherInputContainer.appendChild(otherInputDiv);
            }
        } else {
            // '기타' 외의 값이 선택되면 입력 필드와 라벨을 함께 제거
            let otherInputDiv = document.querySelector(".other-course-div");
            if (otherInputDiv) {
                otherInputDiv.remove();  // .other-course-div 클래스를 가진 div를 제거
            }
        }
    }

    // 폼 제출 시 '기타' 값이 선택되면 입력한 값을 `kdtCourseType`의 값으로 설정
    document.getElementById('courseForm').onsubmit = function(event) {
        let courseTypeSelect = document.getElementById("kdtCourseTypeSelect");
        let otherCourseInput = document.getElementById("otherCourseInput");

        // '기타'가 선택되었을 때 입력값을 `kdtCourseType`의 값으로 설정
        if (courseTypeSelect.value === "기타") {
            if (otherCourseInput && otherCourseInput.value.trim() !== "") {
                // 입력한 값을 `kdtCourseType`의 값으로 설정
                courseTypeSelect.value = otherCourseInput.value;
            } else {
                alert("기타 과정명을 입력해주세요.");
                event.preventDefault();  // 폼 제출을 막습니다.
                return false;  // 폼 제출을 취소
            }
        } else {
            otherCourseInput.value = ""; // 기타 값을 선택하지 않으면 `otherCourse` 값 초기화
        }
    }

    // 처음 페이지가 로드될 때 선택된 값에 따라 동작하도록 추가
    window.onload = function() {
        updateCourseTypeValue();
    }
</script>

</body>
</html>
