<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메타러닝 상담일지 상세</title>
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <!-- 헤더 CSS, JS(head에 적당히) -->
    <link rel="stylesheet" href="/static/css/admindashboard.css">
    <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
    <link rel="stylesheet" href="/static/css/header/adminheader.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
<div class="app-container">
    <!-- Header -->
    <div th:replace="~{fragments/adminheader :: adminheader}"></div>
    <div class="content-container">
        <!-- Sidebar -->
        <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>
        <!-- Main Content -->
        <div class="main-content">
            <h1 class="mb-4">상담정보 보기</h1>
            <h2 th:text="${KDTSessionDTO.kdtSessionTitle}" class="mb-3"></h2>

            <!-- 제목, 참가자, 카테고리, 날짜를 한 줄에 두 개씩 배치 -->
            <div class="row g-3 mb-3">
                <!-- 상담 제목 -->
                <div class="col-md-6">
                    <label for="kdtConsultTitle" class="form-label">
                        <i class="bi bi-pencil-square"></i> 상담 제목:
                    </label>
                    <input type="text" id="kdtConsultTitle" name="kdtConsultTitle" class="form-control" th:value="${KDTConsultDTO.kdtConsultTitle}" readonly>
                </div>

                <!-- 국비 참가자 -->
                <div class="col-md-6">
                    <label for="studentName" class="form-label">
                        <i class="bi bi-person-fill"></i> 국비 참가자:
                    </label>
                    <input type="text" id="studentName" name="studentName" class="form-control" th:value="${student}" readonly>
                </div>

                <!-- 상담 카테고리 -->
                <div class="col-md-6">
                    <label for="kdtConsultCategory" class="form-label">
                        <i class="bi bi-tag"></i> 상담 카테고리:
                    </label>
                    <input type="text" id="kdtConsultCategory" name="kdtConsultCategory" class="form-control" th:value="${KDTConsultDTO.kdtConsultCategory}" readonly>
                </div>

                <!-- 상담 날짜 -->
                <div class="col-md-6">
                    <label for="kdtConsultDate" class="form-label">
                        <i class="bi bi-calendar-date"></i> 상담 날짜:
                    </label>
                    <input type="date" id="kdtConsultDate" name="kdtConsultDate" class="form-control" th:value="${KDTConsultDTO.kdtConsultDate}" readonly>
                </div>
            </div>

            <!-- 상담 내용 -->
            <div class="mb-4">
                <label for="kdtConsultContent" class="form-label">
                    <i class="bi bi-chat-right-dots"></i> 상담 내용:
                </label>
                <textarea id="kdtConsultContent" name="kdtConsultContent" rows="4" class="form-control" th:text="${KDTConsultDTO.kdtConsultContent}" readonly></textarea>
            </div>


            <!-- 버튼 그룹 (가운데 정렬) -->
            <div class="text-center">
                <a th:href="@{/admin/KDT/{sessionId}/consult/update/{kdtConsultId}(sessionId=${KDTSessionDTO.kdtSessionId}, kdtConsultId=${KDTConsultDTO.kdtConsultId})}" class="btn btn-warning mx-2">
                    <i class="bi bi-pencil"></i> 수정
                </a>
                <button class="btn btn-danger mx-2" th:onclick="'deleteConsult('+${KDTSessionDTO.kdtSessionId}+', '+${KDTConsultDTO.kdtConsultId}+')'">
                    <i class="bi bi-trash"></i> 삭제
                </button>
                <a th:href="'/admin/KDT/'+${KDTSessionDTO.kdtSessionId}+'/consult/list'" class="btn btn-secondary mx-2">
                    <i class="bi bi-list"></i> 목차
                </a>
            </div>
        </div>
    </div>
    <script>
        // CSRF 토큰을 헤더에 추가하기 위한 함수
        function getCsrfToken() {
            return document.querySelector('meta[name="_csrf"]').getAttribute('content');
        }

        function getCsrfHeaderName() {
            return document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
        }

      function deleteConsult(kdtSessionId, kdtTrainId) {
          const url = `/api/admin/KDT/${kdtSessionId}/consult/delete/${kdtTrainId}`;
          console.log("Deleting outline with URL:", url); // 확인용 로그

          const csrfToken = getCsrfToken();
          const csrfHeaderName = getCsrfHeaderName();

          if (!confirm('정말 삭제하시겠습니까?')) {
              return;
          }

          fetch(url, {
              method: 'DELETE',
              headers: {
                  'Content-Type': 'application/json',
                  [csrfHeaderName]: csrfToken  // CSRF 토큰을 헤더에 포함
              }
          })
          .then(response => {
              if (response.ok) {
                  alert('삭제되었습니다.');
                  window.location.href = '/admin/KDT/' + kdtSessionId + '/consult/list';
              } else {
                  response.text().then(errMsg => {
                      console.error("Error Response:", errMsg);
                      alert('삭제에 실패했습니다.');
                  });
              }
          })
          .catch(error => {
              console.error("Error during fetch:", error);
              alert('삭제 중 오류가 발생했습니다.');
          });
      }
    </script>
</body>
</html>
