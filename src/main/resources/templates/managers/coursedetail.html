<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>메타러닝 강의 상세 정보</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/admindashboard.css">
  <link rel="stylesheet" href="/static/css/header/managersidebar.css">
  <link rel="stylesheet" href="/static/css/header/managerheader.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="app-container">
  <!-- Header -->
  <div th:replace="~{fragments/managerheader :: managerheader}"></div>
  <div class="content-container">
    <!-- Sidebar -->
    <div th:replace="~{fragments/managersidebar :: managersidebar}"></div>

    <!-- Main Content -->
    <div class="main-content container mt-4" style="max-width:800px;">

      <div class="d-flex flex-column justify-content-center">

      <h1 class="text-center mb-4">
        <i class="bi bi-info-circle"></i> 강의 상세 정보
      </h1>

      <!-- 강의 기본 정보 -->
      <div class="card mb-4">
        <div class="card-header bg-primary text-white">
          <h4>강의 기본 정보</h4>
        </div>
        <div class="card-body">
          <p><strong>강의 제목:</strong> <span th:text="${updateResponse.courseTitle}"></span></p>
          <p><strong>강의 설명:</strong> <span th:text="${updateResponse.courseDescript}"></span></p>
          <p><strong>가격:</strong> <span class="course-price" th:text="${updateResponse.coursePrice}"></span></p>
          <p><strong>카테고리:</strong> <span th:text="${updateResponse.courseCategory}"></span></p>
          <p><strong>난이도:</strong> <span th:text="${updateResponse.courseDifficulty}"></span></p>
        </div>
      </div>

      <!-- 썸네일 -->
      <div class="card mb-4">
        <div class="card-header bg-secondary text-white">
          <h4>썸네일</h4>
        </div>
        <div class="card-body">
          <img th:if="${updateResponse.courseThumbnail != null}"
               th:src="'/uploads/course/' + ${updateResponse.courseThumbnail}"
               alt="강의 썸네일"
               style="max-width: 200px; max-height: 200px;"
               class="img-thumbnail">
          <p th:if="${updateResponse.courseThumbnail == null}" class="text-muted">썸네일 없음</p>
        </div>
      </div>

      <!-- 설명 파일 -->
      <div class="card mb-4">
        <div class="card-header bg-info text-white">
          <h4>설명 파일</h4>
        </div>
        <div class="card-body">
          <div class="d-flex flex-column align-items-center">
            <div th:each="file : ${updateResponse.courseDescriptFiles}" class="mb-4">
              <!-- 이미지 미리보기 -->
              <img th:src="'/uploads/course/' + ${file.courseDescriptFiles}"
                   alt="이미지 미리보기"
                   style="max-width: 500px; max-height: 500px; object-fit: cover; border-radius: 8px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);"
                   class="img-fluid">
              <!-- 파일 이름 및 링크 -->
              <!-- <a th:href="'/uploads/course/' + ${file.courseDescriptFiles}"
                  th:text="${file.courseDescriptFiles}"
                  target="_blank"
                  class="text-center"></a>-->
            </div>
          </div>
        </div>
      </div>

      <!-- 세부 정보 -->
      <div class="card mb-4">
        <div class="card-header bg-success text-white">
          <h4>강의 세부 정보</h4>
        </div>
        <div class="card-body">
          <div th:each="detail : ${updateResponse.courseDetails}" class="mb-3">
            <h5>세부 목차: <span th:text="${detail.courseDetailOutline}"></span></h5>
            <p><strong>세부 제목:</strong> <span th:text="${detail.courseDetailTitle}"></span></p>
            <p><strong>세부 내용:</strong> <span th:text="${detail.courseDetailContent}"></span></p>

            <!-- 파일 미리보기 -->
            <div th:if="${detail.courseDetailFileUUID != null}">
              <h6>파일:</h6>
              <p>
                <a th:href="'/static/uploads/course_files/' + ${detail.courseDetailFileUUID}" th:download="${detail.courseDetailFileUUID}" target="_blank" class="btn btn-success btn-sm">파일조회</a>
              </p>
            </div>

            <!-- 동영상 미리보기 -->
            <div th:if="${detail.courseVideoUrl != null}">
              <h6>강의 영상:</h6>
              <p>
                <a th:href="${detail.courseVideoUrl}" target="_blank" class="btn btn-primary btn-sm">다운로드</a>
              </p>
            </div>

            <hr/>
          </div>
        </div>
      </div>

        <div class="d-flex justify-content-center gap-2 mt-4">
          <button class="btn btn-secondary" onclick="history.back()">
            <i class="bi bi-arrow-left"></i> 뒤로가기
          </button>
        </div>

      </div>

    </div>

  </div>
</div>
<script>
  document.addEventListener("DOMContentLoaded", function () {
      const priceElements = document.querySelectorAll(".course-price");
      priceElements.forEach(function (priceElement) {
          const price = parseFloat(priceElement.textContent);
          if (!isNaN(price)) {
              priceElement.textContent = price.toLocaleString('en-US'); // 쉼표로 3자리 단위 포맷팅
          }
      });
  });
</script>
</body>
</html>
