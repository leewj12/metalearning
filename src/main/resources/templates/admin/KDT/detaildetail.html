<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>메타러닝 홍보 게시글 상세</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/admindashboard.css">
  <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
  <link rel="stylesheet" href="/static/css/header/adminheader.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    .main-content {
      padding: 20px;
    }
    .file-image {
      max-width: 100%;
      height: auto;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
    .file-list a {
      text-decoration: none;
      color: #007bff;
    }
    .file-list a:hover {
      text-decoration: underline;
    }
    .back-button {
      margin-top: 20px;
      text-align: center;
    }
    .card-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-title .bi {
      font-size: 1.5rem;
      color: #007bff;
    }
    .detail-icon {
      margin-right: 5px;
    }
    .action-buttons {
      margin-top: 20px;
    }
    .action-buttons .btn {
      margin-right: 10px;
    }
    .action-buttons form {
      margin: 0;
      display: inline-block;
    }
    .action-buttons .btn-group {
      display: flex;
      justify-content: center;
      gap: 10px;
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- Header -->
  <div th:replace="~{fragments/adminheader :: adminheader}"></div>
  <div class="content-container">
    <!-- Sidebar -->
    <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>
    <!-- Main Content -->
    <div class="main-content container">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="card-title">
            <i class="bi bi-file-text"></i> 홍보 게시글 상세
          </h1>

          <div th:if="${detail != null}">
            <!-- 상세 내용 -->
            <p>
              <i class="bi bi-person detail-icon"></i>
              <strong>작성자:</strong> <span th:text="${detail.userEntity.username}">작성자명</span>
            </p>
            <p>
              <i class="bi bi-calendar detail-icon"></i>
              <strong>작성일:</strong> <span th:text="${#temporals.format(detail.kdtDetailCreatedAt, 'yyyy-MM-dd HH:mm')}">작성일</span>
            </p>
            <p>
              <i class="bi bi-clock detail-icon"></i>
              <strong>수정일:</strong> <span th:text="${#temporals.format(detail.kdtDetailUpdatedAt, 'yyyy-MM-dd HH:mm')}">수정일</span>
            </p>
            <p>
              <i class="bi bi-text-paragraph detail-icon"></i>
              <strong>내용:</strong>
            </p>
            <div class="card-text" th:utext="${detail.kdtDetailContent}">상세 내용</div>

            <!-- 첨부 파일 -->
            <div th:if="${detail.files != null}">
              <ul class="list-group file-list">
                <li class="list-group-item" th:each="file : ${detail.files}">
                  <div th:if="${#strings.endsWith(file.kdtDetailFileName.toLowerCase(), '.png') ||
                               #strings.endsWith(file.kdtDetailFileName.toLowerCase(), '.jpg') ||
                               #strings.endsWith(file.kdtDetailFileName.toLowerCase(), '.jpeg') ||
                               #strings.endsWith(file.kdtDetailFileName.toLowerCase(), '.gif')}">
                    <img th:src="@{/static/images/uploads/{uuid}(uuid=${file.kdtDetailFileUUID})}"
                         th:alt="${file.kdtDetailFileName}" class="file-image" />
                  </div>
                  <div th:unless="${#strings.endsWith(file.kdtDetailFileName.toLowerCase(), '.png') ||
                                   #strings.endsWith(file.kdtDetailFileName.toLowerCase(), '.jpg') ||
                                   #strings.endsWith(file.kdtDetailFileName.toLowerCase(), '.jpeg') ||
                                   #strings.endsWith(file.kdtDetailFileName.toLowerCase(), '.gif')}">
                    <a th:href="@{/static/images/uploads/{uuid}(uuid=${file.kdtDetailFileUUID})}" th:text="${file.kdtDetailFileName}"></a>
                    (<span th:text="${file.kdtDetailFileType}">파일 타입</span>,
                    <span th:text="${file.kdtDetailFileSize}">파일 크기</span> bytes)
                  </div>
                </li>
              </ul>
            </div>

            <!-- 수정 및 삭제 버튼 -->
            <div class="mt-3 action-buttons">
              <div class="btn-group">
                <a th:href="@{/admin/KDT/{kdtSessionId}/detail/update(kdtSessionId=${kdtSessionId})}">
                  <button class="btn btn-primary">
                    <i class="bi bi-pencil-square"></i> 수정하기
                  </button>
                </a>
                <form th:action="@{/api/admin/KDT/{kdtSessionId}/detail/delete(kdtSessionId=${kdtSessionId})}"
                      method="post">
                  <input type="hidden" name="_csrf" th:value="${_csrf.token}" />
                  <input type="hidden" name="_method" value="delete" />
                  <button type="submit" class="btn btn-danger" onclick="return confirm('정말 삭제하시겠습니까?');">
                    <i class="bi bi-trash"></i> 삭제하기
                  </button>
                </form>
              </div>
            </div>
          </div>

          <div th:if="${detail == null}">
            <!-- 상세 내용 없음 -->
            <p>내용이 없습니다.</p>
            <a th:href="@{/admin/KDT/{kdtSessionId}/detail(kdtSessionId=${kdtSessionId})}">
              <button class="btn btn-primary">
                <i class="bi bi-plus-square"></i> 등록하기
              </button>
            </a>
          </div>

      <!-- 뒤로 가기 버튼 -->
      <div class="back-button">
        <a th:href="@{/view/admin/KDT/session/{kdtSessionId}(kdtSessionId=${kdtSessionId})}">
          <button class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> 뒤로 가기
          </button>
        </a>
      </div>

        </div>
      </div>

    </div>
  </div>
</div>
</body>
</html>
