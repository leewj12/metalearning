<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>메타러닝 강사 마이페이지</title>
    <link rel="stylesheet" href="/static/css/admindashboard.css">
    <link rel="stylesheet" href="/static/css/header/instrsidebar.css">
    <link rel="stylesheet" href="/static/css/header/instrheader.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        /* 카드 헤더 스타일 */
        .card-header {
            padding: 1.5rem;
            border-radius: 0.5rem !important;
        }

        .card-header .d-flex {
            font-size: 1.5rem;
        }

        .card-header .bi {
            font-size: 2rem;
        }

        /* 프로필 이미지 텍스트 스타일 */
        .profile-image-text {
            position: absolute;
            top: -40px; /* 텍스트가 사진 위로 오도록 위치 설정 */
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            font-weight: bold;
            color: #000;
            z-index: 1; /* 사진보다 위에 위치하도록 설정 */
        }

        /* 프로필 사진 스타일 */
        .img-thumbnail {
            width: 160px;
            height: 200px;
            border-radius: 0.5rem;
        }

        /* 버튼 스타일 */
        .btn-secondary.btn-sm {
            margin-top: 1rem;
        }

        .btn-secondary.btn-sm a {
            color: white;
            text-decoration: none;
        }

        /* 카드 스타일 */
        .card {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        /* Input, Select 스타일 */
        .form-label {
            font-weight: bold;
        }

        .form-select,
        .form-control {
            margin-bottom: 1rem;
        }

        .btn a {
            color: white;
            text-decoration: none;
        }

        .btn a:hover {
            color: white;
            text-decoration: none;
        }
    </style>

</head>
<body>

<!-- Header -->
<div th:replace="~{fragments/instrheader :: instrheader}"></div>
<div class="content-container">
    <!-- Sidebar -->
    <div th:replace="~{fragments/instrsidebar :: instrsidebar}"></div>
    <!-- Main Content -->
    <div class="main-content">
        <div class="container">

            <!-- 카드 헤더 -->
            <div class="card-header bg-success text-white rounded shadow mb-4">
                <div class="d-flex align-items-center">
                    <i class="bi bi-person-circle me-3"></i>
                    <span><strong th:text="${#authentication.principal.name}"></strong>님 환영합니다</span>
                </div>
            </div>

            <!-- 사진 및 상단 정보 -->
            <div class="card shadow p-4 mb-4">
                <div class="row g-3 align-items-center">
                    <div class="col-md-3 text-center position-relative">
                        <!-- "프로필 이미지"라는 텍스트만 표시 -->
                        <div class="profile-image-text">프로필 이미지</div>
                        <!-- 실제 프로필 사진 -->
                        <img th:src="${userInstr.userThumbnail != null && userInstr.userThumbnail != '' ? '/KDT/profileimages/Instr/' + userInstr.userThumbnail : '/static/images/profile.png'}"
                             alt="프로필 사진" class="img-thumbnail">
                        <br>
                    </div>
                    <div class="col-md-9">
                        <div class="mb-3">
                            <label for="userName" class="form-label"><strong>이름</strong></label>
                            <input type="text" id="userName" name="userName" class="form-control"
                                   th:value="${userInstr.name}" readonly>
                        </div>
                        <div class="mb-3">
                            <label for="userRole" class="form-label"><strong>등급</strong></label>
                            <input type="text" id="userRole" name="userRole" class="form-control"
                                   th:value="${userInstr.userRole == 'ADMIN' ? '관리자' :
                                             (userInstr.userRole == 'INSTRUCTOR' ? '강사' :
                                             (userInstr.userRole == 'STUDENT' ? '학생' :
                                             (userInstr.userRole == 'MANAGER' ? '매니저' : '기타')))}" readonly>
                        </div>
                        <div class="mb-3">
                            <label for="userGender" class="form-label"><strong>성별</strong></label>
                            <input type="text" id="userGender" name="userGender" class="form-control"
                                   th:value="${userInstr.userGender == 'M' ? '남자' :
                                             (userInstr.userGender == 'F' ? '여자' : '알 수 없음')}" readonly>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 주요 정보 및 날짜 정보 -->
            <div class="card shadow p-4 mb-4">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="userEmail" class="form-label"><strong>이메일</strong></label>
                        <input type="email" id="userEmail" name="userEmail" class="form-control"
                               th:value="${userInstr.userEmail}" readonly>
                    </div>
                    <div class="col-md-6">
                        <label for="userPhone" class="form-label"><strong>전화번호</strong></label>
                        <input type="text" id="userPhone" name="userPhone" class="form-control"
                               th:value="${userInstr.userPhone}" readonly>
                    </div>
                    <div class="col-md-6">
                        <label for="userPostcode" class="form-label"><strong>우편번호</strong></label>
                        <input type="text" id="userPostcode" name="userPostcode" class="form-control"
                               th:value="${userInstr.userPostcode}" readonly>
                    </div>
                    <div class="col-md-6">
                        <label for="userAddress" class="form-label"><strong>주소</strong></label>
                        <input type="text" id="userAddress" name="userAddress" class="form-control"
                               th:value="${userInstr.userAddress}" readonly>
                    </div>
                    <div class="col-md-12">
                        <label for="userAddressDetail" class="form-label"><strong>상세 주소</strong></label>
                        <input type="text" id="userAddressDetail" name="userAddressDetail" class="form-control"
                               th:value="${userInstr.userAddressDetail}" readonly>
                    </div>
                    <div class="col-md-6">
                        <label for="userCreatedAt" class="form-label"><strong>가입일</strong></label>
                        <input type="text" id="userCreatedAt" name="userCreatedAt" class="form-control" readonly
                               th:value="${userInstr.formatUserCreatedAt()}">
                    </div>

                    <div class="col-md-6">
                        <label for="userLastLogin" class="form-label"><strong>최근 로그인</strong></label>
                        <input type="text" id="userLastLogin" name="userLastLogin" class="form-control" readonly
                               th:value="${userInstr.formatUserLastLogin()}">
                    </div>

                    <div class="col-md-6">
                        <label for="userUpdatedAt" class="form-label"><strong>수정일</strong></label>
                        <input type="text" id="userUpdatedAt" name="userUpdatedAt" class="form-control" readonly
                               th:value="${userInstr.formatUserUpdatedAt()}">
                    </div>

                </div>
            </div>

            <!-- 수정/삭제 버튼 -->
            <div class="action-buttons text-center mt-4">
                <button class="btn btn-primary me-2">
                    <a href="/instr/mypage/update"><i class="bi bi-pencil-square"></i> 강사 정보 수정</a>
                </button>
                <button class="btn btn-warning">
                    <a href="/instr/pw/change"><i class="bi bi-key"></i> 비밀번호 변경</a>
                </button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
