<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>메타러닝 결제 페이지</title>
</head>
<body>
<h2>결제 페이지</h2>

<!-- 사용자 정보 -->
<h4>사용자 정보</h4>
<p><strong>사용자 ID:</strong> <span th:text="${userId}">[사용자 ID]</span></p>

<!-- 강의 정보 -->
<h4>강의 정보</h4>
<p><strong>강의 IDs:</strong> <span th:text="${courseIds}">[강의 IDs]</span></p>
<p><strong>강의 제목들:</strong> <span th:text="${courseTitles}">[강의 제목들]</span></p>

<!-- 결제하기 버튼 -->
<button onclick="requestPay()">결제하기</button>

<script>
  function requestPay() {
    const userId = document.querySelector("[th:text='${userId}']").innerText;
    const courseIds = document.querySelector("[th:text='${courseIds}']").innerText;
    const courseTitles = document.querySelector("[th:text='${courseTitles}']").innerText;

    console.log("결제 요청 데이터:", { userId, courseIds, courseTitles });

    // 포트원 결제창 호출 (예제)
    IMP.init("imp12345678"); // 포트원 가맹점 식별코드
    IMP.request_pay({
        pg: "kakaopay",
        pay_method: "card",
        merchant_uid: `order_${Date.now()}`, // 주문번호
        name: "강의 결제",
        amount: 1004,
        buyer_email: "buyer@example.com",
        buyer_name: "구매자 이름",
        buyer_tel: "010-1234-5678",
    }, function (rsp) {
        if (rsp.success) {
            alert("결제가 완료되었습니다.");
        } else {
            alert("결제가 실패하였습니다. 다시 시도해주세요.");
        }
    });
}

</script>
</body>
</html>
