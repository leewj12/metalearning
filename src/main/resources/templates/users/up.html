<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메타러닝 강사 신청</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <!-- 스타일 및 부트스트랩 -->
  <link rel="stylesheet" href="/static/css/header/header.css">
  <link rel="stylesheet" href="/static/css/footer/footer.css">
  <script src="/static/js/header/header.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<!-- 헤더 -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- 메인 콘텐츠 -->
<main class="container mt-5 mb-4">
  <h1 class="text-center mb-4"><i class="bi bi-person-vcard"></i> 강사 신청하기</h1>
  <div class="card mx-auto" style="max-width: 800px;">
    <div class="card-body">
      <form th:action="@{/student/up}" th:object="${instrUpRequest}" method="post">
        <div class="mb-3">
          <label for="teacherName" class="form-label"><i class="bi bi-person-circle"></i> 강사 이름</label>
          <input type="text" id="teacherName" class="form-control" th:value="${name}" readonly>
        </div>
        <div class="mb-3">
          <label for="instrDescript" class="form-label"><i class="bi bi-pencil-square"></i> 강사 소개</label>
          <textarea id="instrDescript" class="form-control" th:field="*{instrDescript}" rows="4" placeholder="강사 소개를 입력하세요."></textarea>
          <div th:if="${#fields.hasErrors('instrDescript')}" class="text-danger" th:errors="*{instrDescript}"></div>
        </div>
        <div class="mb-3">
          <label for="instrCompany" class="form-label"><i class="bi bi-building"></i> 강사 소속</label>
          <input type="text" id="instrCompany" class="form-control" th:field="*{instrCompany}" placeholder="소속을 입력하세요.">
          <div th:if="${#fields.hasErrors('instrCompany')}" class="text-danger" th:errors="*{instrCompany}"></div>
        </div>
        <div class="text-center">
          <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i> 신청하기</button>
          <!-- 홈으로 가는 버튼 -->
          <a href="/" class="btn btn-info">
            <i class="bi bi-house-door"></i> 홈으로
          </a>
        </div>
      </form>
    </div>
  </div>
</main>

<!-- 푸터 -->
<div th:replace="~{fragments/footer :: footer}"></div>
<script th:inline="javascript">
  document.addEventListener("DOMContentLoaded", function () {
      /*<![CDATA[*/
      var message = /*[[${message}]]*/ '';
      if (message) {
          alert(message);
      }
      /*]]>*/
  });
</script>

</body>
</html>
