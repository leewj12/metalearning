<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>메타러닝 로그인</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/users/login.css">
  <style>
    /* 기본 모달 스타일 */
    .modal {
      display: none; /* 기본적으로 숨김 */
      position: fixed; /* 화면 고정 */
      z-index: 1; /* 다른 요소들보다 위에 */
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5); /* 반투명 배경 */
    }

    /* ID 찾기 모달 스타일 */
    .find-id-modal .modal-content,
    .find-pw-modal .modal-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #fff;
      padding: 40px;
      border-radius: 10px;
      width: 75%;
      max-width: 700px;
      min-height: 450px;
    }

    .find-id-modal .modal-header,
    .find-pw-modal .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .result-modal .modal-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #fff;
      padding: 40px;
      border-radius: 10px;
      width: 70%;
      max-width: 600px;
      min-height: 300px;
      text-align: center;
    }

    .result-modal .modal-body {
      font-size: 20px;
      font-weight: bold;
      display: flex;
      justify-content: center;
      align-items: center;
      color: inherit;
    }

    .result-modal .success-message {
      color: green;
    }

    .result-modal .error-message {
      color: red;
    }

    .close {
      font-size: 24px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="card">
  <h2 class="text-center mb-4">메타러닝 로그인</h2>
  <form action="/login" method="POST">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

    <div class="mb-4">
      <label for="email" class="form-label">이메일</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-envelope text-primary"></i></span>
        <input type="email" id="email" name="username" class="form-control form-control-lg" required placeholder="이메일을 입력하세요" autocomplete="email">
      </div>
    </div>

    <div class="mb-4">
      <label for="password" class="form-label">비밀번호</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock text-danger"></i></span>
        <input type="password" id="password" name="password" class="form-control form-control-lg" required placeholder="비밀번호를 입력하세요" autocomplete="current-password">
      </div>
    </div>

    <button type="submit" class="btn btn-primary btn-lg w-100 mb-4">로그인</button>
  </form>

  <!-- 로그인 실패 메시지 -->
  <div th:if="${param.error}" class="d-flex justify-content-center">
    <p class="text-danger">아이디 또는 비밀번호가 잘못되었습니다.</p>
  </div>


  <div class="text-center mb-4">간편 로그인</div>
  <div class="d-flex justify-content-center social-btns mb-4">
    <a href="#" class="btn btn-outline-danger btn-lg"><i class="bi bi-google"></i> 구글</a>
    <a href="#" class="btn btn-outline-warning btn-lg"><i class="bi bi-chat-dots"></i> 카카오</a>
    <a href="#" class="btn btn-outline-success btn-lg"><i class="bi bi-line"></i> 네이버</a>
  </div>
  <div class="action-links">
    <a href="/" class="home-link"><i class="bi bi-house-door"></i> 홈</a>
    <a href="/signup" class="signup-link"><i class="bi bi-person-plus"></i> 회원가입</a>
    <a href="#" id="openFindIdModal"><i class="bi bi-search"></i> ID 찾기</a>
    <a href="#" id="openFindPwModal"><i class="bi bi-key"></i> PW 찾기</a>
  </div>
</div>


<!-- ID 찾기 모달 -->
<div id="findIdModal" class="modal find-id-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h5 class="modal-title">ID 찾기</h5>
      <span class="close" id="closeFindIdModal">&times;</span>
    </div>
    <div class="modal-body">
      <form id="findIdForm">
        <div class="mb-3">
          <label for="findIdName" class="form-label">이름</label>
          <input type="text" class="form-control" id="findIdName" name="name" placeholder="이름을 입력하세요" required>
        </div>
        <div class="mb-3">
          <label for="findIdBirth" class="form-label">생년월일</label>
          <input type="date" class="form-control" id="findIdBirth" name="birth" required>
        </div>
        <div class="mb-3">
          <label for="findIdPhone" class="form-label">연락처</label>
          <input type="text" class="form-control" id="findIdPhone" name="phone" placeholder="연락처를 입력하세요" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">ID 찾기</button>
      </form>
    </div>
  </div>
</div>



<!-- 결과 메시지 모달 -->
<div id="resultModal" class="modal result-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h5 class="modal-title">아이디 찾기 결과</h5>
      <span class="close" id="closeResultModal">&times;</span>
    </div>
    <div class="modal-body" id="resultMessage">
      <!-- ID 찾기 결과 메시지가 이곳에 동적으로 삽입됩니다. -->
    </div>
  </div>
</div>




<!-- 비밀번호 찾기 모달 -->
<div id="findPwModal" class="modal find-pw-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h5 class="modal-title">비밀번호 찾기</h5>
      <span class="close" onclick="closeModal('findPwModal')">&times;</span>
    </div>
    <div class="modal-body">
      <form id="password-reset-form">
        <div class="mb-4">
          <label for="resetName" class="form-label">이름</label>
          <input type="text" id="resetName" name="name" class="form-control" required placeholder="이름을 입력하세요" autocomplete="name">
        </div>
        <div class="mb-4">
          <label for="resetBirth" class="form-label">생년월일</label>
          <input type="date" id="resetBirth" name="birth" class="form-control" required placeholder="생년월일을 입력하세요">
        </div>
        <div class="mb-4">
          <label for="resetEmail" class="form-label">이메일</label>
          <input type="email" id="resetEmail" name="email" class="form-control" required placeholder="이메일을 입력하세요" autocomplete="email">
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100">비밀번호 찾기</button>
      </form>

      <!-- 결과 메시지 -->
      <div id="resetResultMessage" class="mt-3" style="display: none;">
        <div id="resetMessage" class="alert"></div>
      </div>
    </div>
  </div>
</div>

<script>
  // 비밀번호 찾기 모달 열기
  document.getElementById('openFindPwModal').addEventListener('click', function() {
    document.getElementById('findPwModal').style.display = 'block';
  });

  // 모달 닫기
  function closeModal(modalId) {
    document.getElementById(modalId).style.display = 'none';
  }

  // 이메일 입력 폼 제출 시 비동기 요청 처리
 // 이메일 입력 폼 제출 시 비동기 요청 처리
document.getElementById('password-reset-form').addEventListener('submit', async function(event) {
  event.preventDefault(); // 폼 기본 제출 동작 방지

  const name = document.getElementById('resetName').value;
  const birth = document.getElementById('resetBirth').value;
  const email = document.getElementById('resetEmail').value;
  const resultMessageDiv = document.getElementById('resetResultMessage');
  const messageDiv = document.getElementById('resetMessage');
  resultMessageDiv.style.display = 'none'; // 결과 메시지 숨기기

  // CSRF 토큰과 헤더 값 가져오기
  const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
  const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

  // 날짜 형식을 "yyyy-MM-dd"로 보장
  const formattedBirth = new Date(birth).toISOString().split('T')[0];

  try {
    // fetch를 사용하여 요청 보내기
    const response = await fetch('/main/check-pw', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        [csrfHeader]: csrfToken, // CSRF 토큰을 헤더에 추가
      },
      body: JSON.stringify({
        name: name,
        birth: formattedBirth,
        email: email
      })
    });

    // 서버 응답 확인
    if (response.ok) {
      const result = await response.text();
      if (result === '새 비밀번호가 이메일로 전송되었습니다.') {
        showResultMessage('비밀번호 재설정 이메일을 성공적으로 보냈습니다.', 'success');
        setTimeout(() => closeModal('findPwModal'), 2000); // 모달 자동 닫기
      } else {
        showResultMessage('입력한 정보가 일치하지 않습니다. 다시 시도해주세요.', 'danger');
      }
    } else {
      showResultMessage('서버 오류가 발생했습니다. 다시 시도해주세요.', 'danger');
    }
  } catch (error) {
    console.error('비밀번호 찾기 요청 오류:', error);
    showResultMessage('네트워크 오류가 발생했습니다. 다시 시도해주세요.', 'danger');
  }
});


  // 결과 메시지 표시 함수
  function showResultMessage(message, type) {
    const resultMessageDiv = document.getElementById('resetResultMessage');
    const messageDiv = document.getElementById('resetMessage');
    messageDiv.classList.remove('alert-success', 'alert-danger');  // 기존 클래스 제거
    messageDiv.classList.add('alert', 'alert-' + type);  // 새로운 메시지 타입 추가
    messageDiv.textContent = message;
    resultMessageDiv.style.display = 'block';  // 결과 메시지 표시
  }

  // 배경 클릭 시 모달 닫기
  window.onclick = function(event) {
    if (event.target.classList.contains('modal')) {
      event.target.style.display = 'none';
    }
  };

    // 모달 열기
  document.getElementById("openFindIdModal").addEventListener("click", function() {
    document.getElementById("findIdModal").style.display = "block";
  });

  // 모달 닫기
  document.getElementById("closeFindIdModal").addEventListener("click", function() {
    document.getElementById("findIdModal").style.display = "none";
  });

  // 외부 클릭 시 모달 닫기
  window.onclick = function(event) {
    if (event.target == document.getElementById("findIdModal")) {
      document.getElementById("findIdModal").style.display = "none";
    }
    if (event.target == document.getElementById("resultModal")) {
      document.getElementById("resultModal").style.display = "none";
    }
  };

  // 폼 제출 처리
  document.getElementById("findIdForm").addEventListener("submit", async function(event) {
    event.preventDefault(); // 폼이 제출되지 않도록 방지

    // 입력된 값 가져오기
    const name = document.getElementById("findIdName").value;
    const birth = document.getElementById("findIdBirth").value;
    const phone = document.getElementById("findIdPhone").value;

    // 날짜 형식을 "yyyy-MM-dd"로 보장
    const formattedBirth = new Date(birth).toISOString().split('T')[0];

    // CSRF 토큰과 헤더 이름 가져오기
    const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
    const csrfHeaderName = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

    // 요청 데이터 생성
    const requestData = {
      name: name,
      userBirth: formattedBirth, // "yyyy-MM-dd" 형식으로 변경된 birth
      userPhone: phone
    };

    try {
      // ID 찾기 모달을 먼저 닫기
      document.getElementById("findIdModal").style.display = "none";

      // fetch 요청 보내기
      const response = await fetch("/find/userid", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          [csrfHeaderName]: csrfToken,  // CSRF 토큰을 헤더에 추가
        },
        body: JSON.stringify(requestData)
      });

      // 응답 결과를 JSON으로 변환
      const result = await response.json();

      // 결과 메시지 모달 열기
      const resultModal = document.getElementById("resultModal");
      const resultMessage = document.getElementById("resultMessage");

     if (result.status === "success") {
  resultMessage.textContent = "아이디: " + result.message;  // 성공 시 메시지
  resultMessage.classList.add("success-message"); // 성공 메시지 클래스 추가
  resultMessage.classList.remove("error-message"); // 오류 메시지 클래스 제거
} else {
  resultMessage.textContent = "입력 하신 정보가 틀립니다.";  // 오류 시 메시지
  resultMessage.classList.add("error-message"); // 오류 메시지 클래스 추가
  resultMessage.classList.remove("success-message"); // 성공 메시지 클래스 제거
}

      resultModal.style.display = "block";  // 결과 모달 열기

    } catch (error) {
      console.error("에러가 발생했습니다.", error);
      alert("서버와 연결할 수 없습니다. 다시 시도해주세요.");
    }
  });

  // 결과 모달 닫기
  document.getElementById("closeResultModal").addEventListener("click", function() {
    document.getElementById("resultModal").style.display = "none";
  });




</script>

</body>
</html>
