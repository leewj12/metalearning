
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메타러닝 국비지원 교육과정</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/header/header.css">
  <link rel="stylesheet" href="/static/css/footer/footer.css">
  <link rel="stylesheet" href="/static/css/main/KDT-curriculum.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/header/header.js"></script>

</head>
<body>
<!-- 헤더 -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- Main Content -->
<div class="main-content container">
  <div class="card shadow-sm">
    <div class="card-body">
      <h1 class="card-title">
        <i class="bi bi-file-text"></i> 홍보 게시글 상세
      </h1>

      <div th:if="${kdtSession != null}">

        <div class="card mb-4 shadow-sm custom-card">
          <div class="d-flex">
            <!-- 텍스트 콘텐츠 -->
            <div class="card-body text-content">
              <h5 class="card-title" th:text="${kdtSession.kdtSessionTitle}">
                <i class="bi bi-journal-bookmark icon"></i> 과정 제목
              </h5>
              <p>
                <strong><i class="bi bi-tags icon"></i> 카테고리:</strong>
                <span th:text="${kdtSession.kdtSessionCategory}">카테고리</span>
              </p>
              <p>
                <strong><i class="bi bi-calendar-event icon"></i> 시작일:</strong>
                <span th:text="${kdtSession.kdtSessionStartDate}">Start Date</span>
              </p>
              <p>
                <strong><i class="bi bi-calendar-event icon"></i> 종료일:</strong>
                <span th:text="${kdtSession.kdtSessionEndDate}">End Date</span>
              </p>
              <p>
                <strong><i class="bi bi-info-circle icon"></i> 상태:</strong>
                <span th:text="${kdtSession.kdtSessionStatus}">Status</span>
              </p>
              <p>
                <i class="bi bi-cash-stack icon"></i> <strong>교육비용:</strong> 100% 전액 무료
              </p>
              <p th:if="${detail != null}">
                <i class="bi bi-person detail-icon"></i>
                <strong>작성자:</strong> <span th:text="${detail.userEntity.username}">작성자명</span>
              </p>
              <p th:if="${detail != null}">
                <i class="bi bi-calendar detail-icon"></i>
                <strong>작성일:</strong> <span th:text="${#temporals.format(detail.kdtDetailCreatedAt, 'yyyy-MM-dd HH:mm')}">작성일</span>
              </p>
              <p th:if="${detail != null}">
                <i class="bi bi-clock detail-icon"></i>
                <strong>수정일:</strong> <span th:text="${#temporals.format(detail.kdtDetailUpdatedAt, 'yyyy-MM-dd HH:mm')}">수정일</span>
              </p>
              <p th:if="${detail != null}">
                <i class="bi bi-text-paragraph detail-icon"></i>
                <strong>내용:</strong>
              </p>
              <div th:if="${detail != null}" class="card-text" th:utext="${detail.kdtDetailContent}">상세 내용</div>
            </div>
          </div>
        </div>

        <!-- 첨부 파일 -->
        <div th:if="${detail != null}">
          <style>
            .file-list {
              list-style: none;
              padding: 0;
              margin: 0;
            }
            .file-list .list-group-item {
              display: flex;
              align-items: center; /* 세로 중앙 정렬 */
              justify-content: space-between;
              padding: 10px;
              border: 1px solid #ddd;
              border-radius: 5px;
              margin-bottom: 10px;
              background-color: #f9f9f9;
            }
            .file-image {
              max-width: 100%; /* 이미지 최대 너비 */
              object-fit: contain; /* 이미지 비율 유지하면서 맞추기 */
              border-radius: 5px;
            }
            .file-info {
              flex-grow: 1;
              padding-left: 15px;
              font-size: 14px;
            }
            .file-info a {
              font-weight: bold;
              color: #007bff;
              text-decoration: none;
            }
            .file-info span {
              color: #666;
              font-size: 12px;
            }
          </style>

          <ul class="list-group file-list">
            <li class="list-group-item" th:each="file : ${detail.files}">
              <div th:if="${#strings.endsWith(file.kdtDetailFileName.toLowerCase(), '.png') ||
                   #strings.endsWith(file.kdtDetailFileName.toLowerCase(), '.jpg') ||
                   #strings.endsWith(file.kdtDetailFileName.toLowerCase(), '.jpeg') ||
                   #strings.endsWith(file.kdtDetailFileName.toLowerCase(), '.gif')}">
                <img th:src="@{/static/images/uploads/{uuid}(uuid=${file.kdtDetailFileUUID})}"
                     th:alt="${file.kdtDetailFileName}" class="file-image" />
              </div>
            </li>
          </ul>
        </div>

        <div th:if="${detail != null}" class="back-button" style="margin-top: 20px;">
          <button class="btn btn-secondary" onclick="history.back();">
            <i class="bi bi-arrow-left"></i> 뒤로 가기
          </button>
        </div>

      </div>

      <div th:if="${detail == null}" style="
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 50vh;
    text-align: center;">

        <h1 style="color: red; font-size: 24px; font-weight: bold;">
          홍보 게시글이 아직 준비되지 않았습니다.
        </h1>

        <div class="back-button" style="margin-top: 20px;">
          <button class="btn btn-secondary" onclick="history.back();">
            <i class="bi bi-arrow-left"></i> 뒤로 가기
          </button>
        </div>
      </div>

    </div>
  </div>

</div>

<!-- 푸터 삽입 -->
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
