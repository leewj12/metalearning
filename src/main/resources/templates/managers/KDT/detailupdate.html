<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>메타러닝 상세 수정</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/admindashboard.css">
  <link rel="stylesheet" href="/static/css/header/managersidebar.css">
  <link rel="stylesheet" href="/static/css/header/managerheader.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
  <style>
    .main-content {
      padding: 20px;
    }
    .detail-content {
      width: 100%;
      height: 200px;
      resize: vertical;
    }
    .image-preview {
      max-width: 150px;
      margin: 5px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
    .sortable-list {
      list-style: none;
      padding: 0;
    }
    .sortable-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .sortable-list li img {
      max-width: 100px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
    .button-row {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- Header -->
  <div th:replace="~{fragments/managerheader :: managerheader}"></div>
  <div class="content-container">
    <!-- Sidebar -->
    <div th:replace="~{fragments/managersidebar :: managersidebar}"></div>
    <!-- Main Content -->
    <div class="main-content container">
      <h1 class="mb-4">
        <i class="bi bi-pencil-square"></i> 국비 상세 수정
      </h1>
      <form th:action="@{/managers/KDT/{kdtSessionId}/detail/update(kdtSessionId=${kdtSessionId})}"
            method="post" enctype="multipart/form-data">
        <!-- CSRF 토큰 -->
        <input type="hidden" name="_csrf" th:value="${_csrf.token}" />

        <!-- 로그인 사용자 ID -->
        <input type="hidden" id="user-id" name="userId" th:value="${#authentication.principal.userId}" />

        <!-- 국비 회차 ID -->
        <input type="hidden" th:value="${kdtSessionId}" name="kdtSessionId" />

        <!-- 상세 ID -->
        <input type="hidden" th:value="${kdtDetail?.kdtDetailId}" name="kdtDetailId" />

        <!-- 상세 내용 -->
        <div class="mb-4">
          <label for="kdtDetailContent" class="form-label">
            <i class="bi bi-textarea-resize"></i> 상세 내용:
          </label>
          <textarea id="kdtDetailContent" name="kdtDetailContent" class="form-control detail-content"
                    th:text="${kdtDetail?.kdtDetailContent}"></textarea>
        </div>

        <!-- 기존 이미지 목록 -->
        <h3><i class="bi bi-images"></i> 기존 이미지</h3>
        <ul class="sortable-list" id="image-list">
          <li th:each="file : ${kdtDetail?.files}" th:data-id="${file.kdtDetailFileId}">
            <img th:src="@{/static/images/uploads/{uuid}(uuid=${file.kdtDetailFileUUID})}" alt="이미지" class="image-preview" />
            <input type="checkbox" th:name="deleteFiles" th:value="${file.kdtDetailFileId}" /> 삭제
          </li>
        </ul>
        <input type="hidden" id="image-order" name="imageOrder" value="" />

        <!-- 새로운 이미지 업로드 -->
        <div class="mb-4">
          <label for="files" class="form-label">
            <i class="bi bi-upload"></i> 새로운 이미지 추가:
          </label>
          <input type="file" id="files" name="files" class="form-control" multiple accept="image/*">
        </div>

        <!-- 에러 메시지 표시 -->
        <div th:if="${errors}" class="alert alert-danger">
          <ul>
            <li th:each="error : ${errors}" th:text="${error.defaultMessage}"></li>
          </ul>
        </div>

        <!-- 수정하기 및 뒤로가기 버튼 -->
        <div class="button-row">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-save"></i> 수정하기
          </button>
          <a th:href="@{/managers/KDT/{kdtSessionId}/detail/detail(kdtSessionId=${kdtSessionId})}">
            <button type="button" class="btn btn-secondary">
              <i class="bi bi-arrow-left"></i> 뒤로가기
            </button>
          </a>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  // 이미지 순서 변경 기능
  document.addEventListener("DOMContentLoaded", function () {
    const sortable = new Sortable(document.getElementById("image-list"), {
      animation: 150,
      onEnd: function () {
        const order = [];
        document.querySelectorAll("#image-list li").forEach(item => {
          order.push(item.getAttribute("data-id"));
        });
        document.getElementById("image-order").value = order.join(",");
      }
    });
  });
</script>
</body>
</html>
