<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>메타러닝 상담 목록</title>
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <link rel="stylesheet" href="/static/css/admindashboard.css">
    <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
    <link rel="stylesheet" href="/static/css/header/adminheader.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        /* 검색 필터 스타일 */
        .search-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            max-width:900px;
        }

        .search-bar .form-control-search {
            flex: 3;
        }

        .search-bar .form-control-filter {
            flex: 1;
        }

        .search-bar .btn-search {
            flex: 1;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 상담 상태별 색상 */
        .status-completed {
            color: blue;
            font-weight: bold;
        }

        .status-pending {
            color: green;
            font-weight: bold;
        }

        .status-cancelled {
            color: red;
            font-weight: bold;
        }

        /* 검색 결과 없음 메시지 스타일 */
        .no-results {
            color: red;
            font-weight: bold;
            background-color: #fdecea;
            padding: 10px;
            border: 1px solid #f5c2c7;
            border-radius: 5px;
        }

        /* 전체 항목 수 스타일 */
        .total-count {
            font-size: 1rem;
            font-weight: bold;
        }
    </style>

</head>
<body>
<div class="app-container">
    <!-- Header -->
    <div th:replace="~{fragments/adminheader :: adminheader}"></div>
    <div class="content-container">
        <!-- Sidebar -->
        <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>
        <!-- Main Content -->
        <div class="main-content">
            <div class="card mt-3">
                <div class="card-header bg-primary text-white d-flex align-items-center">
                    <i class="bi bi-info-circle-fill me-2"></i> <!-- 부트스트랩 아이콘 -->
                    <h4 class="mb-0">국비회차 정보</h4>
                </div>
                <div class="card-body">
                    <div class="row">
                        <!-- 첫 번째 줄 -->
                        <div class="col-md-6 mb-3">
                            <p><strong><i class="bi bi-pencil"></i> 국비 회차 제목:</strong> <span th:text="${sessionsDetail.kdtSessionTitle}"></span></p>
                        </div>
                        <div class="col-md-6 mb-3">
                            <p><strong><i class="bi bi-pencil"></i> 회차:</strong> <span th:text="${sessionsDetail.kdtSessionNum}"></span></p>
                        </div>
                    </div>
                    <div class="row">
                        <!-- 두 번째 줄 -->
                        <div class="col-md-6 mb-3">
                            <p><strong><i class="bi bi-calendar-date"></i> 시작일:</strong> <span th:text="${sessionsDetail.kdtSessionStartDate}"></span></p>
                        </div>
                        <div class="col-md-6 mb-3">
                            <p><strong><i class="bi bi-clock"></i> 시작시간:</strong> <span th:text="${sessionsDetail.kdtSessionStartTime}"></span></p>
                        </div>
                    </div>
                    <div class="row">
                        <!-- 세 번째 줄 -->
                        <div class="col-md-6 mb-3">
                            <p><strong><i class="bi bi-calendar-date"></i> 종료일:</strong> <span th:text="${sessionsDetail.kdtSessionEndDate}"></span></p>
                        </div>
                        <div class="col-md-6 mb-3">
                            <p><strong><i class="bi bi-clock"></i> 종료시간:</strong> <span th:text="${sessionsDetail.kdtSessionEndTime}"></span></p>
                        </div>
                        <div class="col-md-6 mb-3">
                            <p><strong><i class="bi bi-person-plus"></i> 참여 가능한 인원:</strong> <span th:text="${sessionsDetail.kdtSessionMaxCapacity} + ' 명'"></span></p>
                        </div>
                        <div class="col-md-6 mb-3">
                            <p><strong><i class="bi bi-person-fill"></i> 현재 등록된 인원 수:</strong> <span th:text="${studentCount.studentCount} + ' 명'"></span></p>
                        </div>
                    </div>
                </div>
            </div>


            <div class="container mt-5">
                <div class="d-flex justify-content-between align-items-center mt-5">
                    <!-- 제목 -->
                    <h2><i class="bi bi-list-ul"></i> 상담 목록</h2>

                    <!-- 전체 항목 수 -->
                    <div>
                        <p class="total-count mb-0">전체 검색 인원: <span th:text="${totalElements}"></span> 건</p>
                    </div>
                </div>

                <!-- 필터링 폼 -->
                <form th:action="@{/admin/KDT/{sessionId}/appconsult/list(sessionId=${sessionId})}" method="get" class="search-bar">
                    <select name="status" class="form-select form-control-filter">
                        <option value="" th:selected="${status == null}">전체</option>
                        <option value="PENDING" th:selected="${status == 'PENDING'}">상담 대기중</option>
                        <option value="COMPLETED" th:selected="${status == 'COMPLETED'}">상담 완료</option>
                        <option value="CANCELLED" th:selected="${status == 'CANCELLED'}">상담 취소</option>
                    </select>
                    <input type="text" name="searchName" class="form-control form-control-search" placeholder="이름 검색" th:value="${searchName}">
                    <button type="submit" class="btn btn-primary btn-search">
                        <i class="bi bi-search"></i>
                    </button>
                </form>

                <!-- 상담 리스트 테이블 -->
                <table class="table table-bordered mt-4">
                    <thead>
                    <tr>
                        <th>번호</th>
                        <th>신청자 이름</th>
                        <th>성별</th>
                        <th>전화번호</th>
                        <th>최종학력</th>
                        <th>내일배움카드 발급현황</th>
                        <th>상담 상태</th>
                        <th>상세 보기</th>
                        <th>수정 하기</th>
                        <th>삭제하기</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="consult : ${appConsultPage}">
                        <td th:text="${consult.kdtAppConsultId}"></td>
                        <td th:text="${consult.kdtAppConsultName}"></td>
                        <!--                        <td th:text="${consult.kdtAppConsultGender}"></td>-->
                        <td th:text="${consult.kdtAppConsultGender == 'F' ? '여자' : (consult.kdtAppConsultGender == 'M' ? '남자' : '정보 없음')}"></td>
                        <td th:text="${consult.kdtAppConsultPhone}"></td>
                        <td th:text="${consult.kdtAppConsultEduLevel}"></td>
                        <td th:text="${consult.kdtAppConsultCard}"></td>
                        <td>
                            <span th:classappend="${consult.kdtAppConsultStatus == 'COMPLETED' ? 'status-completed' :
                                                   consult.kdtAppConsultStatus == 'PENDING' ? 'status-pending' :
                                                   'status-cancelled'}"
                                  th:text="${consult.kdtAppConsultStatus == 'PENDING' ? '상담 대기중' :
                                            consult.kdtAppConsultStatus == 'COMPLETED' ? '상담 완료' : '상담 취소'}">
                            </span>
                        </td>
                        <td>
                            <div class="btn btn-info">
                                <a th:href="@{/admin/KDT/{sessionId}/appconsult/{consult.kdtAppConsultId}(sessionId=${sessionId}, consult.kdtAppConsultId=${consult.kdtAppConsultId})}"
                                   style="text-decoration: none; color: white;">
                                    상세보기
                                </a>
                            </div>
                        </td>
                        <td>
                            <button class="btn btn-warning btn-edit-status"
                                    th:data-consultId="${consult.kdtAppConsultId}"
                                    th:data-sessionId="${consult.kdtSessionId}"
                                    th:data-currentStatus="${consult.kdtAppConsultStatus}">
                                수정하기
                            </button>
                        </td>
                        <td>
                            <button class="btn btn-danger btn-delete"
                                    th:data-consultId="${consult.kdtAppConsultId}"
                                    th:data-sessionId="${consult.kdtSessionId}">
                                삭제
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>

                <!-- 상태 수정 모달 -->
                <div class="modal fade" id="statusModal" tabindex="-1" aria-labelledby="statusModalLabel" aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="statusModalLabel">상담 상태 수정</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <label for="statusSelect">상담 상태를 선택하세요:</label>
                                <select id="statusSelect" class="form-control">
                                    <option value="PENDING">상담 대기</option>
                                    <option value="COMPLETED">상담 완료</option>
                                    <option value="CANCELLED">상담 취소</option>
                                </select>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                                <button type="button" class="btn btn-primary" id="saveStatusBtn">저장</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 페이징 블록 -->
                <div th:if="${!noResults}" class="pagination-container mt-4">
                    <ul class="pagination justify-content-center">
                        <!-- 첫 페이지 -->
                        <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled' : ''">
                            <a th:href="@{|/admin/KDT/${sessionId}/appconsult/list?page=1&searchName=${searchName}&status=${status}|}" class="page-link">처음</a>
                        </li>

                        <!-- 이전 페이지 블록 -->
                        <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled' : ''">
                            <a th:href="@{|/admin/KDT/${sessionId}/appconsult/list?page=${blockStart - 1}&searchName=${searchName}&status=${status}|}" class="page-link"> << </a>
                        </li>

                        <!-- 블록 내 페이지들 -->
                        <li class="page-item" th:each="i : ${#numbers.sequence(blockStart, blockEnd)}" th:classappend="${i == currentPage} ? 'active' : ''">
                            <a th:href="@{|/admin/KDT/${sessionId}/appconsult/list?page=${i}&searchName=${searchName}&status=${status}|}" class="page-link" th:text="${i}">1</a>
                        </li>

                        <!-- 다음 페이지 블록 -->
                        <li class="page-item" th:classappend="${!hasNext} ? 'disabled' : ''">
                            <a th:href="@{|/admin/KDT/${sessionId}/appconsult/list?page=${blockEnd + 1}&searchName=${searchName}&status=${status}|}" class="page-link"> >> </a>
                        </li>

                        <!-- 마지막 페이지 -->
                        <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled' : ''">
                            <a th:href="@{|/admin/KDT/${sessionId}/appconsult/list?page=${totalPages}&searchName=${searchName}&status=${status}|}" class="page-link">끝</a>
                        </li>
                    </ul>
                </div>

                <!-- 검색 결과가 없을 경우 -->
                <div th:if="${noResults}" class="no-results mt-3">
                    검색 결과가 없습니다.
                </div>

                <div class="d-flex justify-content-center mt-4 gap-3">
                    <a th:href="@{'/view/admin/KDT/session/' + ${sessionsDetail.kdtSessionId}}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left-circle"></i> 목차
                    </a>
                </div>

            </div>
        </div>
    </div>


    <script>
        // CSRF 토큰을 가져오는 함수
        function getCsrfToken() {
            return document.querySelector('meta[name="_csrf"]').getAttribute('content');
        }

        function getCsrfHeaderName() {
            return document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
        }

        // 상담 상태 수정 버튼 클릭 이벤트
        document.querySelectorAll('.btn-edit-status').forEach(button => {
            button.addEventListener('click', function () {
                const consultId = this.getAttribute('data-consultId');
                const sessionId = this.getAttribute('data-sessionId');
                const currentStatus = this.getAttribute('data-currentStatus');
                const csrfToken = getCsrfToken();
                const csrfHeaderName = getCsrfHeaderName();

                // 모달에 현재 상태 설정
                const statusSelect = document.getElementById('statusSelect');
                statusSelect.value = currentStatus;

                // 모달 표시
                const statusModal = new bootstrap.Modal(document.getElementById('statusModal'));
                statusModal.show();

                // 저장 버튼 클릭 시
                document.getElementById('saveStatusBtn').onclick = async function () {
                    const newStatus = statusSelect.value;

                    // Ajax로 상태 변경 요청 보내기
                    try {
                        const response = await fetch(`/api/admin/KDT/${sessionId}/appconsult/${consultId}/updateStatus`, {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json',
                                [csrfHeaderName]: csrfToken
                            },
                            body: JSON.stringify({
                                consultId: consultId,
                                sessionId: sessionId,
                                newStatus: newStatus
                            })
                        });

                        const data = await response.json();
                        if (data.status === 'success') {
                            alert('상담 상태가 수정되었습니다.');
                            // 테이블에서 상태 텍스트 변경
                            const statusCell = button.closest('tr').querySelector('td:nth-child(7)');
                            statusCell.textContent = newStatus === 'PENDING' ? '상담 대기중' :
                                (newStatus === 'COMPLETED' ? '상담 완료' : '상담 취소');

                                // 상태별 색상 클래스를 동적으로 변경
                        statusCell.classList.remove('status-completed', 'status-pending', 'status-cancelled');
                        if (newStatus === 'PENDING') {
                            statusCell.classList.add('status-pending');
                        } else if (newStatus === 'COMPLETED') {
                            statusCell.classList.add('status-completed');
                        } else if (newStatus === 'CANCELLED') {
                            statusCell.classList.add('status-cancelled');
                        }

                            statusModal.hide();  // 모달 닫기
                        } else {
                            alert(data.message);
                        }
                    } catch (error) {
                        console.error(error);
                        alert('상담 상태 수정 중 오류가 발생했습니다.');
                    }
                };
            });
        });

        // 삭제 버튼 클릭 이벤트
        document.querySelectorAll('.btn-delete').forEach(button => {
            button.addEventListener('click', async function () {
                const consultId = this.getAttribute('data-consultId');
                const sessionId = this.getAttribute('data-sessionId');
                const csrfToken = getCsrfToken();
                const csrfHeaderName = getCsrfHeaderName();

                // 삭제 확인
                const confirmation = confirm('정말로 이 상담을 삭제하시겠습니까?');
                if (!confirmation) return;

                try {
                    // Ajax로 상담 삭제 요청 보내기
                    const response = await fetch(`/api/admin/KDT/${sessionId}/appconsult/${consultId}/delete`, {
                        method: 'DELETE',
                        headers: {
                            'Content-Type': 'application/json',
                            [csrfHeaderName]: csrfToken
                        }
                    });

                    const data = await response.json();
                    if (data.status === 'success') {
                        alert('상담이 삭제되었습니다.');
                        // 테이블에서 해당 상담 항목 삭제
                        this.closest('tr').remove();
                    } else {
                        alert(data.message);
                    }
                } catch (error) {
                    console.error(error);
                    alert('상담 삭제 중 오류가 발생했습니다.');
                }
            });
        });
    </script>
</body>
</html>
