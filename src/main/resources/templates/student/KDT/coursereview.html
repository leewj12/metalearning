<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메타러닝 국비 과정 만족도 설문</title>
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <!-- 헤더 CSS, JS(head에 적당히) -->
    <link rel="stylesheet" href="/static/css/admindashboard.css">
    <link rel="stylesheet" href="/static/css/header/studentsidebar.css">
    <link rel="stylesheet" href="/static/css/header/studentheader.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        .card-header {
            background-color: #007bff;
            color: white;
        }
        .question-label {
            display: flex;
            align-items: center;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        .rating-options {
            margin-bottom: 1.5rem;
        }
        .btn-submit {
            width: 100%;
            font-size: 1.1rem;
            padding: 0.75rem;
        }
        .icon-title {
            font-size: 1.5rem;
            margin-right: 0.5rem;
        }
        textarea {
            resize: none;
        }
    </style>

</head>
<body>
<div th:replace="~{fragments/studentheader :: studentheader}"></div>
<div class="content-container">
    <div th:replace="~{fragments/studentsidebar :: studentsidebar}"></div>
    <div class="main-content container mt-5" style="max-width:900px;">
        <h2 class="text-center mb-4"><i class="bi bi-clipboard2-check-fill text-primary"></i> 국비 과정 만족도 설문</h2>

        <!-- 회차 정보 -->
        <div class="card mb-4">
            <div class="card-header">
                <h5><i class="bi bi-calendar-check icon-title"></i> 회차 정보</h5>
            </div>
            <div class="card-body">
                <div th:each="s : ${sessions}">
                    <p><strong>회차 제목:</strong> <span th:text="${s.kdtSessionTitle}"></span></p>
                    <p><strong>회차 설명:</strong> <span th:text="${s.kdtSessionDescript}"></span></p>
                    <p><strong>시작일:</strong> <span th:text="${s.kdtSessionStartDate}"></span></p>
                    <p><strong>종료일:</strong> <span th:text="${s.kdtSessionEndDate}"></span></p>
                    <p><strong>총 교육 시간:</strong> <span th:text="${s.kdtSessionTotalTime}"></span> 시간</p>
                </div>
            </div>
        </div>

        <!-- 설문 폼 -->
        <div class="card mb-4">
            <div class="card-header">
                <h5><i class="bi bi-question-circle icon-title"></i> 설문 항목</h5>
            </div>
            <div class="card-body">
                <form action="/student/course/review" method="POST">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <!-- 설문 평가 ID (숨겨진 필드) -->
                <input type="hidden" name="kdtSessionEvalId" value="">

                <!-- 참가자 ID (숨겨진 필드) -->
                <input type="hidden" name="kdtPartId" value="">

                    <!-- 강사 만족도 -->
                    <div class="form-group">
                        <label class="question-label"><i class="bi bi-person-check-fill text-info"></i> 강사의 전문성과 전달력은 만족스러웠나요?</label>
                        <div class="rating-options" >
                            <input type="radio" id="rating1_5" name="kdtSessionEvalRating1" value="5" required>
                            <label for="rating1_5">매우 만족</label>
                            <input type="radio" id="rating1_4" name="kdtSessionEvalRating1" value="4">
                            <label for="rating1_4">만족</label>
                            <input type="radio" id="rating1_3" name="kdtSessionEvalRating1" value="3">
                            <label for="rating1_3">보통</label>
                            <input type="radio" id="rating1_2" name="kdtSessionEvalRating1" value="2">
                            <label for="rating1_2">불만족</label>
                            <input type="radio" id="rating1_1" name="kdtSessionEvalRating1" value="1">
                            <label for="rating1_1">매우 불만족</label>
                        </div>
                    </div>

                    <!-- 교육 콘텐츠 품질 -->
                    <div class="form-group">
                        <label class="question-label"><i class="bi bi-journal-text text-info"></i> 교육 콘텐츠의 품질은 어떠셨나요?</label>
                        <div class="rating-options">
                            <input type="radio" id="rating2_5" name="kdtSessionEvalRating2" value="5" required>
                            <label for="rating2_5">매우 만족</label>
                            <input type="radio" id="rating2_4" name="kdtSessionEvalRating2" value="4">
                            <label for="rating2_4">만족</label>
                            <input type="radio" id="rating2_3" name="kdtSessionEvalRating2" value="3">
                            <label for="rating2_3">보통</label>
                            <input type="radio" id="rating2_2" name="kdtSessionEvalRating2" value="2">
                            <label for="rating2_2">불만족</label>
                            <input type="radio" id="rating2_1" name="kdtSessionEvalRating2" value="1">
                            <label for="rating2_1">매우 불만족</label>
                        </div>
                    </div>

                    <!-- 교육 효과 -->
                    <div class="form-group">
                        <label class="question-label"><i class="bi bi-graph-up-arrow text-info"></i> 교육을 통해 목표를 달성할 수 있었나요?</label>
                        <div class="rating-options">
                            <input type="radio" id="rating3_5" name="kdtSessionEvalRating3" value="5" required>
                            <label for="rating3_5">매우 만족</label>
                            <input type="radio" id="rating3_4" name="kdtSessionEvalRating3" value="4">
                            <label for="rating3_4">만족</label>
                            <input type="radio" id="rating3_3" name="kdtSessionEvalRating3" value="3">
                            <label for="rating3_3">보통</label>
                            <input type="radio" id="rating3_2" name="kdtSessionEvalRating3" value="2">
                            <label for="rating3_2">불만족</label>
                            <input type="radio" id="rating3_1" name="kdtSessionEvalRating3" value="1">
                            <label for="rating3_1">매우 불만족</label>
                        </div>
                    </div>

                    <!-- 교육 환경 -->
                    <div class="form-group">
                        <label class="question-label"><i class="bi bi-building text-info"></i> 교육 환경은 적절했나요?</label>
                        <div class="rating-options">
                            <input type="radio" id="rating4_5" name="kdtSessionEvalRating4" value="5" required>
                            <label for="rating4_5">매우 만족</label>
                            <input type="radio" id="rating4_4" name="kdtSessionEvalRating4" value="4">
                            <label for="rating4_4">만족</label>
                            <input type="radio" id="rating4_3" name="kdtSessionEvalRating4" value="3">
                            <label for="rating4_3">보통</label>
                            <input type="radio" id="rating4_2" name="kdtSessionEvalRating4" value="2">
                            <label for="rating4_2">불만족</label>
                            <input type="radio" id="rating4_1" name="kdtSessionEvalRating4" value="1">
                            <label for="rating4_1">매우 불만족</label>
                        </div>
                    </div>

                    <!-- 학습 지원 -->
                    <div class="form-group">
                        <label class="question-label"><i class="bi bi-people text-info"></i> 학습 지원 서비스는 충분했나요?</label>
                        <div class="rating-options">
                            <input type="radio" id="rating5_5" name="kdtSessionEvalRating5" value="5" required>
                            <label for="rating5_5">매우 만족</label>
                            <input type="radio" id="rating5_4" name="kdtSessionEvalRating5" value="4">
                            <label for="rating5_4">만족</label>
                            <input type="radio" id="rating5_3" name="kdtSessionEvalRating5" value="3">
                            <label for="rating5_3">보통</label>
                            <input type="radio" id="rating5_2" name="kdtSessionEvalRating5" value="2">
                            <label for="rating5_2">불만족</label>
                            <input type="radio" id="rating5_1" name="kdtSessionEvalRating5" value="1">
                            <label for="rating5_1">매우 불만족</label>
                        </div>
                    </div>

                    <!-- 교육 참여도 -->
                    <div class="form-group">
                        <label class="question-label"><i class="bi bi-emoji-smile text-info"></i> 교육에 적극적으로 참여하셨나요?</label>
                        <div class="rating-options">
                            <input type="radio" id="rating6_5" name="kdtSessionEvalRating6" value="5" required>
                            <label for="rating6_5">매우 만족</label>
                            <input type="radio" id="rating6_4" name="kdtSessionEvalRating6" value="4">
                            <label for="rating6_4">만족</label>
                            <input type="radio" id="rating6_3" name="kdtSessionEvalRating6" value="3">
                            <label for="rating6_3">보통</label>
                            <input type="radio" id="rating6_2" name="kdtSessionEvalRating6" value="2">
                            <label for="rating6_2">불만족</label>
                            <input type="radio" id="rating6_1" name="kdtSessionEvalRating6" value="1">
                            <label for="rating6_1">매우 불만족</label>
                        </div>
                    </div>

                    <!-- 교육 후 피드백 -->
                    <div class="form-group">
                        <label class="question-label"><i class="bi bi-chat-dots text-info"></i> 교육에 대한 추가 의견</label>
                        <textarea class="form-control" id="kdtSessionEvalFeedback" name="kdtSessionEvalFeedback" rows="4" placeholder="의견을 작성해주세요."></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary btn-submit"><i class="bi bi-send-fill"></i> 설문 제출</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.1/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
