name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build WAR
        run: ./gradlew bootWar -x test --no-daemon

      - name: Deploy to EC2
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          echo "$SSH_KEY" > key.pem
          chmod 600 key.pem
          WAR=$(find build/libs -name "*.war" | head -1)
          scp -i key.pem -o StrictHostKeyChecking=no "$WAR" "$EC2_USER@$EC2_HOST:~/metalearning/app.war"
          ssh -i key.pem -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" \
            "cd ~/metalearning && docker compose up -d --build"
          rm -f key.pem
