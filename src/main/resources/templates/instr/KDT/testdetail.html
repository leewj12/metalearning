<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메타러닝 시험 정보 조회</title>
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <!-- 헤더 CSS, JS(head에 적당히) -->
    <link rel="stylesheet" href="/static/css/admindashboard.css">
    <link rel="stylesheet" href="/static/css/header/instrsidebar.css">
    <link rel="stylesheet" href="/static/css/header/instrheader.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
<div class="app-container">
    <!-- Header -->
    <div th:replace="~{fragments/instrheader :: instrheader}"></div>
    <div class="content-container">
        <!-- Sidebar -->
        <div th:replace="~{fragments/instrsidebar :: instrsidebar}"></div>
        <!-- Main Content -->
        <div class="main-content">

            <div class="d-flex flex-column justify-content-center align-items-center">

            <h1>시험 정보 조회</h1>
            <h2 th:text="${KDTSessionDTO.kdtSessionTitle}"></h2>
            <form method="POST" id="testForm">
                <!-- CSRF 토큰 추가 -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="kdtSessionId" th:value="${KDTSessionDTO.kdtSessionId}" />
                <!-- 시험 정보 등록 영역 -->
                <div>
                    <label for="kdtTestStartDate" class="form-label">
                        <i class="bi bi-calendar-event"></i> 시작 날짜/시간:
                    </label>
                    <input type="datetime-local" id="kdtTestStartDate" name="kdtTestStartDate" th:value="${KDTTestDTO.kdtTestStartDate}" readonly />
                </div>

                <div>
                    <label for="kdtTestEndDate" class="form-label">
                        <i class="bi bi-calendar-event"></i> 종료 날짜/시간:
                    </label>
                    <input type="datetime-local" id="kdtTestEndDate" name="kdtTestEndDate" th:value="${KDTTestDTO.kdtTestEndDate}" readonly />
                </div>

                <div>
                    <label for="kdtTestTitle" class="form-label">
                        <i class="bi bi-file-earmark-text"></i> 시험 제목:
                    </label>
                    <input type="text" id="kdtTestTitle" name="kdtTestTitle" th:value="${KDTTestDTO.kdtTestTitle}" readonly />
                </div>

                <br>

                <div class="text-center">
                    <a th:if="${userId == KDTTestDTO.userId}"
                       th:href="@{/instr/KDT/{sessionId}/test/update/{kdtTestId}(sessionId=${KDTSessionDTO.kdtSessionId}, kdtTestId=${KDTTestDTO.kdtTestId})}"
                       class="btn btn-primary mx-2">수정</a>

                    <button th:if="${userId == KDTTestDTO.userId}" type="button" class="btn btn-danger mx-2"
                            th:onclick="'deleteTest('+${KDTSessionDTO.kdtSessionId}+', '+${KDTTestDTO.kdtTestId}+')'">삭제</button>

                    <a th:href="@{/view/instr/KDT/{sessionId}/test/list(sessionId=${KDTSessionDTO.kdtSessionId})}"
                       class="btn btn-secondary mx-2">목차</a>
                </div>

                <table id="testItem">
                    <tr th:each="item, iterStat : ${KDTTestItemDTOs}">
                        <td>
                            <br>
                            <hr>
                            <br>
                            <span th:text="${iterStat.index + 1} + '번 문제'">1번 문제</span><br>

                            <textarea name="kdtTestItemQuest" th:text="${item.kdtTestItemQuest}" readonly></textarea><br><br>

                            <!-- 답안 -->
                            <label>정답(번호):</label>
                            <input type="number" name="kdtTestItemAnswer" th:value="${item.kdtTestItemAnswer}" readonly/><br>

                            <!-- 답안 1 -->
                            <label>답안 1:</label>
                            <input type="text" name="kdtTestItemAnsw1" th:value="${item.kdtTestItemAnsw1}" readonly/><br>

                            <!-- 답안 2 -->
                            <label>답안 2:</label>
                            <input type="text" name="kdtTestItemAnsw2" th:value="${item.kdtTestItemAnsw2}" readonly/><br>

                            <!-- 답안 3 -->
                            <label>답안 3:</label>
                            <input type="text" name="kdtTestItemAnsw3" th:value="${item.kdtTestItemAnsw3}" readonly><br>

                            <!-- 답안 4 -->
                            <label>답안 4:</label>
                            <input type="text" name="kdtTestItemAnsw4" th:value="${item.kdtTestItemAnsw4}" readonly><br><br>

                            <!-- 점수 -->
                            <label>점수:</label>
                            <input type="number" name="kdtTestItemScore" th:value="${item.kdtTestItemScore}" readonly>

                            <!-- 카테고리 -->
                            <label>카테고리:</label>
                            <input type="text" name="kdtTestItemCategory" th:value="${item.kdtTestItemCategory}" readonly><br>
                        </td>
                    </tr>
                </table>
                <br><hr><br>
            </form>
                <div class="text-center">
                    <a th:if="${userId == KDTTestDTO.userId}" th:href="@{/instr/KDT/{sessionId}/test/update/{kdtTestId}(sessionId=${KDTSessionDTO.kdtSessionId}, kdtTestId=${KDTTestDTO.kdtTestId})}"
                       class="btn btn-primary mx-2">수정</a>

                    <button type="button" th:if="${userId == KDTTestDTO.userId}" class="btn btn-danger mx-2"
                            th:onclick="'deleteTest('+${KDTSessionDTO.kdtSessionId}+', '+${KDTTestDTO.kdtTestId}+')'">삭제</button>


                    <a th:href="@{/view/instr/KDT/{sessionId}/test/list(sessionId=${KDTSessionDTO.kdtSessionId})}"
                       class="btn btn-secondary mx-2">목차</a>
                </div>
        </div>
    </div>
    </div>
</div>
<script>
    // CSRF 토큰을 헤더에 추가하기 위한 함수
    function getCsrfToken() {
        return document.querySelector('meta[name="_csrf"]').getAttribute('content');
    }

    function getCsrfHeaderName() {
        return document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
    }

    async function deleteTest(kdtSessionId, kdtTestId) {
        const url = `/api/instr/KDT/${kdtSessionId}/test/delete/${kdtTestId}`;
        console.log("Deleting outline with URL:", url); // 확인용 로그

        const csrfToken = getCsrfToken();
        const csrfHeaderName = getCsrfHeaderName();

        // 삭제 확인
        if (!confirm('정말 삭제하시겠습니까?')) {
            return;  // 사용자 취소 시 함수 종료
        }

        try {
            // fetch 요청을 보내고, 비동기적으로 기다림
            const response = await fetch(url, {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/json',
                    [csrfHeaderName]: csrfToken  // CSRF 토큰을 헤더에 포함
                }
            });

            if (response.ok) {
                alert('삭제되었습니다.');
                window.location.href = '/view/instr/KDT/' + kdtSessionId + '/test/list';
            } else if (response.status === 404) {
                // 404 Not Found 응답 처리 (리소스를 찾을 수 없을 때)
                alert("현재 삭제할 수 있는 시험이 없습니다. 이미 제출된 시험이 없거나 삭제된 상태입니다.");
                window.location.href = '/view/instr/KDT/' + kdtSessionId + '/test/list';
            } else {
                const errMsg = await response.text();  // 에러 메시지 추출
                console.error("Error Response:", errMsg);
                alert('삭제에 실패했습니다.');
            }
        } catch (error) {
            console.error("Error during fetch:", error);
            alert('삭제 중 오류가 발생했습니다.');
        }
    }

    function addClassToInputs() {
    document.querySelectorAll('input').forEach(input => {
        input.classList.add('form-control');
    });

    document.querySelectorAll('form').forEach(form => {
    form.style.width = '40%';      // 폼의 너비를 부모 요소의 40%로 설정
    form.style.maxWidth = '500px'; // 폼의 최대 너비를 500px로 제한
});

    document.querySelectorAll('textarea').forEach(textarea=> {
        textarea.classList.add('form-control');
        textarea.style.overflow = 'hidden'; // 스크롤바 숨김
        textarea.style.resize = 'none'; // 사용자가 크기 조정 불가

        // 초기 높이를 설정
        textarea.style.height = textarea.scrollHeight + 'px';

        // 입력 이벤트에 따라 높이 조정
        textarea.addEventListener('input', () => {
        textarea.style.height = 'auto'; // 높이를 초기화
        textarea.style.height = textarea.scrollHeight + 'px'; // 텍스트에 맞는 높이 설정
        });
    });

    document.querySelectorAll('table').forEach(table=> {
        table.style.width = '100%';
    });

    document.querySelectorAll('button').forEach(button => {
        if (button.textContent.trim() === '삭제') {
            // Bootstrap 삭제 버튼 클래스 추가
            button.classList.add('btn', 'btn-danger');
        }

        if (button.textContent.trim() === '+ 추가') {
            // Bootstrap 삭제 버튼 클래스 추가
            button.classList.add('btn', 'btn-primary');
        }

        if (button.textContent.trim() === '등록하기') {
            // Bootstrap 삭제 버튼 클래스 추가
            button.classList.add('btn', 'btn-success');
        }
    });
    }

    window.onload = function() {
    addClassToInputs(); // 페이지 로드 후 실행
};

</script>
</body>
</html>
