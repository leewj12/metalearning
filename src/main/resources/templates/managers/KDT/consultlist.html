<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메타러닝 상담일지 목록</title>
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <!-- 헤더 CSS, JS(head에 적당히) -->
    <link rel="stylesheet" href="/static/css/admindashboard.css">
    <link rel="stylesheet" href="/static/css/header/managersidebar.css">
    <link rel="stylesheet" href="/static/css/header/managerheader.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <script>
        function getCsrfToken() {
            return document.querySelector('meta[name="_csrf"]').getAttribute('content');
        }

        function getCsrfHeaderName() {
            return document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
        }

    </script>
</head>
<body>
<div class="app-container">
    <!-- Header -->
    <div th:replace="~{fragments/managerheader :: managerheader}"></div>
    <div class="content-container">
        <!-- Sidebar -->
        <div th:replace="~{fragments/managersidebar :: managersidebar}"></div>
        <!-- Main Content -->
        <div class="main-content">
            <!-- 검색 영역 -->
            <form id="searchForm" method="get" th:action="@{/managers/KDT/{kdtSessionId}/consult/list(kdtSessionId=${KDTSessionDTO.kdtSessionId})}" class="row align-items-center mb-4">
                <!-- 왼쪽: 카테고리, 검색창, 검색 버튼 -->
                <div class="col-md-8 d-flex align-items-center">
                    <div class="input-group">
                        <!-- 카테고리 (1 비율) -->
                        <div class="input-group-prepend" style="flex: 1;">
                            <select id="searchCategory" name="searchCategory" class="form-select" th:value="${searchCategory}" required>
                                <option value="category" th:selected="${searchCategory == 'category'}">카테고리</option>
                                <option value="staffName" th:selected="${searchCategory == 'staffName'}">담당자</option>
                                <option value="studentName" th:selected="${searchCategory == 'studentName'}">상담자</option>
                                <option value="title" th:selected="${searchCategory == 'title'}">제목</option>
                                <option value="content" th:selected="${searchCategory == 'content'}">내용</option>
                            </select>
                        </div>

                        <!-- 검색창 (2 비율) -->
                        <input type="text" id="search" name="search" class="form-control" placeholder="검색어를 입력하세요" th:value="${search}" style="flex: 2;">

                        <!-- 검색 버튼 -->
                        <button type="button" class="btn btn-primary" onclick="validateSearch()">
                            <i class="bi bi-search"></i> 검색
                        </button>
                    </div>
                </div>

                <!-- 오른쪽: 10줄 보기 -->
                <div class="col-md-4 d-flex justify-content-end">
                    <select id="size" name="size" class="form-select w-auto" th:value="${size}" required onchange="submitWithUpdatedUrl()">
                        <option value="5" th:selected="${size==5}">5줄 보기</option>
                        <option value="10" th:selected="${size==10}">10줄 보기</option>
                        <option value="20" th:selected="${size==20}">20줄 보기</option>
                    </select>
                </div>
            </form>

            <!-- 상담일지 목록 -->
            <div class="consult-list mt-4">
                <table class="table table-bordered table-striped text-center">
                    <thead class="table-primary">
                    <tr>
                        <th>상담 번호</th>
                        <th>상담 제목</th>
                        <th>담당자</th>
                        <th>상담자</th>
                        <th>카테고리</th>
                        <th>상담 날짜</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="consult : ${consultList.content}">
                        <td th:text="${consult.consultOrder}"></td>
                        <td><a th:href="@{/managers/KDT/{kdtSessionId}/consult/{consultId}(kdtSessionId=${KDTSessionDTO.kdtSessionId}, consultId=${consult.kdtConsultId})}" th:text="${consult.kdtConsultTitle}"></a></td>
                        <td th:text="${consult.authorName}"></td>
                        <td th:text="${consult.kdtPartName}"></td>
                        <td th:text="${consult.kdtConsultCategory}"></td>
                        <td th:text="${consult.kdtConsultDate}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- 상담 작성하기 버튼 -->
            <div class="d-flex justify-content-center mt-4 gap-3">
                <a th:href="@{/managers/KDT/{kdtSessionId}/consult(kdtSessionId=${KDTSessionDTO.kdtSessionId})}">
                    <button type="button" class="btn btn-success">
                        <i class="bi bi-plus-circle"></i> 상담 작성하기
                    </button>
                </a>
                <a th:href="@{'/view/manager/KDT/session/' + ${KDTSessionDTO.kdtSessionId}}" class="btn btn-secondary">
                    <i class="bi bi-list"></i> 목차
                </a>
            </div>

            <!-- 페이징 처리 -->
            <div class="pagination mt-4 d-flex justify-content-center">
                <nav>
                    <ul class="pagination" th:if="${totalPages > 0}">
                        <!-- 첫 페이지 -->
                        <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/managers/KDT/{kdtSessionId}/consult/list(kdtSessionId=${KDTSessionDTO.kdtSessionId}, page=1, size=${size}, searchCategory=${searchCategory}, search=${search})}" tabindex="-1"> 처음 </a>
                        </li>

                        <!-- 이전 그룹 버튼 -->
                        <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/managers/KDT/{kdtSessionId}/consult/list(kdtSessionId=${KDTSessionDTO.kdtSessionId}, page=${blockStart - 1}, size=${size}, searchCategory=${searchCategory}, search=${search})}" tabindex="-1"> << </a>
                        </li>

                        <!-- 블록 내 페이지들 -->
                        <li class="page-item" th:each="i : ${#numbers.sequence(blockStart, blockEnd)}" th:classappend="${i == currentPage} ? 'active' : ''">
                            <a lass="page-link" th:href="@{/managers/KDT/{kdtSessionId}/consult/list(kdtSessionId=${KDTSessionDTO.kdtSessionId}, page=${i}, size=${size}, searchCategory=${searchCategory}, search=${search})}" class="page-link" th:text="${i}">1</a>
                        </li>

                        <!-- 다음 그룹 버튼 -->
                        <li class="page-item" th:classappend="${!hasNext} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/managers/KDT/{kdtSessionId}/consult/list(kdtSessionId=${KDTSessionDTO.kdtSessionId}, page=${blockEnd + 1}, size=${size}, searchCategory=${searchCategory}, search=${search})}"> >> </a>
                        </li>

                        <!-- 마지막 페이지 -->
                        <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/managers/KDT/{kdtSessionId}/consult/list(kdtSessionId=${KDTSessionDTO.kdtSessionId}, page=${totalPages}, size=${size}, searchCategory=${searchCategory}, search=${search})}"> 끝 </a>
                        </li>
                    </ul>

                </nav>
            </div>
        </div>
    </div>
</div>
<style>
    .pagination .page-item.active .page-link {
    background-color: #007bff; /* 배경색 */
    color: white; /* 글자색 */
    border-color: #007bff; /* 테두리 색 */
}
</style>

<script>
    function submitWithUpdatedUrl() {
        console.log("실행")
        var form = document.querySelector('form');
        var search = document.querySelector('#search').value;
        var searchCategory = document.querySelector('#searchCategory').value;
        var size = document.querySelector('#size').value;

        var url = '/managers/KDT/10000/consult/list?size=' + size;

        if (search && search !== "") {
            url += '&searchCategory=' + searchCategory +'&search=' + search;
        }

        // size 변경 후 URL로 직접 리디렉션
        window.location.href = url;
    }

        function validateSearch() {
        const category = document.getElementById('searchCategory').value;
        const searchInput = document.getElementById('search');

        if (category === 'category' && searchInput.value.trim() !== '') {
            // 경고창 표시
            alert('카테고리를 선택한 후 검색어를 입력해주세요.');

            // 검색창에 경고 스타일 적용
            searchInput.classList.add('is-invalid');
            return;
        }

        // 경고 스타일 제거
        searchInput.classList.remove('is-invalid');

        // 폼 제출
        document.getElementById('searchForm').submit();
    }

    function validateSearch(event) {
    // 카테고리와 검색창 값 가져오기
    const category = document.getElementById('searchCategory').value;
    const searchInput = document.getElementById('search');

    // 카테고리가 기본값('category')인데 검색어가 입력된 경우 경고
    if (category === 'category' && searchInput.value.trim() !== '') {
        // 경고창 표시
        alert('카테고리를 선택한 후 검색어를 입력해주세요.');

        // 검색창에 경고 스타일 적용
        searchInput.classList.add('is-invalid');
        return; // 폼 제출 차단
    }

    // 검색어와 카테고리가 모두 적합한 경우
    searchInput.classList.remove('is-invalid'); // 경고 스타일 제거

    // 폼 제출
    document.getElementById('searchForm').submit();
}
</script>
</body>
</html>
