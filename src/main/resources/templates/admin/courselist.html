<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>메타러닝 강의 목록</title>
    <link rel="icon" href="/static/images/logo.png" type="image/png">

    <!-- CSRF Token -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <!-- 스타일 시트 -->
    <link rel="stylesheet" href="/static/css/admindashboard.css">
    <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
    <link rel="stylesheet" href="/static/css/header/adminheader.css">

    <!-- 외부 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- 부트스트랩 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .search-bar {
            margin: 2rem auto;
            max-width: 800px;
        }

        /* 검색창과 셀렉트박스의 flex 비율 재정의 */
        .input-group > .form-control {
            flex: 3 !important;
        }

        .input-group > .form-select {
            flex: 1 !important;
        }

        .card img {
            object-fit: fill;
            height: 180px;
        }

        .card-title,
        .card-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-container {
            margin-top: 2rem;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Header -->
    <div th:replace="~{fragments/adminheader :: adminheader}"></div>
    <div class="content-container">
        <!-- Sidebar -->
        <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>
        <!-- Main Content -->
        <div class="main-content">

            <div class="d-flex justify-content-center mt-2">
                <h1><i class="bi bi-person-workspace"></i> 강의 목록</h1>
            </div>

        <!-- 검색창 -->
        <div class="search-bar input-group mb-3">
<!--            <select class="form-select" aria-label="카테고리 선택">-->
<!--                <option selected>카테고리 선택</option>-->
<!--                <option value="programming">프로그래밍</option>-->
<!--                <option value="design">디자인</option>-->
<!--                <option value="marketing">마케팅</option>-->
<!--                <option value="others">기타</option>-->
<!--            </select>-->
<!--            <input type="text" class="form-control" placeholder="강의 검색" aria-label="강의 검색">-->
<!--            <button class="btn btn-primary" type="button"><i class="bi bi-search"></i> 검색</button>-->
        </div>

            <!-- 강의 카드 목록 -->
            <div class="card-container row">
                <!-- 강의 목록이 있을 경우 -->
                <div th:each="course : ${courseList}" class="col-12 col-sm-6 col-md-4 mb-4">
                    <div class="card">
                        <img th:src="${course.courseThumbnail != null ? '/static/uploads/course/' + course.courseThumbnail : '/static/images/null.png'}"
                             class="card-img-top" alt="강의 썸네일">
                        <div class="card-body">
                            <h5 class="card-title" th:text="${course.courseTitle}">강의 제목</h5>
                            <p class="card-text">
                                카테고리: <span th:text="${course.courseCategory}"></span>
                            </p>
                            <p class="card-text d-flex justify-content-between">
                    <span>
                        난이도:
                        <span th:switch="${course.courseDifficulty.name()}">
                            <span th:case="'ADVANCED'">고급</span>
                            <span th:case="'INTERMEDIATE'">중급</span>
                            <span th:case="'BASIC'">초급</span>
                            <span th:case="'BEGINNER'">입문</span>
                            <span th:case="*">알 수 없음</span>
                        </span>
                    </span>
                                <span>
                        ₩<span class="course-price" th:text="${course.coursePrice}">0</span>
                    </span>
                            </p>
                            <div class="d-flex justify-content-between">
                                <a th:href="@{/admin/course/{id}(id=${course.courseId})}" class="btn btn-primary">상세 보기</a>

                                <!-- 삭제 버튼 -->
                                <button class="btn btn-danger delete-course-button"
                                        th:data-course-id="${course.courseId}">
                                    <i class="bi bi-trash"></i> 삭제하기
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- 강의가 없을 경우 표시되는 메시지 -->
                <div th:if="${#lists.isEmpty(courseList)}" class="col-12 text-center text-danger mt-3">
                    <h2>승인된 강의가 없습니다</h2>
                </div>
            </div>



            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const priceElements = document.querySelectorAll(".course-price");
        priceElements.forEach(function (priceElement) {
            const price = parseFloat(priceElement.textContent);
            if (!isNaN(price)) {
                priceElement.textContent = price.toLocaleString('en-US'); // 쉼표로 3자리 단위 포맷팅
            }
        });


        const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

        document.querySelectorAll(".delete-course-button").forEach(button => {
            button.addEventListener("click", async function () {
                const courseId = this.getAttribute("data-course-id");

                if (!confirm("정말 이 강의를 삭제하시겠습니까?")) {
                    return; // 사용자가 취소한 경우 중단
                }

                // 삭제 버튼을 비활성화하여 중복 클릭 방지
                this.disabled = true;
                this.innerHTML = '<i class="bi bi-hourglass-split"></i> 삭제 중...';


                try {
                    const response = await fetch(`/api/admin/course/delete/${courseId}`, {
                        method: "DELETE",
                        headers: {
                            "Content-Type": "application/json",
                            [csrfHeader]: csrfToken // CSRF 토큰 추가
                        }
                    });

                    if (response.ok) {
                        alert("강의가 삭제되었습니다.");
                        this.closest(".card").remove(); // 삭제된 강의 카드 제거
                    } else if (response.status === 403) {
                        const errorMessage = await response.text();
                        alert(`삭제 실패: ${errorMessage}`); // 주문 내역이 있는 경우 경고 메시지 표시
                        this.disabled = false;
                        this.innerHTML = '<i class="bi bi-trash"></i> 삭제하기';
                    } else {
                        const errorMessage = await response.text();
                        alert(`삭제 실패: ${errorMessage}`);
                        this.disabled = false;
                        this.innerHTML = '<i class="bi bi-trash"></i> 삭제하기';
                    }
                } catch (error) {
                    console.error("강의 삭제 중 오류 발생:", error);
                    alert("강의 삭제에 실패했습니다.");
                    this.disabled = false;
                    this.innerHTML = '<i class="bi bi-trash"></i> 삭제하기';
                }
            });
        });
    });
</script>
</body>
</html>
