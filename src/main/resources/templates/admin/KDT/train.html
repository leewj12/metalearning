<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메타러닝 훈련일지 작성</title>
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <!-- 헤더 CSS, JS(head에 적당히) -->
    <link rel="stylesheet" href="/static/css/admindashboard.css">
    <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
    <link rel="stylesheet" href="/static/css/header/adminheader.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <script>
        function getCsrfToken() {
            return document.querySelector('meta[name="_csrf"]').getAttribute('content');
        }

        function getCsrfHeaderName() {
            return document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
        }
    </script>

    <style>

    </style>

</head>
<body>
<div class="app-container">
    <!-- Header -->

    <div th:replace="~{fragments/adminheader :: adminheader}"></div>
    <div class="content-container">
        <!-- Sidebar -->
        <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>
        <!-- Main Content -->
        <div class="main-content">
            <h1 class="mb-4"><i class="bi bi-journal-text me-2"></i>훈련일지 작성</h1>
            <h2 th:text="${KDTSessionDTO.kdtSessionTitle}" class="text-primary"></h2>
            <form th:action="@{/admin/KDT/{id}/train(id=${KDTSessionDTO.kdtSessionId})}" method="post" class="mt-4">
                <!-- CSRF 토큰 추가 -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <!-- 훈련 제목 -->
                <div class="mb-3">
                    <label for="kdtTrainTitle" class="form-label">
                        <i class="bi bi-pencil-square me-2"></i>훈련 제목
                    </label>
                    <input type="text" id="kdtTrainTitle" name="kdtTrainTitle" class="form-control" required>
                </div>

                <!-- 담당 강사와 훈련 날짜 (같은 줄 배치) -->
                <div class="row g-3 mb-3">
                    <!-- 담당 강사 -->
                    <div class="col-md-6">
                        <label for="kdtStaffId" class="form-label">
                            <i class="bi bi-person-badge me-2"></i>담당 강사
                        </label>
                        <select id="kdtStaffId" class="form-select" required>
                            <option value="" disabled selected>강사를 선택해주세요</option>
                            <option th:each="entry : ${instrMap}" th:value="${entry.key}" th:text="${entry.value}"></option>
                        </select>
                        <!-- 실제 전송되는 kdtStaffId 값은 hidden으로 처리 -->
                        <input type="hidden" id="hiddenKdtStaffId" name="kdtStaffId" value="">
                    </div>

                    <!-- 훈련 날짜 -->
                    <div class="col-md-6">
                        <label for="kdtTrainDate" class="form-label">
                            <i class="bi bi-calendar-event me-2"></i>훈련 날짜
                        </label>
                        <input type="date" id="kdtTrainDate" name="kdtTrainDate" class="form-control" required>
                    </div>
                </div>

                <!-- 훈련 과목 -->
                <div class="mb-3">
                    <label for="kdtTrainSubject" class="form-label">
                        <i class="bi bi-book me-2"></i>훈련 과목
                    </label>
                    <input type="text" id="kdtTrainSubject" name="kdtTrainSubject" class="form-control" required>
                </div>

                <!-- 훈련 내용 -->
                <div class="mb-3">
                    <label for="kdtTrainContent" class="form-label">
                        <i class="bi bi-card-text me-2"></i>훈련 내용
                    </label>
                    <textarea id="kdtTrainContent" name="kdtTrainContent" rows="5" class="form-control" required></textarea>
                </div>

                <!-- 제출 버튼 -->
                <div class="d-flex justify-content-center mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle me-2"></i>제출
                    </button>
                </div>
            </form>
        </div>
    </div>


    <script>
        document.getElementById('kdtStaffId').addEventListener('change', function() {
            // 선택된 option의 value를 hidden 필드에 설정
            document.getElementById('hiddenKdtStaffId').value = this.value;
        });
    </script>
</body>
</html>
