<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메타러닝 공사 중</title>
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KyZXEJt3W8J+qJDJpD4laNQFMx5auP6cQz0YP0w85QZmG5ZJX5qv35lmjxkKh8i2" crossorigin="anonymous">
    <!-- Font Awesome CDN for icon -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <style>
        /* 전체 배경 색상 및 화면 중앙 정렬 */
        body {
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            animation: fadeIn 1s ease-in-out; /* 전체 페이지 서서히 나타나기 */
        }

        /* 공사 중 메시지 박스 */
        .message {
            text-align: center;
            background: #fff;
            border-radius: 12px;
            padding: 50px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            width: 80%;
            max-width: 600px;
            animation: slideUp 1.5s ease-in-out; /* 메시지 박스 위에서 아래로 슬라이드 */
        }

        /* 아이콘 스타일 */
        .icon {
            font-size: 80px;
            color: #ff6347;
            margin-bottom: 20px;
            animation: bounce 2s infinite, rotate 4s linear infinite; /* 아이콘 튕기기와 회전 */
        }

        /* 제목 스타일 */
        h2 {
            font-size: 32px;
            color: #333;
            margin-bottom: 20px;
            font-weight: bold;
            animation: fadeInUp 1s ease-in-out; /* 제목 서서히 올라오면서 나타나기 */
        }

        /* 설명 문구 스타일 */
        p {
            font-size: 18px;
            color: #555;
            margin-bottom: 30px;
            animation: fadeInUp 1.2s ease-in-out; /* 설명 서서히 올라오면서 나타나기 */
        }

        /* 홈 버튼 스타일 */
        a {
            font-size: 18px;
            color: #007bff;
            text-decoration: none;
            border: 2px solid #007bff;
            padding: 10px 20px;
            border-radius: 30px;
            transition: all 0.3s ease;
            animation: fadeInUp 1.5s ease-in-out; /* 버튼 서서히 올라오면서 나타나기 */
        }

        /* 버튼 호버 효과 */
        a:hover {
            background-color: #007bff;
            color: #fff;
            transform: scale(1.1);
        }

        /* 공사 중 아이콘 위아래로 튕기는 애니메이션 */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }

        /* 아이콘 회전 애니메이션 */
        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* 전체 페이지 서서히 나타나기 */
        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        /* 메시지 박스 위에서 아래로 슬라이드 */
        @keyframes slideUp {
            0% {
                transform: translateY(50px);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* 제목과 설명 서서히 올라오면서 나타나기 */
        @keyframes fadeInUp {
            0% {
                transform: translateY(20px);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

<div class="message">
    <h2>현재 페이지는 공사 중입니다!</h2>
    <p>아직 페이지가 구현 중입니다. 곧 서비스 진행 예정 입니다!</p>
    <a href="/">홈으로 가기</a>
</div>

<!-- Bootstrap JS, Popper.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz4fnFO9gybF57qkF7Dp7U0v2pLTxW5XmyYoP8F3iXrBf3CkyoXGGt8sgst" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js" integrity="sha384-pzjw8f+ua7Kw1TIq0aB07aG6m3bOX9y4pVaaAvjaO5KjMQ4h8z8K" crossorigin="anonymous"></script>
</body>
</html>
