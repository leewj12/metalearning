<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메타러닝 상담일지 작성</title>
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <!-- 헤더 CSS, JS(head에 적당히) -->
    <link rel="stylesheet" href="/static/css/admindashboard.css">
    <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
    <link rel="stylesheet" href="/static/css/header/adminheader.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <script>
        function getCsrfToken() {
            return document.querySelector('meta[name="_csrf"]').getAttribute('content');
        }

        function getCsrfHeaderName() {
            return document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
        }
    </script>
</head>
<body>
<div class="app-container">
    <!-- Header -->
    <div th:replace="~{fragments/adminheader :: adminheader}"></div>
    <div class="content-container">
        <!-- Sidebar -->
        <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>
        <!-- Main Content -->
        <div class="main-content container mt-4">
            <h1 class="mb-4">상담정보 작성</h1>
            <h2 th:text="${KDTSessionDTO.kdtSessionTitle}" class="mb-3"></h2>
            <form th:action="@{/admin/KDT/{id}/consult(id=${KDTSessionDTO.kdtSessionId})}" method="POST" class="row g-3">
                <!-- CSRF 토큰 추가 -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <!-- 상담 제목 -->
                <div class="col-md-6">
                    <label for="kdtConsultTitle" class="form-label">
                        <i class="bi bi-pencil-square"></i> 상담 제목:<span style="color:red;">*</span>
                    </label>
                    <input type="text" id="kdtConsultTitle" name="kdtConsultTitle" class="form-control" required>
                </div>

                <!-- 국비 참가자 -->
                <div class="col-md-6">
                    <label for="kdtPartId" class="form-label">
                        <i class="bi bi-person-fill"></i> 국비 참가자:<span style="color:red;">*</span>
                    </label>
                    <select id="kdtPartId" class="form-select" required>
                        <option value="" disabled selected>학생을 선택해주세요</option>
                        <option th:each="entry : ${studentMap}" th:value="${entry.key}" th:text="${entry.value}"></option>
                    </select>
                </div>

                <!-- 상담 카테고리 -->
                <div class="col-md-6">
                    <label for="kdtConsultCategory" class="form-label">
                        <i class="bi bi-tag"></i> 상담 카테고리:<span style="color:red;">*</span>
                    </label>
                    <select id="kdtConsultCategory" name="kdtConsultCategory" class="form-select" required>
                        <option value="CAREER">진로</option>
                        <option value="CONCERN">고민</option>
                        <option value="SUGGESTION">건의</option>
                    </select>
                </div>

                <!-- 상담 날짜 -->
                <div class="col-md-6">
                    <label for="kdtConsultDate" class="form-label">
                        <i class="bi bi-calendar-date"></i> 상담 날짜:<span style="color:red;">*</span>
                    </label>
                    <input type="date" id="kdtConsultDate" name="kdtConsultDate" class="form-control" required>
                </div>

                <!-- 실제 전송되는 kdtStaffId 값은 hidden으로 처리 -->
                <input type="hidden" id="hiddenKdtPartId" name="kdtPartId" value="">

                <!-- 상담 내용 -->
                <div class="col-12">
                    <label for="kdtConsultContent" class="form-label">
                        <i class="bi bi-chat-right-dots"></i> 상담 내용:<span style="color:red;">*</span>
                    </label>
                    <textarea id="kdtConsultContent" name="kdtConsultContent" rows="4" class="form-control" required></textarea>
                </div>

                <!-- 제출 버튼 -->
                <div class="d-flex justify-content-center mt-4 gap-3">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-send"></i> 제출
                    </button>
                    <button class="btn btn-secondary" onclick="history.back()">
                        <i class="bi bi-arrow-left-circle"></i>
                        뒤로 가기
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>



<script>
    document.getElementById('kdtPartId').addEventListener('change', function() {
        // 선택된 option의 value를 hidden 필드에 설정
        document.getElementById('hiddenKdtPartId').value = this.value;
    });
</script>
</body>
</html>
