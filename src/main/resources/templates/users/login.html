<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>메타러닝 로그인</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/users/login.css">
  <style>
    .modal {
      display: none;
      position: fixed;
      z-index: 1050;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
    }
    .find-id-modal .modal-content,
    .find-pw-modal .modal-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #fff;
      padding: 36px;
      border-radius: 16px;
      width: 90%;
      max-width: 460px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .find-id-modal .modal-header,
    .find-pw-modal .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    .find-id-modal .modal-header h5,
    .find-pw-modal .modal-header h5 {
      color: #003366;
      font-weight: 700;
      font-size: 1.2rem;
    }
    .result-modal .modal-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #fff;
      padding: 36px;
      border-radius: 16px;
      width: 90%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .result-modal .modal-body {
      font-size: 1.1rem;
      font-weight: 600;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 80px;
      padding: 20px;
    }
    .result-modal .success-message { color: #28a745; }
    .result-modal .error-message { color: #dc3545; }
    .close {
      font-size: 24px;
      cursor: pointer;
      background: none;
      border: none;
      color: #999;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .close:hover {
      color: #333;
      background: #f5f5f5;
    }
  </style>
</head>
<body>

<div class="login-wrapper">
  <!-- Brand side -->
  <div class="login-brand">
    <img src="/static/images/logo.png" alt="Logo">
    <h1>MetaLearning</h1>
    <p>국비지원 IT 교육의 새로운 기준<br>실무 중심 커리큘럼으로 미래를 준비하세요</p>
  </div>

  <!-- Form side -->
  <div class="login-form">
    <h2>로그인</h2>

    <form action="/login" method="POST">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

      <div class="mb-3">
        <label for="email" class="form-label">이메일</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
          <input type="email" id="email" name="username" class="form-control" required placeholder="이메일을 입력하세요" autocomplete="email">
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label">비밀번호</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" id="password" name="password" class="form-control" required placeholder="비밀번호를 입력하세요" autocomplete="current-password">
        </div>
      </div>

      <button type="submit" class="btn btn-login w-100 mb-3">로그인</button>
    </form>

    <div th:if="${param.error}" class="text-center mb-3">
      <p class="text-danger small mb-0"><i class="bi bi-exclamation-circle"></i> 아이디 또는 비밀번호가 잘못되었습니다.</p>
    </div>

    <div class="divider">또는</div>

    <div class="action-links">
      <a href="/"><i class="bi bi-house-door-fill"></i> 홈</a>
      <a href="/signup"><i class="bi bi-person-plus-fill"></i> 회원가입</a>
      <a href="#" id="openFindIdModal"><i class="bi bi-search"></i> ID 찾기</a>
      <a href="#" id="openFindPwModal"><i class="bi bi-key-fill"></i> PW 찾기</a>
    </div>
  </div>
</div>


<!-- ID 찾기 모달 -->
<div id="findIdModal" class="modal find-id-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h5><i class="bi bi-search"></i> ID 찾기</h5>
      <span class="close" id="closeFindIdModal">&times;</span>
    </div>
    <div class="modal-body">
      <form id="findIdForm">
        <div class="mb-3">
          <label for="findIdName" class="form-label fw-semibold">이름</label>
          <input type="text" class="form-control" id="findIdName" name="name" placeholder="이름을 입력하세요" required>
        </div>
        <div class="mb-3">
          <label for="findIdBirth" class="form-label fw-semibold">생년월일</label>
          <input type="date" class="form-control" id="findIdBirth" name="birth" required>
        </div>
        <div class="mb-3">
          <label for="findIdPhone" class="form-label fw-semibold">연락처</label>
          <input type="text" class="form-control" id="findIdPhone" name="phone" placeholder="연락처를 입력하세요" required>
        </div>
        <button type="submit" class="btn btn-login w-100">ID 찾기</button>
      </form>
    </div>
  </div>
</div>

<!-- 결과 메시지 모달 -->
<div id="resultModal" class="modal result-modal">
  <div class="modal-content">
    <div class="modal-header" style="justify-content: space-between; padding-bottom: 16px; border-bottom: 1px solid #f0f0f0; margin-bottom: 0;">
      <h5 style="color: #003366; font-weight: 700;"><i class="bi bi-person-check"></i> 아이디 찾기 결과</h5>
      <span class="close" id="closeResultModal">&times;</span>
    </div>
    <div class="modal-body" id="resultMessage"></div>
  </div>
</div>

<!-- 비밀번호 찾기 모달 -->
<div id="findPwModal" class="modal find-pw-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h5><i class="bi bi-key-fill"></i> 비밀번호 찾기</h5>
      <span class="close" onclick="closeModal('findPwModal')">&times;</span>
    </div>
    <div class="modal-body">
      <form id="password-reset-form">
        <div class="mb-3">
          <label for="resetName" class="form-label fw-semibold">이름</label>
          <input type="text" id="resetName" name="name" class="form-control" required placeholder="이름을 입력하세요" autocomplete="name">
        </div>
        <div class="mb-3">
          <label for="resetBirth" class="form-label fw-semibold">생년월일</label>
          <input type="date" id="resetBirth" name="birth" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="resetEmail" class="form-label fw-semibold">이메일</label>
          <input type="email" id="resetEmail" name="email" class="form-control" required placeholder="이메일을 입력하세요" autocomplete="email">
        </div>
        <button type="submit" class="btn btn-login w-100">비밀번호 찾기</button>
      </form>
      <div id="resetResultMessage" class="mt-3" style="display: none;">
        <div id="resetMessage" class="alert"></div>
      </div>
    </div>
  </div>
</div>

<script>
  document.getElementById('openFindPwModal').addEventListener('click', function() {
    document.getElementById('findPwModal').style.display = 'block';
  });

  function closeModal(modalId) {
    document.getElementById(modalId).style.display = 'none';
  }

  document.getElementById('password-reset-form').addEventListener('submit', async function(event) {
    event.preventDefault();
    const name = document.getElementById('resetName').value;
    const birth = document.getElementById('resetBirth').value;
    const email = document.getElementById('resetEmail').value;
    const resultMessageDiv = document.getElementById('resetResultMessage');
    resultMessageDiv.style.display = 'none';

    const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
    const formattedBirth = new Date(birth).toISOString().split('T')[0];

    try {
      const response = await fetch('/main/check-pw', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          [csrfHeader]: csrfToken,
        },
        body: JSON.stringify({ name: name, birth: formattedBirth, email: email })
      });

      if (response.ok) {
        const result = await response.text();
        if (result === '새 비밀번호가 이메일로 전송되었습니다.') {
          showResultMessage('비밀번호 재설정 이메일을 성공적으로 보냈습니다.', 'success');
          setTimeout(() => closeModal('findPwModal'), 2000);
        } else {
          showResultMessage('입력한 정보가 일치하지 않습니다. 다시 시도해주세요.', 'danger');
        }
      } else {
        showResultMessage('서버 오류가 발생했습니다. 다시 시도해주세요.', 'danger');
      }
    } catch (error) {
      showResultMessage('네트워크 오류가 발생했습니다. 다시 시도해주세요.', 'danger');
    }
  });

  function showResultMessage(message, type) {
    const resultMessageDiv = document.getElementById('resetResultMessage');
    const messageDiv = document.getElementById('resetMessage');
    messageDiv.classList.remove('alert-success', 'alert-danger');
    messageDiv.classList.add('alert', 'alert-' + type);
    messageDiv.textContent = message;
    resultMessageDiv.style.display = 'block';
  }

  window.addEventListener('click', function(event) {
    if (event.target.classList.contains('modal')) {
      event.target.style.display = 'none';
    }
  });

  document.getElementById("openFindIdModal").addEventListener("click", function() {
    document.getElementById("findIdModal").style.display = "block";
  });

  document.getElementById("closeFindIdModal").addEventListener("click", function() {
    document.getElementById("findIdModal").style.display = "none";
  });

  document.getElementById("findIdForm").addEventListener("submit", async function(event) {
    event.preventDefault();
    const name = document.getElementById("findIdName").value;
    const birth = document.getElementById("findIdBirth").value;
    const phone = document.getElementById("findIdPhone").value;
    const formattedBirth = new Date(birth).toISOString().split('T')[0];
    const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
    const csrfHeaderName = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

    try {
      document.getElementById("findIdModal").style.display = "none";
      const response = await fetch("/find/userid", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          [csrfHeaderName]: csrfToken,
        },
        body: JSON.stringify({ name: name, userBirth: formattedBirth, userPhone: phone })
      });

      const result = await response.json();
      const resultModal = document.getElementById("resultModal");
      const resultMessage = document.getElementById("resultMessage");

      if (result.status === "success") {
        resultMessage.textContent = "아이디: " + result.message;
        resultMessage.classList.add("success-message");
        resultMessage.classList.remove("error-message");
      } else {
        resultMessage.textContent = "입력 하신 정보가 틀립니다.";
        resultMessage.classList.add("error-message");
        resultMessage.classList.remove("success-message");
      }
      resultModal.style.display = "block";
    } catch (error) {
      alert("서버와 연결할 수 없습니다. 다시 시도해주세요.");
    }
  });

  document.getElementById("closeResultModal").addEventListener("click", function() {
    document.getElementById("resultModal").style.display = "none";
  });
</script>

</body>
</html>
