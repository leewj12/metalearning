<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>메타러닝 상세 생성</title>
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <link rel="stylesheet" href="/static/css/admindashboard.css">
    <link rel="stylesheet" href="/static/css/header/managersidebar.css">
    <link rel="stylesheet" href="/static/css/header/managerheader.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
<div class="app-container">
    <!-- Header -->
    <div th:replace="~{fragments/managerheader :: managerheader}"></div>
    <div class="content-container">
        <!-- Sidebar -->
        <div th:replace="~{fragments/managersidebar :: managersidebar}"></div>
        <!-- Main Content -->
        <div class="main-content container mt-4">
            <h1 class="text-center mb-4">
                <i class="bi bi-pencil-square"></i> 국비 상세 생성
            </h1>
            <form th:if="${detail == null}" th:action="@{/managers/KDT/{kdtSessionId}/detail(kdtSessionId=${kdtSessionId})}" method="post" enctype="multipart/form-data" class="p-4 shadow-lg rounded bg-light">
                <input type="hidden" name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" th:value="${kdtSessionId}" name="kdtSessionId" />
                <input type="hidden" id="user-id" name="userId" th:value="${#authentication.principal.userId}" />

                <div class="mb-3">
                    <label for="kdtDetailContent" class="form-label">
                        <i class="bi bi-card-text"></i> 상세 내용<span style="color:red;">*</span>
                    </label>
                    <textarea id="kdtDetailContent" name="kdtDetailContent" class="form-control" rows="5" required></textarea>
                </div>

                <div class="mb-3">
                    <label for="files" class="form-label">
                        <i class="bi bi-cloud-upload"></i> 이미지 업로드
                    </label>
                    <input type="file" id="files" name="files" class="form-control" multiple accept="image/*">
                </div>

                <div th:if="${errors}" class="alert alert-danger">
                    <ul>
                        <li th:each="error : ${errors}" th:text="${error.defaultMessage}"></li>
                    </ul>
                </div>

                <div class="d-flex justify-content-center mt-4 gap-3">
                <div th:if="${detail == null}" class="text-center">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="bi bi-check-circle"></i> 생성
                    </button>
                </div>
                    <button class="btn btn-secondary btn-lg" onclick="history.back()">
                        <i class="bi bi-arrow-left-circle"></i>
                        뒤로 가기
                    </button>
                </div>

            </form>
            <div th:if="${detail != null}" class="text-center alert alert-warning shadow p-4 rounded">
                <h3 class="mb-3">
                    <i class="bi bi-exclamation-triangle-fill"></i> 상세정보가 이미 존재합니다
                </h3>
                <div class="d-flex justify-content-center gap-3">
                    <button onclick="location.href='/managers/KDT/{kdtSessionId}/detail/update'"
                            th:onclick="'location.href=\'/managers/KDT/' + ${kdtSessionId} + '/detail/update\''"
                            class="btn btn-warning btn-lg">
                        수정하기
                    </button>
                    <a th:href="@{'/view/manager/KDT/session/' + ${sessionsDetail.kdtSessionId}}" class="btn btn-secondary">
                        <i class="bi bi-list"></i> 목차
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
