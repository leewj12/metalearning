<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메타러닝 강의 상세</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/header/header.css">
  <link rel="stylesheet" href="/static/css/footer/footer.css">
  <script src="/static/js/header/header.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    /* 비디오/유튜브 iframe 컨테이너 스타일링 */
    .video-container {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 비율 유지 */
      height: 0;
      overflow: hidden;
      max-width: 100%;
      background: #000;
      margin-bottom: 20px; /* 아래쪽 여백 */
      border-radius: 10px; /* 비디오 컨테이너 둥글게 처리 */
    }

    .video-container iframe, .video-container video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 10px; /* 비디오도 둥글게 처리 */
    }

    /* 비디오 또는 iframe 크기 */
    .video-responsive {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
    }

    /* 강의 제목 스타일 */
    .course-title {
      font-size: 28px; /* 제목 크기 증가 */
      font-weight: 700; /* 볼드로 강조 */
      margin-bottom: 20px;
      text-align: center; /* 중앙 정렬 */
      color: #333; /* 어두운 색상으로 가독성 향상 */
    }

    /* 강의 상세 페이지로 돌아가기 버튼 스타일 */
    .btn-back {
      margin-top: 30px;
      padding: 12px 30px;
      font-size: 16px;
      font-weight: 600;
      background-color: #007bff; /* 파란색 배경 */
      color: white;
      border-radius: 5px;
      border: none;
      transition: background-color 0.3s ease; /* 버튼 색상 변화 */
    }

    .btn-back:hover {
      background-color: #0056b3; /* 호버 시 더 어두운 파란색 */
    }

    /* 전체 컨텐츠의 중앙 정렬 */
    main.container {
      max-width: 900px;
      margin: 0 auto; /* 자동 좌우 여백 */
    }

    /* 페이지 배경 */
    body {
      background-color: #f8f9fa; /* 연한 회색 배경 */
      font-family: 'Arial', sans-serif; /* 기본 폰트 설정 */
    }

    /* 반응형 디자인 - 작은 화면에서 비디오 크기 조정 */
    @media (max-width: 768px) {
      .video-container {
        padding-bottom: 75%; /* 모바일에서 비디오 비율을 좀 더 세로로 맞추기 */
      }
      .course-title {
        font-size: 22px; /* 작은 화면에서는 제목 크기 줄임 */
      }
      .btn-back {
        width: 100%; /* 버튼 크기 자동 조정 */
        padding: 12px;
        font-size: 14px; /* 작은 화면에서 버튼 텍스트 크기 줄임 */
      }
    }
  </style>

</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="container mt-4" style="max-width:900px;">
  <h1 class="text-center mb-4"><i class="bi bi-play-circle"></i> 온라인 강의 영상</h1>

  <!-- 강의 제목 표시 -->
  <h3 class="course-title" th:text="${courseViewResponse.courseDetailTitle}"></h3>

  <!-- courseVideoType이 "url"인 경우 임베디드 비디오 (URL을 직접 임베드) -->
  <div th:if="${courseViewResponse.courseVideoType == 'url'}">
    <!-- 유튜브 링크일 경우 임베디드 iframe으로 처리 -->
    <div class="video-container">
      <iframe class="video-responsive"
              th:src="${courseViewResponse.courseVideoUuid}"
              frameborder="0"
              allowfullscreen>
      </iframe>
    </div>
  </div>

  <!-- courseVideoType이 "url"이 아닌 경우 일반 video 태그로 표시 -->
  <div th:if="${courseViewResponse.courseVideoType != 'url'}">
    <div class="video-container">
      <video class="video-responsive" controls>
        <source th:src="'/course/uploads/course_videos/' + ${courseViewResponse.courseVideoUuid}" type="video/mp4"/>
        동영상 재생을 지원하지 않는 브라우저입니다.
      </video>
    </div>
  </div>

  <div class="text-center mt-4">
    <a class="btn btn-secondary btn-back" th:href="@{/main/course/{courseId}(courseId=${courseId})}">
      <i class="bi bi-arrow-left-circle"></i> 강의 상세로 돌아가기
    </a>
  </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
