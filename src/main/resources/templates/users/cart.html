<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="_csrf" th:content="${_csrf.token}" />
  <meta name="_csrf_header" th:content="${_csrf.headerName}" />

  <title>메타러닝 강의 장바구니</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/header/header.css">
  <link rel="stylesheet" href="/static/css/footer/footer.css">
  <script src="/static/js/header/header.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">

  <script src="https://cdn.iamport.kr/v1/iamport.js"></script>
</head>
<body>
<input type="hidden" name="${_csrf.parameterName}" th:value="${_csrf.token}" />

<div th:insert="~{fragments/header :: header}"></div>

<div class="container mt-5">
  <h2 class="mb-4"><i class="bi bi-cart"></i> 코스런 장바구니</h2>

  <div class="card p-3 mb-4">
    <h4><i class="bi bi-person"></i> 구매자 정보</h4>
    <p><strong>이름:</strong> <span id="userName" class="text-primary">로딩 중...</span></p>
    <p><strong>이메일:</strong> <span id="userEmail" class="text-primary">로딩 중...</span></p>
    <p><strong>연락처:</strong> <span id="userPhoneNumber" class="text-primary">로딩 중...</span></p>
  </div>

  <h4 class="mb-3"><i class="bi bi-book"></i> 장바구니에 담긴 강의들</h4>
  <table class="table table-hover table-bordered">
    <thead class="table-dark">
    <tr>
      <th><input type="checkbox" id="selectAll"> 전체 선택</th>
      <th>강의 이미지</th>
      <th>강의 제목</th>
      <th>강의 요약</th>
      <th>강의 강사</th>
      <th>강의 가격</th>
      <th>취소</th>
    </tr>
    </thead>
    <tbody id="courseList">
    <!-- JavaScript에서 데이터 추가 -->
    </tbody>
  </table>

  <div class="text-end mb-4">
    <h4>총 결제 금액: <span id="totalPrice" class="text-success fw-bold">0</span> 원</h4>
  </div>

  <button class="btn btn-primary btn-lg w-100" id="paymentButton">
    <i class="bi bi-credit-card"></i> 결제하기
  </button>
</div>

<div class="modal fade" id="paymentModal" tabindex="-1" aria-labelledby="paymentModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="paymentModalLabel">
          <i class="bi bi-receipt"></i> 결제 내역 확인
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <table class="table table-bordered">
          <thead>
          <tr>
            <th>번호</th>
            <th>강의 제목</th>
            <th>강의 이미지</th>
            <th>강의 가격</th>
          </tr>
          </thead>
          <tbody id="selectedCourses">
          <!-- 선택된 강의 목록 -->
          </tbody>
        </table>
        <div class="text-end">
          <h4>총 결제 금액: <span id="totalPriceModal" class="text-success fw-bold">0</span> 원</h4>
        </div>
      </div>

      <div class="d-flex justify-content-center mt-4">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          <i class="bi bi-x-circle"></i> 취소
        </button>
        <button type="button" class="btn btn-primary" id="confirmPayment">
          <i class="bi bi-check-circle"></i> 결제하기
        </button>
      </div>

    </div>
  </div>
</div>

<input type="hidden" id="user-id" th:value="${#authentication.principal.userId}">

<div th:replace="~{fragments/footer :: footer}"></div>


<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<script>

  // 전역 변수 선언
let userInfo = {};

  // 페이지가 로드되면 사용자 정보와 장바구니 항목을 서버에서 가져오기
    window.onload = async function() {
        const userId = document.getElementById("user-id").value; // 사용자 ID 가져오기

        try {
            // 1. 사용자 정보 가져오기
            const userInfoResponse = await fetch(`/api/user/getUserInfo/${userId}`);

            if (userInfoResponse.ok) {
                userInfo = await userInfoResponse.json();
                document.getElementById("userName").innerText = userInfo.name;
                document.getElementById("userEmail").innerText = userInfo.email;
                document.getElementById("userPhoneNumber").innerText = userInfo.phone_number;
            } else {
                throw new Error("사용자 정보를 불러오는 데 실패했습니다.");
            }

            // 2. 장바구니 항목 가져오기
            const cartItemsResponse = await fetch(`/api/user/cart/items/${userId}`);

            if (cartItemsResponse.ok) {
                const cartItems = await cartItemsResponse.json();
                const courseList = document.getElementById("courseList");

                if (cartItems.length === 0) {
                    // 장바구니가 비어있는 경우 메시지 표시
                    courseList.innerHTML = `
                        <tr>
                            <td colspan="7" style="text-align: center; font-weight: bold; color: #dc3545;">
                                장바구니에 담긴 강의가 없습니다.
                            </td>
                        </tr>
                    `;
                } else {
                     // 장바구니에 항목이 있는 경우
                    cartItems.forEach(item => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td><input type="checkbox" class="itemCheckbox" data-id="${item.courseId}" data-price="${item.coursePrice}" data-title="${item.courseTitle}"></td>
                            <td><img src="/static/uploads/course/${item.courseThumbnail}" alt="강의 이미지" style="width: 100px; height: auto;"></td>
                            <td>${item.courseTitle}</td>
                            <td>${item.courseDescript}</td>
                            <td>${item.instructorName}</td>
                            <td>${item.coursePrice.toLocaleString()}원</td>
                            <td>
                                <input type="hidden" class="courseId" value="${item.courseId}">
                                <button class="btn btn-danger btn-sm deleteButton">삭제</button>
                            </td>
                        `;
                        courseList.appendChild(row);
                    });

                    // 장바구니 항목 가격 계산
                    updateTotalPrice();
                  }
              } else {
                  throw new Error("장바구니 항목을 불러오는 데 실패했습니다.");
              }
        } catch (error) {
            console.error("오류 발생:", error);
            alert(error.message);
        }
    };

    // 총 가격 계산 함수
    function updateTotalPrice() {
        let totalPrice = 0;
        const selectedItems = document.querySelectorAll('.itemCheckbox:checked');

        selectedItems.forEach(checkbox => {
            totalPrice += parseInt(checkbox.dataset.price);
        });

        // 총 가격을 천 단위로 쉼표 추가
        document.getElementById("totalPrice").innerText = totalPrice.toLocaleString();
    }

    // 체크박스 클릭 시 총 가격 업데이트
    document.getElementById("courseList").addEventListener("change", function(event) {
        if (event.target.classList.contains("itemCheckbox")) {
            updateTotalPrice();
        }
    });

    // 전체 선택/해제
    document.getElementById("selectAll").addEventListener("change", function(event) {
        const checkboxes = document.querySelectorAll('.itemCheckbox');
        checkboxes.forEach(checkbox => {
            checkbox.checked = event.target.checked;
        });
        updateTotalPrice(); // 전체 선택 후 가격 업데이트
    });

    // 개별 항목 삭제
    document.getElementById("courseList").addEventListener("click", async function(event) {
        if (event.target.classList.contains("deleteButton")) {
            const row = event.target.closest('tr');  // 클릭한 버튼의 부모 행(tr)을 찾음

        // CSRF 토큰을 메타 태그에서 가져옴
              const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
              const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

            // courseId를 가져오는 부분
            const courseId = row.querySelector('.courseId').value;  // course_id를 hidden input에서 가져옴
            const userId = document.getElementById("user-id").value; // 사용자 ID 가져오기

            // 삭제 확인 메시지
            const confirmDelete = confirm("정말로 강의 수강신청을 취소하겠습니까??");
            if (!confirmDelete) return;  // 사용자가 취소하면 함수 종료

            try {
                // URL에 강의 ID와 사용자 ID를 포함시켜 DELETE 요청을 보냄
                const response = await fetch(`/api/user/cart/remove/${courseId}`, {
                    method: 'DELETE',  // DELETE 메서드를 사용하여 삭제 요청
                    headers: {
                        'Content-Type': 'application/json',
                         [csrfHeader]: csrfToken // CSRF 토큰을 헤더에 추가
                    },
                });

                if (response.ok) {
                    // 서버에서 삭제 성공 시, 클라이언트에서 해당 항목 삭제
                    row.remove();
                    updateTotalPrice(); // 삭제 후 가격 업데이트
                } else {
                    alert("항목 삭제에 실패했습니다.");
                }
            } catch (error) {
                console.error('삭제 요청 중 오류 발생:', error);
                alert("항목 삭제에 실패했습니다.");
            }
        }

  });

// 결제 버튼 클릭 시 동작
document.getElementById("paymentButton").addEventListener("click", function () {
  const selectedItems = [];
  const checkboxes = document.querySelectorAll('.itemCheckbox:checked');
  let totalPrice = 0;

  // 선택된 강의 데이터 수집
  checkboxes.forEach((checkbox, index) => {
    const row = checkbox.closest('tr');
    const courseTitle = row.cells[2].innerText; // 강의 제목
    const coursePrice = parseInt(checkbox.dataset.price); // 강의 가격
    const courseThumbnail = row.cells[1].querySelector("img").src; // 썸네일 이미지 URL

    selectedItems.push({
      courseId: checkbox.dataset.id,
      courseTitle: courseTitle,
      coursePrice: coursePrice,
      thumbnailUrl: courseThumbnail, // 썸네일 추가
    });

    totalPrice += coursePrice;
  });

    if (selectedItems.length === 0) {
        alert("결제할 항목을 선택해주세요.");
        return;
    }

    // 모달창에 선택된 항목과 총 가격 표시
  const selectedCoursesElement = document.getElementById("selectedCourses");
  const totalPriceElement = document.getElementById("totalPriceModal");
  selectedCoursesElement.innerHTML = ""; // 이전 데이터 초기화

 selectedItems.forEach((item, index) => {
    const row = `
      <tr>
        <td>${index + 1}</td>
        <td>${item.courseTitle}</td>
        <td>
          <img src="${item.thumbnailUrl}" alt="썸네일" style="width: 50px; height: auto; margin-right: 10px;">
        </td>
        <td>${item.coursePrice.toLocaleString()} 원</td>
      </tr>
    `;
    selectedCoursesElement.innerHTML += row;
  });

  totalPriceElement.innerText = totalPrice.toLocaleString();

    // 결제 모달 띄우기
  const paymentModal = new bootstrap.Modal(document.getElementById("paymentModal"));
  paymentModal.show();

  // 모달 내 결제 버튼 이벤트 추가
  document.getElementById("confirmPayment").onclick = function () {
    processPayment(selectedItems, totalPrice);
  };
});

    // 결제 처리 함수
function processPayment(selectedItems, totalPrice) {
  if (!confirm("결제를 진행하시겠습니까?")) return;

// userInfo 확인
    if (!userInfo.name || !userInfo.email) {
        alert("사용자 정보가 로드되지 않았습니다. 잠시 후 다시 시도해주세요.");
        return;
    }

  const userId = document.getElementById("user-id").value; // 사용자 ID
  const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
  const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

  // 주문 데이터 생성
  const orderData = {
    userId: userId,
    items: selectedItems,
    totalPrice: totalPrice,
  };

   // 아임포트 결제 요청
  const IMP = window.IMP;
  IMP.init("imp31321421"); // 포트원 가맹점 식별코드

  IMP.request_pay(
    {
      pg: "kakaopay.TC0ONETIME",
      pay_method: "card",
      merchant_uid: "IMP" + new Date().getTime(),
      name: "메타코몬 강의 결제",
      amount: totalPrice,
      buyer_email: userInfo.email, // 전역 변수에서 이메일 참조
      buyer_name: userInfo.name,  // 전역 변수에서 이름 참조
    },
     function (rsp) {
      if (rsp.success) {
        alert("결제가 완료되었습니다!");

        // 서버로 결제 데이터 전송
        fetch("/payment/complete", {
          method: "POST",
          headers: {
                "Content-Type": "application/json",
                [csrfHeader]: csrfToken, // CSRF 토큰 헤더 추가
           },
          body: JSON.stringify({ ...orderData, rsp }),
        })
     .then((response) => {
            if (response.ok) {
              alert("결제 정보가 성공적으로 저장되었습니다.");
              location.reload();
            } else {
              alert("결제는 성공했지만 데이터 저장에 실패했습니다.");
            }
          })
   .catch((error) => console.error("결제 저장 중 오류:", error));
      } else {
        alert(`결제 실패: ${rsp.error_msg}`);
          }
      }
    );
  }
</script>
</body>
</html>
