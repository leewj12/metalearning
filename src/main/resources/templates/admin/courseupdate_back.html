 <!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>메타러닝 강의 수정</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/admindashboard.css">
  <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
  <link rel="stylesheet" href="/static/css/header/adminheader.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<div class="app-container">
  <!-- Header -->
  <div th:replace="~{fragments/adminheader :: adminheader}"></div>
  <div class="content-container">
    <!-- Sidebar -->
    <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>
    <!-- Main Content -->
    <div class="main-content container mt-4">
      <h1 class="text-center mb-4">
        <i class="bi bi-pencil-square"></i> 강의 수정
      </h1>
      <form th:action="@{/admin/course/update/{courseId}(courseId=${courseId})}"
            method="post" enctype="multipart/form-data" class="p-4 shadow-lg rounded bg-light">
        <!-- CSRF Token -->
        <input type="hidden" name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <!-- 기존 썸네일 표시 -->
        <div class="mb-3">
          <label class="form-label">기존 썸네일</label>
          <div>
            <img th:if="${updateResponse.courseThumbnail != null}"
                 th:src="'/uploads/course/' + ${updateResponse.courseThumbnail}"
                 alt="강의 썸네일"
                 style="max-width: 200px; max-height: 200px;"
                 class="img-thumbnail">
            <span th:if="${updateResponse.courseThumbnail == null}" class="text-muted">썸네일 없음</span>
          </div>
        </div>

        <!-- 새 썸네일 업로드 -->
        <div class="mb-3">
          <label for="courseThumbnail" class="form-label">새로운 썸네일 업로드</label>
          <input type="file" id="courseThumbnail" name="courseThumbnail" class="form-control" accept="image/*">
        </div>


        <div class="mb-3">
          <label for="courseTitle" class="form-label">
            <i class="bi bi-card-text"></i> 강의 제목
          </label>
          <input type="text" id="courseTitle" name="courseTitle"
                 class="form-control" th:value="${updateResponse.courseTitle}" required>
        </div>

        <div class="mb-3">
          <label for="courseDescript" class="form-label">
            <i class="bi bi-card-text"></i> 강의 설명
          </label>
          <textarea id="courseDescript" name="courseDescript" class="form-control" rows="5" required
                    th:text="${updateResponse.courseDescript}"></textarea>
        </div>

        <div class="mb-3">
          <label for="coursePrice" class="form-label">
            <i class="bi bi-cash"></i> 강의 가격
          </label>
          <input type="number" id="coursePrice" name="coursePrice" class="form-control"
                 th:value="${updateResponse.coursePrice}" required>
        </div>

        <div class="mb-3">
          <label for="courseCategory" class="form-label">
            <i class="bi bi-tag"></i> 강의 카테고리
          </label>
          <input type="text" id="courseCategory" name="courseCategory"
                 class="form-control" th:value="${updateResponse.courseCategory}" required>
        </div>

        <div class="mb-3">
          <label for="courseDifficulty" class="form-label">
            <i class="bi bi-bar-chart"></i> 강의 난이도
          </label>
          <select id="courseDifficulty" name="courseDifficulty" class="form-select" required>
            <option th:each="difficulty : ${courseDifficulties}"
                    th:value="${difficulty?.name()}"
                    th:selected="${difficulty?.name() == updateResponse.courseDifficulty?.name()}"
                    th:text="${difficulty.text}"></option>
          </select>
        </div>

        <!-- 홍보글 상세 -->
        <div class="mb-3">
          <label for="courseDescriptContent" class="form-label">
            <i class="bi bi-pencil"></i> 홍보글 상세 내용
          </label>
          <textarea id="courseDescriptContent" name="courseDescriptContent"
                    class="form-control" rows="4" th:text="${updateResponse.courseDescriptContent}"></textarea>
        </div>

        <!-- 강의 설명 ID를 히든 필드로 추가 -->
        <input type="hidden" id="courseDescriptId" name="courseDescriptId"
               th:value="${updateResponse.courseDescriptId}" />

        <!-- 기존 이미지 목록 -->
        <h3><i class="bi bi-images"></i> 기존 이미지(체크 시 삭제)</h3>
        <!-- 수정된 Form -->
        <ul class="sortable-list" id="image-list">
          <li th:each="file : ${updateResponse.courseDescriptFiles}" class="mb-3">
            <div class="d-flex align-items-center">
              <!-- 숨겨진 ID 필드 -->
              <!--<input type="hidden" name="filesToDelete" th:value="${file.courseDescriptFileId}" />-->

              <!-- 이미지 미리보기 -->
              <img th:src="'/uploads/course/' + ${file.courseDescriptFiles}"
                   alt="이미지 미리보기"
                   style="max-width: 100px; max-height: 100px; object-fit: cover;"
                   class="me-3 img-thumbnail">

              <!-- 파일 이름 -->
              <span th:text="${file.courseDescriptFiles}" class="me-3"></span>

              <!-- 삭제 체크박스 -->
              <input type="checkbox" name="filesToDelete" th:value="${file.courseDescriptFileId}" />
            </div>
          </li>
        </ul>

        <!-- 새로운 이미지 업로드 -->
        <div class="mb-4">
          <label for="courseDescriptFiles" class="form-label">
            <i class="bi bi-upload"></i> 새로운 이미지 추가:
          </label>
          <input type="file" id="courseDescriptFiles" name="courseDescriptFiles"
                 class="form-control" multiple accept="image/*">
        </div>

        <div id="detailsContainer" class="mt-4">
          <h3><i class="bi bi-list"></i> 강의 세부 정보</h3>


          <div th:each="detail, iterStat : ${updateResponse.courseDetails}"
               class="mb-4 border p-3 rounded detail-item"
               th:id="'detail-' + ${iterStat.index}">

            <div class="d-flex justify-content-between align-items-center mb-3">
              <!-- 세부 정보 -->
              <h5 name="detailNum" class="mb-0">세부 정보 <span th:text="${iterStat.index + 1}"></span></h5>

              <!-- 삭제 버튼 -->
              <button type="button" class="btn btn-danger btn-sm removeDetailButton" th:data-index="${iterStat.index}">
                <i class="bi bi-trash"></i> 삭제
              </button>
            </div>

            <!-- 세부 정보 ID -->
            <input type="hidden"
                   th:name="|courseDetails[${iterStat.index}].courseDetailId|"
                   th:value="${detail.courseDetailId}" />

            <!-- 파일 ID -->
            <input type="hidden"
                   th:name="|courseDetails[${iterStat.index}].courseFileId|"
                   th:value="${detail.courseFileId}" />

            <!-- 동영상 ID -->
            <input type="hidden"
                   th:name="|courseDetails[${iterStat.index}].courseVideoId|"
                   th:value="${detail.courseVideoId}" />

            <div class="mb-3">
              <label th:for="'courseDetails[' + ${iterStat.index} + '].courseDetailOutline'" class="form-label">상세 목차</label>
              <input type="text" th:id="'courseDetails[' + ${iterStat.index} + '].courseDetailOutline'"
                     th:name="'courseDetails[' + ${iterStat.index} + '].courseDetailOutline'"
                     class="form-control" th:value="${detail.courseDetailOutline}" required>
            </div>
            <div class="mb-3">
              <label th:for="'courseDetails[' + ${iterStat.index} + '].courseDetailTitle'" class="form-label">세부 제목</label>
              <input type="text" th:id="'courseDetails[' + ${iterStat.index} + '].courseDetailTitle'"
                     th:name="'courseDetails[' + ${iterStat.index} + '].courseDetailTitle'"
                     class="form-control" th:value="${detail.courseDetailTitle}" required>
            </div>
            <div class="mb-3">
              <label th:for="'courseDetails[' + ${iterStat.index} + '].courseDetailContent'" class="form-label">세부 내용</label>
              <textarea th:id="'courseDetails[' + ${iterStat.index} + '].courseDetailContent'"
                        th:name="'courseDetails[' + ${iterStat.index} + '].courseDetailContent'"
                        class="form-control" rows="3" th:text="${detail.courseDetailContent}"></textarea>
            </div>

            <!-- 파일 미리보기 -->
            <div th:if="${detail != null and detail.courseDetailFileUUID != null}" class="mb-3">
              <label class="form-label">첨부 파일</label>
              <a th:href="'/uploads/course_files/' + ${detail.courseDetailFileUUID}" target="_blank" class="btn btn-outline-primary btn-sm">
                파일 조회하기
              </a>
            </div>

            <!-- 동영상 미리보기 -->
            <div th:if="${detail.courseVideoUrl != null}">
              <h6>강의 영상:</h6>

              <!-- 유튜브 영상이면 iframe으로 표시 -->
              <div th:if="${detail.courseVideoUrl.contains('youtube.com') or detail.courseVideoUrl.contains('youtu.be')}">
                <iframe width="800" height="450"
                        th:src="${detail.courseVideoUrl}"
                        frameborder="0"
                        allowfullscreen>
                </iframe>
              </div>

              <!-- 유튜브가 아닐 경우 (S3 등) HTML5 video 태그로 재생 -->
              <div th:if="!(${detail.courseVideoUrl.contains('youtube.com')} or ${detail.courseVideoUrl.contains('youtu.be')})">
                <video controls width="600" height="338">
                  <source th:src="${detail.courseVideoUrl}" type="video/mp4" />
                  동영상 재생을 지원하지 않는 브라우저입니다.
                </video>
              </div>
            </div>

          </div>

        </div>
        <div class="d-flex justify-content-center mt-4">
          <button type="button" id="addDetailButton" class="btn btn-success">
            <i class="bi bi-plus-circle"></i> 세부 정보 추가
          </button>
        </div>


        <div class="d-flex justify-content-center gap-2 mt-4">
          <!-- 뒤로가기 버튼 -->
          <button type="button" class="btn btn-secondary btn-lg me-3" onclick="history.back()">
            <i class="bi bi-arrow-left"></i> 뒤로가기
          </button>

          <!-- 수정 완료 버튼 -->
          <button type="submit" class="btn btn-primary btn-lg">
            <i class="bi bi-check-circle"></i> 수정 완료
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
<script>
  $(document).ready(function () {
      console.log("jQuery Ready"); // 디버깅용 로그
      let detailCount = $('#detailsContainer .detail-item').length || 0;

      $('#addDetailButton').click(function () {
          const detailHtml = `
              <div class="detail-item mb-4 border p-3 rounded" id="detail-${detailCount}">
                  <h5 name="detailNum" >세부 정보 ${detailCount + 1}</h5>
                  <button type="button" class="btn btn-danger btn-sm mb-3 removeDetailButton" data-detail-id="detail-${detailCount}">
                      <i class="bi bi-trash"></i> 삭제
                  </button>
                  <div class="mb-3">
                      <label for="courseDetails[${detailCount}].courseDetailOutline" class="form-label">상세 목차</label>
                      <input type="text" id="courseDetails[${detailCount}].courseDetailOutline" name="courseDetails[${detailCount}].courseDetailOutline" class="form-control" placeholder="상세 목차를 입력하세요" required>
                  </div>
                  <div class="mb-3">
                      <label for="courseDetails[${detailCount}].courseDetailTitle" class="form-label">세부 제목</label>
                      <input type="text" id="courseDetails[${detailCount}].courseDetailTitle" name="courseDetails[${detailCount}].courseDetailTitle" class="form-control" required>
                  </div>
                  <div class="mb-3">
                      <label for="courseDetails[${detailCount}].courseDetailContent" class="form-label">세부 내용</label>
                      <textarea id="courseDetails[${detailCount}].courseDetailContent" name="courseDetails[${detailCount}].courseDetailContent" class="form-control" rows="3"></textarea>
                  </div>

                  <!-- 업로드 방식 선택 -->
                  <div class="mb-3">
                      <label class="form-label">업로드 방식 선택</label>
                      <div>
                          <input type="radio" id="uploadFile-${detailCount}" name="uploadType[${detailCount}]" value="file" checked>
                          <label for="uploadFile-${detailCount}">파일 업로드</label>

                          <input type="radio" id="embedVideo-${detailCount}" name="uploadType[${detailCount}]" value="embed">
                          <label for="embedVideo-${detailCount}">동영상 임베드</label>
                      </div>
                  </div>

                  <!-- 파일 업로드 영역 -->
                  <div class="mb-3 upload-section" id="fileUploadDiv-${detailCount}">
                      <label for="courseDetails[${detailCount}].courseDetailFile" class="form-label">
                          <i class="bi bi-upload"></i> 파일 업로드<span style="color:red;">*</span> (동영상, PDF, ZIP 등)
                      </label>
                      <input type="file" id="courseDetails[${detailCount}].courseDetailFile"
                          name="courseDetails[${detailCount}].courseDetailFile" class="form-control"
                          accept="video/*,.pdf,.zip">
                  </div>

                  <!-- 동영상 URL 입력 영역 (기본 숨김) -->
                  <div class="mb-3 upload-section" id="videoEmbedDiv-${detailCount}" style="display: none;">
                      <label for="courseDetails[${detailCount}].videoUrl" class="form-label">
                          <i class="bi bi-youtube"></i> 유튜브 동영상 URL 입력
                      </label>
                      <input type="text" id="courseDetails[${detailCount}].videoUrl"
                          name="courseDetails[${detailCount}].videoUrl" class="form-control"
                          placeholder="EX)https://www.youtube.com/embed/XXXXXX?si=XXXXXX">
                  </div>
              </div>`;
          $('#detailsContainer').append(detailHtml);
          detailCount++;
          adjustQuestionNumbers();
      });

      $('#detailsContainer').on('click', '.removeDetailButton', function () {
          console.log("Remove Detail Button Clicked"); // 디버깅용 로그
          const detailId = $(this).data('detail-id');
          $(`#${detailId}`).remove();

          resetIndices();
          adjustQuestionNumbers();
      });

      function adjustQuestionNumbers() {
          const detailItems = document.querySelectorAll('#detailsContainer .detail-item');
          detailItems.forEach((item, index) => {
              const header = item.querySelector('h5[name="detailNum"]');
              if (header) {
                  header.textContent = `세부 정보 ${index + 1}`; // 올바른 번호로 업데이트
              }
          });
      }

      function resetIndices() {
          console.log("Resetting Indices"); // 디버깅용 로그
          detailCount = 0;
          $('#detailsContainer .detail-item').each(function () {
              const newId = `detail-${detailCount}`;
              $(this).attr('id', newId);
              $(this).find('input, textarea, select').each(function () {
                  const name = $(this).attr('name');
                  const id = $(this).attr('id');
                  if (name) {
                      const newName = name.replace(/\[\d+\]/, `[${detailCount}]`);
                      $(this).attr('name', newName);
                  }
                  if (id) {
                      const newId = id.replace(/\[\d+\]/, `[${detailCount}]`);
                      $(this).attr('id', newId);
                  }
              });
              $(this).find('.removeDetailButton').data('detail-id', `detail-${detailCount}`);
              detailCount++;
          });
      }

      // 업로드 타입 변경 시 UI 변경
      function toggleUploadType() {
          $('input[name^="uploadType"]').each(function () {
              const detailIdx = $(this).attr('id').split('-')[1]; // 현재 detail index
              const fileUploadDiv = $(`#fileUploadDiv-${detailIdx}`);
              const videoEmbedDiv = $(`#videoEmbedDiv-${detailIdx}`);

              if ($(`#uploadFile-${detailIdx}`).is(':checked')) {
                  fileUploadDiv.show();
                  videoEmbedDiv.hide();
              } else {
                  fileUploadDiv.hide();
                  videoEmbedDiv.show();
              }
          });
      }

      // 업로드 타입 변경 이벤트 적용
      $(document).on("change", "input[name^='uploadType']", toggleUploadType);

  });
</script>
</html>
