<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>메타러닝 매니저 등록</title>
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <link rel="stylesheet" href="/static/css/admindashboard.css">
    <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
    <link rel="stylesheet" href="/static/css/header/adminheader.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
<!-- Header -->
<div th:replace="~{fragments/adminheader :: adminheader}"></div>

<div class="content-container">
    <!-- Sidebar -->
    <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>

    <!-- Main Content -->
    <div class="main-content container">

        <!-- 세션 정보 출력 -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white">
                <h3 class="card-title mb-0">
                    <i class="bi bi-info-circle-fill"></i> 회차 정보
                </h3>
            </div>
            <div class="card-body">
                <!-- 첫 번째 줄 -->
                <div class="row mb-3">
                    <div class="col-md-12">
                        <p><strong>회차 명:</strong> <span th:text="${sessions.kdtSessionTitle}"></span></p>
                    </div>
                </div>
                <div class="row mb-3">

                    <div class="col-md-6">
                        <p><strong>상태:</strong> <span th:text="${sessions.kdtSessionStatus}"></span></p>
                    </div>
                    <div class="col-md-6">
                        <p><strong>회차:</strong> <span th:text="${sessions.kdtSessionNum}"></span></p>
                    </div>

                </div>
                <!-- 두 번째 줄 -->
                <div class="row mb-3">

                    <div class="col-md-6">
                        <p><strong>과정 기간:</strong>
                            <span th:text="${sessions.kdtSessionStartDate}"></span> ~
                            <span th:text="${sessions.kdtSessionEndDate}"></span>
                        </p>
                    </div>
                    <div class="col-md-6">
                        <p><strong>과정 시간:</strong>
                            <span th:text="${sessions.kdtSessionStartTime}"></span> ~
                            <span th:text="${sessions.kdtSessionEndTime}"></span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 이미 등록된 매니저 리스트 -->
        <h2 class="mb-4"><i class="bi bi-people-fill"></i> 담당 매니저 목록</h2>
        <div class="table-responsive">
            <table class="table table-bordered table-hover">
                <thead class="table-light">
                <tr>
                    <th>이름</th>
                    <th>이메일</th>
                    <th>성별</th>
                    <th>전화번호</th>
                    <th>등급</th>
                    <th>상세보기</th>
                    <th><i class="bi bi-trash-fill"></i> 해제하기</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="manager : ${registeredmanagers}">
                    <td th:text="${manager.name}"></td>
                    <td th:text="${manager.userEmail}"></td>
                    <td>
                        <span th:if="${manager.userGender == 'M'}">남성</span>
                        <span th:if="${manager.userGender == 'F'}">여성</span>
                    </td>
                    <td th:text="${manager.userPhone}"></td>
                    <td>
                        <span th:if="${manager.userRole == 'MANAGER'}">매니저</span>
                        <span th:if="${manager.userRole != 'MANAGER'}" th:text="${manager.userRole}"></span>
                    </td>
                    <td>
                        <button class="btn btn-primary btn-details"
                                th:data-userId="${manager.userId}">
                            <i class="bi bi-search"></i> 상세
                        </button>
                    </td>
                    <td>
                        <button class="btn btn-danger btn-delete"
                                th:data-userId="${manager.userId}"
                                th:data-kdtSessionId="${sessions.kdtSessionId}">
                            <i class="bi bi-x-circle"></i> 해제
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- 매니저 등록 버튼 -->
        <button id="show-form-btn" type="button" class="btn btn-success">
            <i class="bi bi-plus-circle"></i> 매니저 등록하기
        </button>
        <a th:href="@{'/view/admin/KDT/session/' + ${sessions.kdtSessionId}}" class="btn btn-secondary">
            <i class="bi bi-arrow-left-circle"></i> 뒤로 가기
        </a>

        <!-- 매니저 등록 양식 -->
        <div id="register-form" class="d-none mt-4">
            <h2 class="mb-4"><i class="bi bi-person-plus-fill"></i> 매니저 등록하기</h2>
            <form th:action="@{/admin/KDT/{sessionId}/staff/manager(sessionId=${sessions.kdtSessionId})}" method="post">
                <input type="hidden" name="kdtSessionId" th:value="${sessions.kdtSessionId}" />

                <!-- 매니저 선택 -->
                <div class="table-responsive mb-3">
                    <table class="table table-bordered table-hover">
                        <thead class="table-light">
                        <tr>
                            <th><input type="checkbox" id="select-all" /> 전체 선택</th>
                            <th>이름</th>
                            <th>이메일</th>
                            <th>전화번호</th>
                            <th>성별</th>
                            <th>등급</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="user : ${usermanager}">
                            <td><input type="checkbox" name="userIds" th:value="${user.userId}" /></td>
                            <td th:text="${user.name}"></td>
                            <td th:text="${user.userEmail}"></td>
                            <td th:text="${user.userPhone}"></td>
                            <td>
                                <span th:if="${user.userGender == 'M'}">남성</span>
                                <span th:if="${user.userGender == 'F'}">여성</span>
                            </td>
                            <td>
                                <span th:if="${user.userRole == 'MANAGER'}">매니저</span>
                                <span th:if="${user.userRole != 'MANAGER'}" th:text="${user.userRole}"></span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-center">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> 매니저 등록
                    </button>
                </div>

            </form>
        </div>

    </div>
</div>

<script>
    // CSRF 토큰 관련 함수
    function getCsrfToken() {
      return document.querySelector('meta[name="_csrf"]').getAttribute('content');
    }

    function getCsrfHeaderName() {
      return document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
    }

    // 삭제 버튼 클릭 이벤트
    document.querySelectorAll('.btn-delete').forEach(button => {
      button.addEventListener('click', async function() {
        const userId = this.getAttribute('data-userId');
        const kdtSessionId = this.getAttribute('data-kdtSessionId');
        const csrfToken = getCsrfToken();
        const csrfHeaderName = getCsrfHeaderName();

        const isConfirmed = confirm("정말 이 담당 매니저를 해제 하시겠습니까?");
        if (!isConfirmed) return;

        try {
          const response = await fetch(`/api/admin/KDT/session/${kdtSessionId}/staff/delete`, {
            method: 'DELETE',
            headers: {
              'Content-Type': 'application/json',
              [csrfHeaderName]: csrfToken
            },
            body: JSON.stringify({ userId, kdtSessionId })
          });

          const data = await response.json();
          if (data.status === 'success') {
            alert('매니저가 배정이 취소되었습니다.');
            this.closest('tr').remove();

            // 세션 ID를 삭제 버튼의 data-kdtSessionId에서 가져옴
            const sessionId = this.getAttribute('data-kdtSessionId');

            // 세션 ID에 맞는 URL로 리다이렉트
            window.location.href = `/admin/KDT/${sessionId}/staff/manager`;  // 해당 URL로 이동
          } else {
            alert('삭제 실패: ' + data.message);
          }
        } catch (error) {
          console.error(error);
          alert('삭제 중 오류가 발생했습니다.');
        }
      });
    });

    // 매니저 등록 폼 토글 및 버튼 텍스트 변경
    const showFormBtn = document.getElementById('show-form-btn');
    const registerForm = document.getElementById('register-form');

    showFormBtn.addEventListener('click', () => {
      registerForm.classList.toggle('d-none'); // 폼 토글
      if (registerForm.classList.contains('d-none')) {
        showFormBtn.innerHTML = '<i class="bi bi-plus-circle"></i> 매니저 등록하기'; // 폼이 숨겨진 상태
      } else {
        showFormBtn.innerHTML = '<i class="bi bi-dash-circle"></i> 폼 숨기기'; // 폼이 보이는 상태
      }
    });

    // 전체 선택 기능
    const selectAllCheckbox = document.getElementById('select-all');
    const checkboxes = document.querySelectorAll('input[name="userIds"]');

    selectAllCheckbox.addEventListener('change', function() {
      checkboxes.forEach(checkbox => {
        checkbox.checked = selectAllCheckbox.checked;
      });
    });

  // 상세보기 버튼 클릭 이벤트
document.querySelectorAll('.btn-details').forEach(button => {
  button.addEventListener('click', function () {
    const userId = this.getAttribute('data-userId'); // 각 매니저의 userId를 가져옴
    const targetUrl = `/admin/users/${userId}`; // 해당 매니저의 상세 페이지 URL로 이동
    window.location.href = targetUrl; // 상세 페이지로 리다이렉트
  });
});

    
    
    // 매니저 등록 폼 유효성 검사
    document.querySelector('#register-form form').addEventListener('submit', function (event) {
        const selectedCheckboxes = document.querySelectorAll('input[name="userIds"]:checked');
        if (selectedCheckboxes.length === 0) {
            event.preventDefault(); // 폼 제출 방지
            alert('매니저를 선택해주세요.');
        }
    });
    
</script>

</body>
</html>
