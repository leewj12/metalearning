<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>메타러닝 강의 등록</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/admindashboard.css">
  <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
  <link rel="stylesheet" href="/static/css/header/adminheader.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<div class="app-container">
  <!-- Header -->
  <div th:replace="~{fragments/adminheader :: adminheader}"></div>
  <div class="content-container">
    <!-- Sidebar -->
    <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>
    <!-- Main Content -->
    <div class="main-content container" style="max-width:800px;">
      <form th:action="@{/admin/course/update/course/{courseId}(courseId=${courseId})}" method="post" enctype="multipart/form-data" class="p-4 rounded bg-light"
            onsubmit="return validateForm()">
        <h1 class="text-center mb-4">
          <i class="bi bi-pencil-square"></i> 강의 수정
        </h1>
        <!-- CSRF Token -->
        <input type="hidden" name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <!-- 강의 상태를 항상 승인으로 설정 -->
        <input type="hidden" name="courseStatus" th:value="${T(com.Meta_learning.course.courseentity.CourseStatus).APPROVED.name()}">

        <!-- 강의 정보 입력 구역 -->
        <fieldset class="border p-4 mb-4">
          <legend class="h4 mb-4"><i class="bi bi-info-circle"></i> 강의 정보 수정</legend>
          <!-- 강의 기본 정보 -->

          <div class="mb-3">
            <label class="form-label">
              <i class="bi bi-image"></i>기존 썸네일
            </label>
            <div>
              <img th:if="${updateResponse.courseThumbnail != null}"
                   th:src="'/uploads/course/' + ${updateResponse.courseThumbnail}"
                   alt="강의 썸네일"
                   style="max-width: 200px; max-height: 200px;"
                   class="img-thumbnail">
              <span th:if="${updateResponse.courseThumbnail == null}" class="text-muted">썸네일 없음</span>
            </div>
          </div>

          <div class="mb-3">
            <label for="courseThumbnail" class="form-label">
              <i class="bi bi-image"></i> 새로운 강의 썸네일 업로드
            </label>
            <input type="file" id="courseThumbnail" name="courseThumbnail" class="form-control" accept="image/*">
          </div>

          <div class="mb-3">
            <label for="courseTitle" class="form-label">
              <i class="bi bi-card-text"></i> 강의 제목<span style="color:red;">*</span>
            </label>
            <input type="text" id="courseTitle" name="courseTitle"
                   class="form-control" th:value="${updateResponse.courseTitle}" required>
          </div>

          <div class="mb-3">
            <label for="courseDescript" class="form-label">
              <i class="bi bi-card-text"></i> 강의 한줄 설명
            </label>
            <textarea id="courseDescript" name="courseDescript" class="form-control" rows="3"
                      th:text="${updateResponse.courseDescript}"></textarea>
          </div>

          <div class="mb-3">
            <label for="courseDifficulty" class="form-label">
              <i class="bi bi-bar-chart"></i> 강의 난이도<span style="color:red;">*</span>
            </label>
            <select id="courseDifficulty" name="courseDifficulty" class="form-select" required>
              <option th:each="difficulty : ${courseDifficulties}"
                      th:value="${difficulty.name()}"
                      th:selected="${difficulty?.name() == updateResponse.courseDifficulty?.name()}"
                      th:text="${difficulty.text}"></option>
            </select>
          </div>

          <div class="mb-3 row" >
            <div class="col-md-6 col-sm-12">
              <label for="courseCategory" class="form-label">
                <i class="bi bi-tag"></i> 강의 카테고리
              </label>
              <select id="courseCategory" name="courseCategory" class="form-control">
                <option value="기타" th:selected="${updateResponse.courseCategory == '기타'}">기타</option>
                <option value="개발 프로그래밍" th:selected="${updateResponse.courseCategory == '개발 프로그래밍'}">개발 프로그래밍</option>
                <option value="게임 개발" th:selected="${updateResponse.courseCategory == '게임 개발'}">게임 개발</option>
                <option value="데이터 사이언스" th:selected="${updateResponse.courseCategory == '데이터 사이언스'}">데이터 사이언스</option>
                <option value="인공지능" th:selected="${updateResponse.courseCategory == '인공지능'}">인공지능</option>
                <option value="보안 네트워크" th:selected="${updateResponse.courseCategory == '보안 네트워크'}">보안 네트워크</option>
                <option value="하드웨어" th:selected="${updateResponse.courseCategory == '하드웨어'}">하드웨어</option>
                <option value="디자인 아트" th:selected="${updateResponse.courseCategory == '디자인 아트'}">디자인 아트</option>
                <option value="기획 경영 마케팅" th:selected="${updateResponse.courseCategory == '기획 경영 마케팅'}">기획 경영 마케팅</option>
                <option value="업무 생산성" th:selected="${updateResponse.courseCategory == '업무 생산성'}">업무 생산성</option>
                <option value="커리어 자기계발" th:selected="${updateResponse.courseCategory == '커리어 자기계발'}">커리어 자기계발</option>
                <option value="대학교육" th:selected="${updateResponse.courseCategory == '대학교육'}">대학교육</option>
              </select>
            </div>
            <div class="col-md-6 col-sm-12">
              <label for="coursePrice" class="form-label">
                <i class="bi bi-cash"></i> 강의 가격<span style="color:red;">*</span>
              </label>
              <input type="number" id="coursePrice" name="coursePrice" class="form-control" th:value="${updateResponse.coursePrice}" required>
            </div>
          </div>
        </fieldset>


        <!-- Submit -->
        <div class="d-flex justify-content-between align-items-center">
          <button type="submit" class="btn btn-primary btn-lg" id="submitButton">
            <i class="bi bi-check-circle"></i> 수정
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
