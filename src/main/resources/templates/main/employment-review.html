<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메타러닝 Employment Review</title>
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <link rel="stylesheet" href="/static/css/header/header.css">
    <script src="/static/js/header/header.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        /* 카드 전체 스타일 */
        .card-deck {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        /* 각 카드의 스타일 */
        .card {
            flex: 1 1 calc(25% - 1rem);
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background-color: #fff;
        }

        /* 카드에 마우스 오버 시 효과 */
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .card-body {
            padding: 1.25rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .card-text {
            font-size: 0.9rem;
            color: #555;
        }

        /* 페이징 네비게이션 */
        .pagination {
            justify-content: center;
            margin-top: 2rem;
        }

        .pagination .page-item.active .page-link {
            background-color: #007bff;
            border-color: #007bff;
            color: #fff;
        }

        .pagination .page-item.disabled .page-link {
            color: #6c757d;
            pointer-events: none;
        }

        .pagination .page-link {
            color: #007bff;
            border-radius: 50%;
            transition: background-color 0.3s ease;
        }

        .pagination .page-link:hover {
            background-color: #f1f1f1;
        }

        /* 반응형 디자인 (작은 화면에서 카드 크기 조정) */
        @media (max-width: 768px) {
            .card {
                flex: 1 1 calc(50% - 1rem);
            }
        }

        @media (max-width: 576px) {
            .card {
                flex: 1 1 100%;
            }
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">
    <h1 class="text-center mb-4">취업자 후기</h1>

    <!-- 게시글 목록을 4개씩 옆으로 출력 -->
    <div class="card-deck">
        <div th:each="board : ${boardviewList}" class="card mb-4">
            <div class="card-body">
                <img src="" alt="Image" class="card-img-top"> <!-- fixed image tag -->
                <h5 class="card-title" th:text="${board.boardTitle}">게시글 제목</h5>
                <h6 class="card-subtitle mb-2 text-muted" th:text="'작성자: ' + ${board.name}">작성자</h6>
                <p class="card-text" th:text="'조회수: ' + ${board.boardView}">조회수</p>
                <p class="card-text" th:text="'작성일: ' + ${board.boardCreatedAt}">작성일</p>
            </div>
        </div>
    </div>

    <!-- 페이징 네비게이션 -->
    <div class="pagination d-flex justify-content-center" th:if="${!noResults}">
        <nav>
            <ul class="pagination">
                <!-- 처음 버튼 -->
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                    <a class="page-link" th:href="@{'/main/employment-review?page=1'}">처음</a>
                </li>

                <!-- 이전 페이지 블록 -->
                <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled' : ''">
                    <a th:href="@{/main/KDT-curriculum(page=${blockStart - 1}, searchName=${searchName != null ? searchName : ''}, searchCategory=${searchCategory != null ? searchCategory : ''})}" class="page-link"><<</a>
                </li>

                <!-- 페이지 번호 반복 -->
                <li class="page-item" th:each="i : ${#numbers.sequence(blockStart, blockEnd)}" th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{'/main/employment-review?page=' + ${i}}" th:text="${i}">1</a>
                </li>

                <!-- 다음 페이지 블록 -->
                <li class="page-item" th:classappend="${!hasNext} ? 'disabled' : ''">
                    <a th:href="@{/main/KDT-curriculum(page=${blockEnd + 1}, searchName=${searchName != null ? searchName : ''}, searchCategory=${searchCategory != null ? searchCategory : ''})}" class="page-link">>></a>
                </li>

                <!-- 마지막 버튼 -->
                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                    <a class="page-link" th:href="@{'/main/employment-review?page=' + ${totalPages}}">끝</a>
                </li>
            </ul>
        </nav>
    </div>
    <!-- 검색 결과가 없을 때 -->
    <div class="no-results" th:if="${noResults}">
        <p>검색 결과가 없습니다.</p>
    </div>

</div>

<!-- 취업후기 작성하기 링크 -->
<a href="/user/board/employreview">취업후기 작성하기</a>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
