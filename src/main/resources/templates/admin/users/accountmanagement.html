<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>메타러닝 국비 계정 생성</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/admindashboard.css">
  <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
  <link rel="stylesheet" href="/static/css/header/adminheader.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    .main-content {
      padding: 2rem;
      background-color: #f8f9fa;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .main-content h1 {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 1rem;
      color: #333;
    }

    .main-content p {
      font-size: 1.2rem;
      color: #666;
      margin-bottom: 2rem;
    }

    .button-container {
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }

    .button-container .btn {
      padding: 1rem 2rem;
      font-size: 1.1rem;
      border-radius: 5px;
      text-align: center;
      width: 45%;
      transition: transform 0.3s ease-in-out;
    }

    .button-container .btn:hover {
      transform: scale(1.05);
    }

    .btn-primary {
      background-color: #007bff;
      border-color: #007bff;
    }

    .btn-primary:hover {
      background-color: #0056b3;
      border-color: #0056b3;
    }

    .btn-success {
      background-color: #28a745;
      border-color: #28a745;
    }

    .btn-success:hover {
      background-color: #218838;
      border-color: #1e7e34;
    }

  </style>
</head>
<body>
<div class="app-container">
  <!-- Header -->
  <div th:replace="~{fragments/adminheader :: adminheader}"></div>

  <div class="content-container">
    <!-- Sidebar -->
    <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>

    <!-- Main Content -->
    <div class="main-content">
      <h1>국비 관리</h1>
      <p>국비 과정 이용 계정 만들기</p>

      <!-- 버튼 영역 -->
      <div class="button-container">
        <!-- 강사 계정 만들기 버튼 -->
        <a href="/admin/KDT/account/Instructor" class="btn btn-primary">
          <i class="bi bi-person-plus"></i> 국비과정 강사계정 만들기
        </a>

        <!-- 회원 계정 만들기 버튼 -->
<!--        <a href="/admin/KDT/account/studnt" class="btn btn-success">-->
        <a href="#" class="btn btn-success">
          <i class="bi bi-person-add"></i> 국비과정 회원계정 만들기
        </a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
