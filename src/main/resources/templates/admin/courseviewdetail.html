<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메타러닝 관리자 동영상보기</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">

  <!-- 헤더 CSS, JS(head에 적당히) -->
  <link rel="stylesheet" href="/static/css/admindashboard.css">
  <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
  <link rel="stylesheet" href="/static/css/header/adminheader.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    /* 전체 페이지 스타일 */
    body {
      background-color: #f8f9fa; /* 연한 회색 배경 */
      font-family: 'Arial', sans-serif; /* 기본 폰트 설정 */
      margin: 0;
      padding: 0;
    }

    /* 전체 컨텐츠 중앙 정렬 */
    main.container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* 강의 제목 스타일 */
    .course-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 20px;
      text-align: center;
      color: #333;
    }

    /* 강의 상세 페이지로 돌아가기 버튼 */
    .btn-back {
      margin-top: 30px;
      padding: 12px 30px;
      font-size: 16px;
      font-weight: 600;
      background-color: #007bff;
      color: white;
      border-radius: 5px;
      border: none;
      transition: background-color 0.3s ease;
    }

    .btn-back:hover {
      background-color: #0056b3;
    }

    /* 비디오 컨테이너 스타일링 */
    .video-container {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 비율 유지 */
      height: 0;
      overflow: hidden;
      max-width: 100%;
      background: #000;
      margin-bottom: 20px;
      border-radius: 10px;
    }

    /* 비디오 및 iframe 스타일 */
    .video-container iframe, .video-container video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 10px;
    }

    /* 반응형 비디오 크기 조정 */
    .video-responsive {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
    }

    /* 반응형 디자인 */
    @media (max-width: 768px) {
      .video-container {
        padding-bottom: 75%; /* 모바일에서 비디오 비율을 세로로 맞추기 */
      }
      .course-title {
        font-size: 22px; /* 작은 화면에서 제목 크기 줄임 */
      }
      .btn-back {
        width: 100%;
        padding: 12px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- Header -->
  <div th:replace="~{fragments/adminheader :: adminheader}"></div>

  <div class="content-container">
    <!-- Sidebar -->
    <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>

    <!-- Main Content -->
    <div class="main-content">
      <h1 class="text-center mb-4"><i class="bi bi-play-circle"></i> 온라인 강의 영상</h1>

      <!-- 강의 제목 표시 -->
      <h3 class="course-title" th:text="${courseViewResponse.courseDetailTitle}"></h3>

      <!-- 비디오 표시 (URL을 이용한 경우) -->
      <div th:if="${courseViewResponse.courseVideoType == 'url'}" class="mx-auto" style="max-width: 700px;">
        <div class="video-container">
          <iframe class="video-responsive"
                  th:src="${courseViewResponse.courseVideoUuid}"
                  frameborder="0"
                  allowfullscreen>
          </iframe>
        </div>
      </div>

      <!-- 비디오 표시 (파일을 이용한 경우) -->
      <div th:if="${courseViewResponse.courseVideoType != 'url'}" class="mx-auto" style="max-width: 700px;">
        <div class="video-container">
          <video class="video-responsive" controls>
            <source th:src="'/uploads/course_videos/' + ${courseViewResponse.courseVideoUuid}" type="video/mp4"/>
            동영상 재생을 지원하지 않는 브라우저입니다.
          </video>
        </div>
      </div>
      <div class="text-center mt-4">
        <a class="btn btn-secondary btn-back" th:href="@{/admin/course/{courseId}(courseId=${courseId})}">
          <i class="bi bi-arrow-left-circle"></i> 강의 상세로 돌아가기
        </a>
      </div>
    </div>

  </div>
</div>
</body>
</html>
