<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메타러닝 상담 상세보기</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/admindashboard.css">
  <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
  <link rel="stylesheet" href="/static/css/header/adminheader.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    .consult-detail {
      margin-top: 20px;
      border: 1px solid #dee2e6;
      border-radius: 5px;
      padding: 20px;
      background-color: #f8f9fa;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .consult-detail table {
      width: 100%;
      border-collapse: collapse;
    }

    .consult-detail th {
      width: 25%; /* 너비를 25%로 설정 */
      background-color: #f1f1f1;
      font-weight: bold;
      text-align: left;
      vertical-align: middle;
      padding: 10px 15px;
    }

    .consult-detail td {
      width: 75%; /* 너비를 75%로 설정 */
      vertical-align: middle;
      padding: 10px 15px;
    }

    .button-group {
      margin-top: 20px;
      text-align: center; /* 가운데 정렬 */
    }

    .button-group a {
      display: inline-block;
      padding: 10px 20px;
      margin-right: 10px;
      border-radius: 5px;
      text-decoration: none;
      color: white;
      background-color: #007bff;
    }

    .button-group a:hover {
      background-color: #0056b3;
    }
  </style>

</head>
<body>

<div th:replace="~{fragments/adminheader :: adminheader}"></div>
<div class="content-container">
  <!-- Sidebar -->
  <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>
  <!-- Main Content -->
  <div class="main-content">

    <div class="container">
      <h1><i class="bi bi-file-earmark-text"></i> 상담 신청 상세 정보</h1>
      <div class="consult-detail">
        <table class="table table-bordered">
          <tr>
            <th><i class="bi bi-hash"></i> 상담 ID</th>
            <td th:text="${viewConsultDetail.kdtAppConsultId}"></td>
          </tr>
          <tr>
            <th><i class="bi bi-person"></i> 신청자 이름</th>
            <td th:text="${viewConsultDetail.kdtAppConsultName}"></td>
          </tr>
          <tr>
            <th><i class="bi bi-gender-ambiguous"></i> 성별</th>
            <td th:text="${viewConsultDetail.kdtAppConsultGender == 'F' ? '여자' : (viewConsultDetail.kdtAppConsultGender == 'M' ? '남자' : '정보 없음')}"></td>
          </tr>
          <tr>
            <th><i class="bi bi-calendar-event"></i> 생년월일</th>
            <td th:text="${viewConsultDetail.kdtAppConsultBirth}"></td>
          </tr>
          <tr>
            <th><i class="bi bi-telephone"></i> 전화번호</th>
            <td th:text="${viewConsultDetail.kdtAppConsultPhone}"></td>
          </tr>
          <tr>
            <th><i class="bi bi-envelope"></i> 이메일</th>
            <td th:text="${viewConsultDetail.kdtAppConsultEmail}"></td>
          </tr>
          <tr>
            <th><i class="bi bi-lightbulb"></i> 동기</th>
            <td th:text="${viewConsultDetail.kdtAppConsultMotiv}"></td>
          </tr>
          <tr>
            <th><i class="bi bi-card-checklist"></i> 국민내일배움카드 여부</th>
            <td th:text="${viewConsultDetail.kdtAppConsultCard}"></td>
          </tr>
          <tr>
            <th><i class="bi bi-box-arrow-in-right"></i> 신청 경로</th>
            <td th:text="${viewConsultDetail.kdtAppConsultAppPath}"></td>
          </tr>
          <tr>
            <th><i class="bi bi-book"></i> 학력 수준</th>
            <td th:text="${viewConsultDetail.kdtAppConsultEduLevel == '중졸' ? '중학교 졸업' :
                viewConsultDetail.kdtAppConsultEduLevel == '고졸' ? '고등학교 졸업' :
                viewConsultDetail.kdtAppConsultEduLevel == '대졸' ? '대학교 졸업' :
                viewConsultDetail.kdtAppConsultEduLevel}"></td>
          </tr>
          <tr>
            <th><i class="bi bi-shield-lock"></i> 개인정보 동의 여부</th>
            <td th:text="${viewConsultDetail.kdtAppConsultPrivacyAgree != null ? (viewConsultDetail.kdtAppConsultPrivacyAgree ? '동의함' : '동의 안 함') : '정보 없음'}"></td>
          </tr>
          <tr>
            <th><i class="bi bi-broadcast"></i> 마케팅 동의 여부</th>
            <td th:text="${viewConsultDetail.kdtAppConsultMarketingAgree != null ? (viewConsultDetail.kdtAppConsultMarketingAgree ? '동의함' : '동의 안 함') : '정보 없음'}"></td>
          </tr>
          <tr>
            <th><i class="bi bi-chat-left-dots"></i> 상담 상태</th>
            <td th:text="${viewConsultDetail.kdtAppConsultStatus == 'COMPLETED' ? '상담 완료' :
               viewConsultDetail.kdtAppConsultStatus == 'PENDING' ? '상담 대기' :
               viewConsultDetail.kdtAppConsultStatus == 'IN_PROGRESS' ? '상담 진행 중' :
               '상담 취소'}"></td>
          </tr>
          <tr>
            <th><i class="bi bi-calendar-check"></i> 작성일</th>
            <td th:text="${#temporals.format(viewConsultDetail.kdtAppCreatedAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
          </tr>
        </table>
      </div>

      <div class="button-group">
        <a th:href="@{/admin/KDT/{sessionId}/appconsult/list(sessionId=${sessionId})}" class="button">
          <i class="bi bi-arrow-left-circle"></i> 목록으로 돌아가기
        </a>
        <a th:href="@{/admin/KDT/{sessionId}/appconsult/edit/{consultId}(sessionId=${sessionId}, consultId=${viewConsultDetail.kdtAppConsultId})}" class="button">
          <i class="bi bi-pencil"></i> 수정하러가기
        </a>
      </div>

    </div>
</body>
</html>
