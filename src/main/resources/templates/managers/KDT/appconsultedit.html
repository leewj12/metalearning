<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메타러닝 상담 신청 수정</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/admindashboard.css">
  <link rel="stylesheet" href="/static/css/header/managersidebar.css">
  <link rel="stylesheet" href="/static/css/header/managerheader.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    .consult-detail {
      margin-top: 20px;
      padding: 20px;
      border: 1px solid #dee2e6;
      border-radius: 5px;
      background-color: #f8f9fa;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .consult-detail th {
      width: 30%;
      background-color: #f1f1f1;
      font-weight: bold;
      text-align: left;
      vertical-align: middle;
    }

    .consult-detail td {
      vertical-align: middle;
    }

    .button-group {
      display:flex;
      margin-top: 20px;
      justify-content: center; /* 가로 중앙 정렬 */
      gap: 10px;
    }
  </style>

</head>
<body>

<div th:replace="~{fragments/managerheader :: managerheader}"></div>
<div class="content-container">
  <!-- Sidebar -->
  <div th:replace="~{fragments/managersidebar :: managersidebar}"></div>
  <!-- Main Content -->
  <div class="main-content">
    <form method="post" th:action="@{/managers/KDT/{sessionId}/appconsult/edit/{consultId}(sessionId=${sessionId}, consultId=${viewConsultDetail.kdtAppConsultId})}">
      <div class="container">
        <h1><i class="bi bi-pencil-square"></i> 상담 신청 수정하기</h1>
        <div class="consult-detail">
          <table class="table table-bordered">
            <!-- Hidden Inputs for kdtAppConsultId and kdtSessionId -->
            <input type="hidden" name="kdtAppConsultId" th:value="${viewConsultDetail.kdtAppConsultId}" />
            <input type="hidden" name="kdtSessionId" th:value="${viewConsultDetail.kdtSessionId}" />

            <tr>
              <th><i class="bi bi-hash"></i> 상담 ID</th>
              <td><input type="text" th:value="${viewConsultDetail.kdtAppConsultId}" class="form-control" disabled /></td>
            </tr>

            <tr>
              <th><i class="bi bi-person"></i> 신청자 이름</th>
              <td><input type="text" name="kdtAppConsultName" th:value="${viewConsultDetail.kdtAppConsultName}" class="form-control" /></td>
            </tr>

            <tr>
              <th><i class="bi bi-gender-ambiguous"></i> 신청자 성별</th>
              <td>
                <select name="KdtAppConsultGender" th:field="${viewConsultDetail.kdtAppConsultGender}" class="form-select">
                  <option value="">성별을 선택하세요</option>
                  <option value="M" th:selected="${viewConsultDetail.kdtAppConsultGender == 'M'}">남자</option>
                  <option value="F" th:selected="${viewConsultDetail.kdtAppConsultGender == 'F'}">여자</option>
                </select>
              </td>
            </tr>

            <tr>
              <th><i class="bi bi-calendar-event"></i> 생년월일</th>
              <td><input type="date" name="kdtAppConsultBirth" th:value="${viewConsultDetail.kdtAppConsultBirth}" class="form-control" /></td>
            </tr>

            <tr>
              <th><i class="bi bi-telephone"></i> 전화번호</th>
              <td><input type="text" name="kdtAppConsultPhone" th:value="${viewConsultDetail.kdtAppConsultPhone}" class="form-control" /></td>
            </tr>

            <tr>
              <th><i class="bi bi-envelope"></i> 이메일</th>
              <td><input type="email" name="kdtAppConsultEmail" th:value="${viewConsultDetail.kdtAppConsultEmail}" class="form-control" /></td>
            </tr>

            <tr>
              <th><i class="bi bi-lightbulb"></i> 동기</th>
              <td><input type="text" name="kdtAppConsultMotiv" th:value="${viewConsultDetail.kdtAppConsultMotiv}" class="form-control" /></td>
            </tr>

            <tr>
              <th><i class="bi bi-card-checklist"></i> 국민내일배움카드 여부</th>
              <td>
                <select name="kdtAppConsultCard" class="form-select" th:value="${viewConsultDetail.kdtAppConsultCard}">
                  <option value="발급" th:selected="${viewConsultDetail.kdtAppConsultCard == '발급'}">발급</option>
                  <option value="미발급" th:selected="${viewConsultDetail.kdtAppConsultCard == '미발급'}">미발급</option>
                </select>
              </td>
            </tr>

            <tr>
              <th><i class="bi bi-box-arrow-in-right"></i> 신청 경로</th>
              <td>
                <select name="kdtAppConsultAppPath" class="form-select" th:value="${viewConsultDetail.kdtAppConsultAppPath}">
                  <option value="" selected>선택하세요</option>
                  <option value="홈페이지" th:selected="${viewConsultDetail.kdtAppConsultAppPath == '홈페이지'}">홈페이지</option>
                  <option value="인터넷" th:selected="${viewConsultDetail.kdtAppConsultAppPath == '인터넷'}">인터넷</option>
                  <option value="지인추천" th:selected="${viewConsultDetail.kdtAppConsultAppPath == '지인추천'}">지인추천</option>
                  <option value="신문" th:selected="${viewConsultDetail.kdtAppConsultAppPath == '신문'}">신문</option>
                  <option value="광고" th:selected="${viewConsultDetail.kdtAppConsultAppPath == '광고'}">광고</option>
                  <option value="기타" th:selected="${viewConsultDetail.kdtAppConsultAppPath == '기타'}">기타</option>
                </select>
              </td>
            </tr>

            <tr>
              <th><i class="bi bi-book"></i> 학력 수준</th>
              <td>
                <select name="kdtAppConsultEduLevel" class="form-select" th:value="${viewConsultDetail.kdtAppConsultEduLevel}">
                  <option value="" selected>선택하세요</option>
                  <option value="고졸" th:selected="${viewConsultDetail.kdtAppConsultEduLevel == '고졸'}">고등학교 졸업</option>
                  <option value="대졸" th:selected="${viewConsultDetail.kdtAppConsultEduLevel == '대졸'}">대학교 졸업</option>
                  <option value="석사" th:selected="${viewConsultDetail.kdtAppConsultEduLevel == '석사'}">석사</option>
                  <option value="박사" th:selected="${viewConsultDetail.kdtAppConsultEduLevel == '박사'}">박사</option>
                  <option value="기타" th:selected="${viewConsultDetail.kdtAppConsultEduLevel == '기타'}">기타</option>
                </select>
              </td>
            </tr>

            <tr>
              <th><i class="bi bi-shield-lock"></i> 개인정보 동의 여부</th>
              <td>
                <input type="radio" name="kdtAppConsultPrivacyAgree" th:value="true" th:checked="${viewConsultDetail.kdtAppConsultPrivacyAgree == true}"> 동의함
                <input type="radio" name="kdtAppConsultPrivacyAgree" th:value="false" th:checked="${viewConsultDetail.kdtAppConsultPrivacyAgree == false}"> 동의 안 함
              </td>
            </tr>

            <tr>
              <th><i class="bi bi-broadcast"></i> 마케팅 동의 여부</th>
              <td>
                <input type="radio" name="kdtAppConsultMarketingAgree" th:value="true" th:checked="${viewConsultDetail.kdtAppConsultMarketingAgree == true}"> 동의함
                <input type="radio" name="kdtAppConsultMarketingAgree" th:value="false" th:checked="${viewConsultDetail.kdtAppConsultMarketingAgree == false}"> 동의 안 함
              </td>
            </tr>

            <tr>
              <th><i class="bi bi-chat-left-text"></i> 상담 상태</th>
              <td>
                <select name="kdtAppConsultStatus" class="form-select" th:value="${viewConsultDetail.kdtAppConsultStatus}">
                  <option value="COMPLETED" th:selected="${viewConsultDetail.kdtAppConsultStatus == 'COMPLETED'}">상담 완료</option>
                  <option value="PENDING" th:selected="${viewConsultDetail.kdtAppConsultStatus == 'PENDING'}">상담 대기</option>
                  <option value="IN_PROGRESS" th:selected="${viewConsultDetail.kdtAppConsultStatus == 'IN_PROGRESS'}">상담 진행 중</option>
                  <option value="CANCELLED" th:selected="${viewConsultDetail.kdtAppConsultStatus == 'CANCELLED'}">상담 취소</option>
                </select>
              </td>
            </tr>

            <tr>
              <th><i class="bi bi-calendar-check"></i> 작성일</th>
              <td><input type="text" th:value="${#temporals.format(viewConsultDetail.kdtAppCreatedAt, 'yyyy-MM-dd HH:mm:ss')}" class="form-control" disabled /></td>
            </tr>
          </table>
        </div>

        <div class="button-group text-end">
          <a th:href="@{/managers/KDT/{sessionId}/appconsult/list(sessionId=${sessionId})}" class="btn btn-secondary">
            <i class="bi bi-arrow-left-circle"></i> 목록으로 돌아가기
          </a>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-save"></i> 저장
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

</body>
</html>
