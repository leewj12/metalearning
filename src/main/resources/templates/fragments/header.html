<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <title>메타러닝 Header</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
</head>
<body>
<header th:fragment="header">
  <!-- Top Bar -->
  <div class="topBar">
    <div class="container d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-telephone-fill"></i> <span>상담문의: 012-3456-7890</span>
      </div>
      <div class="d-flex align-items-center gap-3">
        <a href="/login" sec:authorize="!isAuthenticated()" class="text-white text-decoration-none">
          <i class="bi bi-box-arrow-in-right"></i> 로그인
        </a>
        <a href="/signup" sec:authorize="!isAuthenticated()" class="text-white text-decoration-none">
          <i class="bi bi-person-plus-fill"></i> 회원가입
        </a>
        <div sec:authorize="isAuthenticated()" class="text-white">
          <i class="bi bi-person-check-fill"></i> <span th:text="${#authentication.name}"></span>님 환영합니다
        </div>
        <form action="/logout" method="POST" sec:authorize="isAuthenticated()" style="display: inline;">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button type="submit" class="btn btn-link text-white text-decoration-none p-0 m-0" style="font-size: 0.82rem;">
            <i class="bi bi-box-arrow-right"></i> 로그아웃
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg bg-white">
    <div class="container">
      <a href="/" class="navbar-brand-area text-decoration-none">
        <img src="/static/images/logo.png" alt="Logo">
        <span class="logoText">MetaLearning</span>
      </a>
      <button
              class="navbar-toggler"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarNav"
              aria-controls="navbarNav"
              aria-expanded="false"
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="/"><i class="bi bi-house-door-fill"></i> 홈</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/main/about-metalearning"><i class="bi bi-building"></i> 소개</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/main/way-to-come"><i class="bi bi-geo-alt-fill"></i> 오시는 길</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/main/KDT-curriculum"><i class="bi bi-mortarboard-fill"></i> 국비지원과정</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/main/KDT-info"><i class="bi bi-info-circle-fill"></i> 국비지원이란</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/main/course"><i class="bi bi-play-circle-fill"></i> 온라인강의</a>
          </li>

          <li class="nav-item" sec:authorize="hasAuthority('ROLE_STUDENT')">
            <a class="nav-link" href="/student/main/mypage"><i class="bi bi-person-circle"></i> 마이페이지</a>
          </li>
          <li class="nav-item" sec:authorize="hasAuthority('ROLE_INSTRUCTOR')">
            <a class="nav-link" href="/instr/main/mypage"><i class="bi bi-person-workspace"></i> 강사 페이지</a>
          </li>
          <li class="nav-item" sec:authorize="hasAuthority('ROLE_MANAGER')">
            <a class="nav-link" href="/managers/main/mypage"><i class="bi bi-person-gear"></i> 매니저 페이지</a>
          </li>
          <li class="nav-item" sec:authorize="hasAuthority('ROLE_ADMIN')">
            <a class="nav-link" href="/view/admin/dashboard"><i class="bi bi-shield-lock-fill"></i> 관리자</a>
          </li>
          <li class="nav-item" sec:authorize="hasAuthority('ROLE_STUDENT')">
            <a class="nav-link" href="/user/cart"><i class="bi bi-cart-fill"></i> 장바구니</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>
</body>
</html>
