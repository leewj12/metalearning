<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<link rel="icon" href="/static/images/logo.png" type="image/png">
<head>

    <header class="header header-expand" th:fragment="instrheader">
        <div class="leftSection">
            <a class="brand" href="/instr/main/mypage">메타러닝 강사 페이지</a>
        </div>
        <div class="rightSection">

            <div sec:authorize="isAuthenticated()" class="userInfo">
                <span>
                  환영합니다! <span th:text="${#authentication.principal.name}"></span>
(<span th:each="auth : ${#authentication.authorities}">
    <span th:if="${auth.authority == 'ROLE_ADMIN'}">관리자</span>
    <span th:if="${auth.authority == 'ROLE_MANAGER'}">매니저</span>
                        <span th:if="${auth.authority == 'ROLE_INSTRUCTOR'}">강사</span>
</span>) 님
<span>
<i class="bi bi-person-fill text-lightblue"></i> 로그인중
</span>

                </span>
            </div>

            <form action="/logout" method="POST" sec:authorize="isAuthenticated()" class="logoutForm">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="logoutButton">
                    <i class="bi bi-box-arrow-right"></i> 로그아웃
                </button>
            </form>

        </div>
    </header>

</html>
