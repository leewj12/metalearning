<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>메타러닝 강의 상세 정보</title>
  <link rel="icon" href="/static/images/logo.png" type="image/png">
  <link rel="stylesheet" href="/static/css/admindashboard.css">
  <link rel="stylesheet" href="/static/css/header/adminsidebar.css">
  <link rel="stylesheet" href="/static/css/header/adminheader.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
      .card-header {
          background-color: #007bff;
          color: white;
      }

      .no-thumbnail .thumbnail-placeholder {
        background-color: #add8e6;
        color: #004085;
        padding: 20px;
        border-radius: 8px;
        text-align: center;
        word-wrap: break-word;  /* 긴 텍스트가 넘칠 경우 줄 바꿈 */
        width: 220px;  /* 고정된 가로 크기 */
        height: 180px; /* 고정된 세로 크기 */
        box-sizing: border-box; /* padding을 포함하여 크기 계산 */
        display: flex;
        justify-content: center; /* 가로 중앙 정렬 */
        align-items: center;     /* 세로 중앙 정렬 */
        overflow: hidden;  /* 넘치는 텍스트가 있을 경우 잘라냄 */
      }

    /* 테이블 스타일 */
    table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
    }
    th, td {
        padding: 12px;
        text-align: left;
        border: 1px solid #ddd;
    }
    th {
        background-color: #f4f4f4;
    }
  </style>
  <!-- CSRF Token -->
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
<div class="app-container">
  <!-- Header -->
  <div th:replace="~{fragments/adminheader :: adminheader}"></div>
  <div class="content-container">
    <!-- Sidebar -->
    <div th:replace="~{fragments/adminsidebar :: adminsidebar}"></div>

    <!-- Main Content -->
    <div class="main-content container mt-4" style="max-width:800px;">

      <div class="d-flex flex-column justify-content-center">

      <h1 class="text-center mb-4">
        <i class="bi bi-info-circle"></i> 강의 상세 정보
      </h1>

        <!-- 강의 기본 정보 -->
        <div class="card mb-4">
          <div class="card-header">
            <h4>강의 기본 정보</h4>
            <a th:href="@{/admin/course/update/course/{courseId}(courseId=${updateResponse.courseId})}"
               class="btn-link" style="color: white;"> 수정하기 </a>
          </div>
          <div class="card-body">
            <div style="display: flex; gap: 20px; align-items: center;">
              <div>
                <img th:if="${updateResponse.courseThumbnail != null}"
                     th:src="'/static/uploads/course/' + ${updateResponse.courseThumbnail}"
                     alt="강의 썸네일"
                     class="thumbnail img-thumbnail">
                <div th:if="${updateResponse.courseThumbnail == null}" class="no-thumbnail">
                  <div class="thumbnail-placeholder" th:text="${updateResponse.courseTitle}">
                    썸네일 없음
                  </div>
                </div>
              </div>
              <div>
                <!-- 강의 정보 내용 영역-->
                <p><strong>강의 제목:</strong> <span th:text="${updateResponse.courseTitle}"></span></p>
                <p th:if="${updateResponse.courseDescript !=null and updateResponse.courseDescript != ''}"><strong>강의 설명:</strong> <span th:text="${updateResponse.courseDescript}"></span></p>
                <p><strong>가격:</strong> <span class="course-price" th:text="${updateResponse.coursePrice}"></span></p>
                <p th:if="${updateResponse.courseCategory !=null and updateResponse.courseCategory != ''}"><strong>카테고리:</strong> <span th:text="${updateResponse.courseCategory}"></span></p>
                <p><strong>난이도:</strong>
                  <span th:switch="${updateResponse.courseDifficulty.name()}">
            <span th:case="'ADVANCED'">고급</span>
            <span th:case="'INTERMEDIATE'">중급</span>
            <span th:case="'BASIC'">초급</span>
            <span th:case="'BEGINNER'">입문</span>
            <span th:case="*">알 수 없음</span>
          </span></p>
              </div>
            </div>
          </div>
        </div>

        <!-- 설명 파일 -->
        <div class="card mb-4">
          <div class="card-header">
            <h4>강의 홍보글</h4>
            <a th:href="@{/admin/course/update/coursedescript/{courseDescriptId}(courseDescriptId=${updateResponse.courseDescriptId})}"
               class="btn-link" style="color: white;"> 수정하기 </a>
          </div>
          <div class="card-body">
            <div class="d-flex flex-column align-items-center">
              <p th:text="${updateResponse.courseDescriptContent}" ></p>
              <div th:each="file : ${updateResponse.courseDescriptFiles}" class="mb-4">
                <!-- 이미지 미리보기 -->
                <img th:src="'/static/uploads/course/' + ${file.courseDescriptFiles}"
                     alt="이미지 미리보기"
                     style="max-width: 900px; object-fit: cover; border-radius: 8px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);"
                     class="img-fluid">
                <!-- 파일 이름 및 링크 -->
                <!-- <a th:href="'/uploads/course/' + ${file.courseDescriptFiles}"
                    th:text="${file.courseDescriptFiles}"
                    target="_blank"
                    class="text-center"></a>-->
              </div>
            </div>
          </div>
        </div>

        <!-- 세부 정보 -->
        <div class="card mb-4">
          <div class="card-header bg-success text-white">
            <h4>강의 세부 정보</h4>

          </div>
          <div class="card-body">
            <div th:each="detail : ${updateResponse.courseDetails}" class="mb-3">
              <div th:if="${detail.courseDetailFileUUID != null}" style="border: 1px solid #ddd; padding: 10px;">
                <p><strong>강의 자료</strong></p>
                <a th:href="@{/admin/course/update/coursefile/{courseFileId}(courseFileId=${detail.courseFileId})}"
                   class="btn-link"> 수정하기 </a>
                <p>
                  파일명:
                  <span th:text="${detail.courseDetailTitle}"></span></p>
                <a th:href="'/static/uploads/course_files/' + ${detail.courseDetailFileUUID}" th:download="${detail.courseDetailFileUUID}" target="_blank" class="btn btn-success btn-sm">자료 다운로드</a>
                </p>
              </div>
            </div>


            <table>
              <thead>
              <tr>
                <th>번호</th>
                <th>강의영상제목</th>
                <th>강의수정</th>
                <th>강의삭제</th>
              </tr>
              </thead>
              <tbody>
              <!-- 번호가 1씩 증가하도록 추가된 부분 -->
              <tr th:each="detail, iterStat : ${updateResponse.courseDetails}" th:if="${detail.courseDetailFileUUID == null}">
                <td>
                  <!-- 번호 출력: iterStat.index는 0부터 시작하므로 1을 더해줍니다 -->
                  <span th:text="${iterStat.index}"></span>
                </td>
                <td>
                  <!-- 세부 제목에 링크 추가, courseId도 URL 경로에 포함 -->
                  <a th:href="@{/admin/course/detail/{courseId}/{courseDetailId}(courseId=${updateResponse.courseId}, courseDetailId=${detail.courseDetailId})}"
                     th:text="${detail.courseDetailTitle}" class="btn-link"></a>
                </td>
                <td>
                  <a class="btn btn-warning" th:href="@{/admin/course/update/coursevideo/{courseVideoId}(courseVideoId=${detail.courseVideoId})}">
                    수정
                  </a>
                </td>
                <td>
                  <button class="btn btn-danger delete-video-button"
                          th:data-video-id="${detail.courseVideoId}" th:if="${iterStat.index != 1}" >
                    <i class="bi bi-trash"></i> 삭제
                  </button>
                </td>
              </tr>
              </tbody>
            </table>
          </div>
          <p>
          <a class="btn btn-primary" th:href="@{/admin/course/addVideo/{courseId}(courseId=${courseId})}">
            영상 추가하기
          </a></p>
        </div>

        <!-- 수정 및 뒤로가기 버튼 -->
        <div class="d-flex justify-content-center gap-2 mt-4">
          <!-- 뒤로가기 버튼 -->
          <button class="btn btn-secondary" onclick="history.back()">
            <i class="bi bi-arrow-left"></i> 뒤로가기
          </button>
        </div>
      </div>

    </div>

  </div>
</div>
<script>
  document.addEventListener("DOMContentLoaded", function () {
      const priceElements = document.querySelectorAll(".course-price");
      priceElements.forEach(function (priceElement) {
          const price = parseFloat(priceElement.textContent);
          if (!isNaN(price)) {
              priceElement.textContent = price.toLocaleString('en-US'); // 쉼표로 3자리 단위 포맷팅
          }
      });

        const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

        document.querySelectorAll(".delete-video-button").forEach(button => {
            button.addEventListener("click", async function () {
                const courseVideoId = this.getAttribute("data-video-id");

                if (!confirm("정말 이 영상을 삭제하시겠습니까?")) {
                    return; // 사용자가 취소한 경우 중단
                }

                // 삭제 버튼을 비활성화하여 중복 클릭 방지
                this.disabled = true;
                this.innerHTML = '<i class="bi bi-hourglass-split"></i> 삭제 중...';


                try {
                    const response = await fetch(`/api/admin/course/delete/courseVideo/${courseVideoId}`, {
                        method: "DELETE",
                        headers: {
                            "Content-Type": "application/json",
                            [csrfHeader]: csrfToken // CSRF 토큰 추가
                        }
                    });

                    if (response.ok) {
                        alert("영상이 삭제되었습니다.");
                        this.closest("tr").remove(); // 삭제된 강의 카드 제거
                    } else {
                        const errorMessage = await response.text();
                        alert(`삭제 실패: ${errorMessage}`);
                        this.disabled = false;
                        this.innerHTML = '<i class="bi bi-trash"></i> 삭제';
                    }
                } catch (error) {
                    console.error("영상 삭제 중 오류 발생:", error);
                    alert("영상 삭제에 실패했습니다.");
                    this.disabled = false;
                    this.innerHTML = '<i class="bi bi-trash"></i> 삭제';
                }
            });
        });
  });
</script>
</body>
</html>
