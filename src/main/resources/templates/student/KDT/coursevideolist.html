<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    .btn-container {
      margin-top: 20px;

  <meta name="_csrf" th:content="${_csrf.token}"/>

</head>
<body>

            <th>상세보기</th>

<!--            <th>삭제</th>-->
          </tr>
          </thead>
          <tbody>
          <tr th:each="video, iterStat : ${videos}">
            <td th:text="${iterStat.index + 1}"></td>
            <td>
              <a th:href="@{/student/KDT/{kdtSessionId}/courseoutline/{kdtCourseOutlineId}/coursevideo/{kdtCourseVideoId}(kdtSessionId=${video.kdtCourseOutlineEntity.kdtSessionEntity.kdtSessionId}, kdtCourseOutlineId=${video.kdtCourseOutlineEntity.kdtCourseOutlineId}, kdtCourseVideoId=${video.kdtCourseVideoId})}">
                <span th:text="${video.kdtCourseVideoTitle}"></span>
              </a>
            </td>
            <td th:text="${video.kdtCourseVideoCategory}"></td>
            <td th:text="${#temporals.format(video.kdtCourseVideoCreatedAt, 'yyyy-MM-dd HH:mm')}"></td>
            <td>
              <a th:href="@{/student/KDT/{sessionId}/courseoutline/{outlineId}/coursevideo/{videoId}(sessionId=${video.kdtCourseOutlineEntity.kdtSessionEntity.kdtSessionId}, outlineId=${video.kdtCourseOutlineEntity.kdtCourseOutlineId}, videoId=${video.kdtCourseVideoId})}">
                <button class="btn btn-primary btn-sm">
                  <i class="bi bi-eye"></i> 상세보기
                </button>
              </a>
            </td>
<!--            <td>-->
<!--              <a th:href="@{/student/KDT/{sessionId}/courseoutline/{outlineId}/coursevideo/update/{videoId}(sessionId=${video.kdtCourseOutlineEntity.kdtSessionEntity.kdtSessionId}, outlineId=${video.kdtCourseOutlineEntity.kdtCourseOutlineId}, videoId=${video.kdtCourseVideoId})}">-->
<!--                <button class="btn btn-warning btn-sm">-->
<!--                  <i class="bi bi-pencil-square"></i> 수정-->
<!--                </button>-->
<!--              </a>-->
<!--            </td>-->
<!--            <td>-->
<!--              <button class="btn btn-danger btn-sm" th:onclick="'deleteVideo(' + ${video.kdtCourseVideoId} + ', ' + ${video.kdtCourseOutlineEntity.kdtSessionEntity.kdtSessionId} + ', ' + ${video.kdtCourseOutlineEntity.kdtCourseOutlineId} + ')'">-->
<!--                <i class="bi bi-trash"></i> 삭제-->
<!--              </button>-->
<!--            </td>-->
<!--          </tr>-->
          </tbody>
        </table>
      </div>

      <!-- 등록 및 목차 버튼 -->
      <div class="btn-container">
<!--        <a th:href="@{/student/KDT/{sessionId}/courseoutline/{outlineId}/coursevideo(sessionId=${kdtSessionId}, outlineId=${kdtCourseOutlineId})}">-->
<!--          <button class="btn btn-success">-->
<!--            <i class="bi bi-plus-circle"></i> 동영상 등록-->
<!--          </button>-->
<!--        </a>-->
        <a th:href="@{/student/KDT/{kdtSessionId}/courseoutline/list(kdtSessionId=${kdtSessionId})}">
          <button class="btn btn-secondary">
            <i class="bi bi-arrow-left-circle"></i> 목차로 돌아가기
          </button>
        </a>
      </div>
    </div>
  </div>
</div>

<script>
  // CSRF 토큰을 헤더에 추가하기 위한 함수
  function getCsrfToken() {
    return document.querySelector('meta[name="_csrf"]').getAttribute('content');
  }

  function getCsrfHeaderName() {
    return document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
  }

  function deleteVideo(videoId, sessionId, outlineId) {
    const url = `/api/student/KDT/${sessionId}/courseoutline/${outlineId}/coursevideo/delete/${videoId}`;
    console.log("Deleting video with URL:", url); // 확인용 로그

    const csrfToken = getCsrfToken();
    const csrfHeaderName = getCsrfHeaderName();

    if (!confirm('정말 삭제하시겠습니까?')) {
        return;
    }

    fetch(url, {
        method: 'DELETE',
        headers: {
            'Content-Type': 'application/json',
            [csrfHeaderName]: csrfToken  // CSRF 토큰을 헤더에 포함
        }
    })
    .then(response => {
        if (response.ok) {
            alert('삭제되었습니다.');
            location.reload();
        } else {
            response.text().then(errMsg => {
                console.error("Error Response:", errMsg);
                alert('삭제에 실패했습니다.');
            });
        }
    })
    .catch(error => {
        console.error("Error during fetch:", error);
        alert('삭제 중 오류가 발생했습니다.');
    });
  }
</script>

</body>
